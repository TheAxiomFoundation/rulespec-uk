# Corpus source captures are verbatim public legislation.gov.uk CLML XML.
# Its document metadata (ukm:UnappliedEffects / CommentaryRef) carries
# key-<32 hex> identifiers that false-positive GitHub's Mailgun API key
# detector — 73 detections on the first Welsh CTR ingest alone, and every
# future UK ingest would recur. These directories accept only tool-written
# data files (see .axiom/repository-structure.yaml path rules), so scanning
# exclusion is scoped to exactly them.
paths-ignore:
  - "data/corpus/sources/**"
  - "uk-*/data/corpus/sources/**"
