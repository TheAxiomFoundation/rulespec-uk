name: Bulk encode plan

# Post-#133 model. The canonical-provenance hard cut (axiom-encode#1108) removed
# the env-var apply-signing path this workflow's former autonomous
# `encode --apply` lane depended on. Under the pinned encoder (>= 0.2.1215):
#   * AXIOM_ENCODE_APPLY_SIGNING_KEY in the environment is FATAL at startup; and
#   * `encode --apply` signs the v5/Ed25519 apply manifest through an externally
#     attached trusted broker (an external Ed25519 signer connected on
#     `--apply-signer-fd`) with no unsigned path.
# No CI runner can provision that signer without reintroducing raw-private-key-
# in-CI, which is exactly what the hard cut removes. axiom-encode's own bulk
# lane was cut to routing-only for the same reason.
#
# So this workflow is now a PLANNER, not an autonomous signer. It:
#   * reads the strict 3-key .axiom/toolchain.toml (signed corpus release
#     binding: axiom_corpus_release + content sha256 + validation waiver-set
#     sha256), and rejects the removed pre-#133 keys;
#   * pins the encoder / engine / corpus / rulespec-us dependency refs
#     EXPLICITLY, matching .github/workflows/repository-checks.yml, so a
#     generation session and the PR CI resolve the identical toolchain;
#   * computes the batch selection from bulk/worklist.yaml
#     (bulk/compute_matrix.py) and emits it as `bulk-plan.json`; and
#   * (verify-release job) fetches and verifies the pinned signed corpus release
#     object from R2 + its provenance commit, mirroring the shared
#     validate-rulespec resolution semantics.
#
# HANDOFF (the clean seam the signed encode leg builds on). The plan is emitted
# two ways:
#   * job outputs `matrix` + `count` (the compute_matrix `{"include": [...]}`
#     JSON), so a downstream signer-attached `encode` job can fan out with
#     `strategy.matrix.item: fromJSON(needs.plan.outputs.matrix).include`; and
#   * the `bulk-plan.json` artifact -- the same selection enriched with the
#     pinned toolchain, dependency refs, corpus release, `corpus_path`, and
#     per-entry guard `roots` -- for out-of-workflow consumers.
#
# The TARGET consumer is the Path B CI apply-signer encode leg being built in
# axiom-encode (lane O; tracked in rulespec-uk#140). That leg checks out the
# pinned deps, provisions the trusted signing supervisor with an ATTACHED
# production external apply signer (`--apply-signer-fd`), runs
# `axiom-encode encode <citation> --apply` under it with
# `--corpus-path _axiom/axiom-corpus`, produces v5/Ed25519 modules + manifests,
# and opens PRs. This planner deliberately stops at the seam so that leg is added
# on top without reworking selection or resolution.
#
# This workflow NEVER signs, NEVER runs `encode --apply`, and NEVER opens PRs.
# The authoritative validation gate remains the required `validate / validate`
# check (repository-checks.yml -> the shared, supervised validate-rulespec
# workflow).

on:
  workflow_dispatch:
    inputs:
      batch:
        description: "Worklist batch label to plan (e.g. CTR-ENP, CTR-SC, CTR-WA). Empty = all pending."
        required: false
        type: string
        default: ""
      limit:
        description: "Max entries to include in the plan."
        required: false
        type: string
        default: "8"
      verify_release:
        description: "Fetch + verify the pinned signed corpus release object from R2 (fails closed until the release is published)."
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: bulk-encode-plan
  cancel-in-progress: false

# Dependency pins, EXACTLY matching .github/workflows/repository-checks.yml so a
# generation session and the PR CI resolve the identical toolchain. Bump these
# in lockstep with repository-checks.yml.
env:
  AXIOM_ENCODE_REF: c04e86082b0db8d6e7b65c572228ce11df949c4b
  AXIOM_RULES_ENGINE_REF: 05eac9d2f89dabe5c6673176260762cef3a58f47
  AXIOM_CORPUS_REF: b5786e93a6286ae0dcb7b566b8499b6fe46c8b7a
  RULESPEC_US_REF: 0f291b367bf7e15555f9973112278c5cbf221653
  CORPUS_RELEASE_BASE_URL: https://pub-a8952f8657fc49fda358146ac001366c.r2.dev

jobs:
  plan:
    name: plan
    runs-on: ubuntu-latest
    # Seam for the Path B signer-attached encode leg (lane O): a downstream job
    # can `needs: plan` and fan out with
    # `strategy.matrix.item: fromJSON(needs.plan.outputs.matrix).include`.
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      count: ${{ steps.plan.outputs.count }}
    steps:
      - name: Checkout rules repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Install PyYAML
        run: python -m pip install --upgrade pip pyyaml

      - name: Resolve pinned RuleSpec toolchain (strict 3-key contract)
        id: toolchain
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import re
          import sys
          import tomllib
          from pathlib import Path

          EXPECTED = {
              "axiom_corpus_release",
              "axiom_corpus_release_content_sha256",
              "validation_waiver_set_sha256",
          }
          # Reading any of these removed pre-#133 keys is exactly the #144 defect.
          REMOVED = {
              "axiom_encode_ref",
              "axiom_rules_engine_ref",
              "axiom_corpus_ref",
              "rulespec_us_ref",
              "axiom_encode_version",
          }
          SHA256 = re.compile(r"[0-9a-f]{64}")

          data = tomllib.loads(Path(".axiom/toolchain.toml").read_text())
          if set(data) != {"toolchain"} or not isinstance(data["toolchain"], dict):
              sys.exit("toolchain.toml must contain exactly one [toolchain] table")
          t = data["toolchain"]
          leaked = REMOVED & set(t)
          if leaked:
              sys.exit(f"toolchain.toml still carries removed pre-#133 keys: {sorted(leaked)}")
          if set(t) != EXPECTED:
              sys.exit(f"[toolchain] must contain exactly {sorted(EXPECTED)}; got {sorted(t)}")
          for key in ("axiom_corpus_release_content_sha256", "validation_waiver_set_sha256"):
              if SHA256.fullmatch(str(t[key])) is None:
                  sys.exit(f"{key} must be a lowercase sha256 digest")
          for key in sorted(EXPECTED):
              print(f"{key}={t[key]}")
          PY
          echo "Resolved 3-key toolchain:"
          grep -E 'axiom_corpus_release|validation_waiver_set' "$GITHUB_OUTPUT" || true

      - name: Compute encode plan from worklist
        id: plan
        shell: bash
        env:
          BATCH: ${{ inputs.batch }}
          LIMIT: ${{ inputs.limit || '8' }}
          RELEASE: ${{ steps.toolchain.outputs.axiom_corpus_release }}
          RELEASE_SHA: ${{ steps.toolchain.outputs.axiom_corpus_release_content_sha256 }}
          WAIVER_SHA: ${{ steps.toolchain.outputs.validation_waiver_set_sha256 }}
        run: |
          set -euo pipefail
          args=(--status pending --format matrix --limit "$LIMIT")
          if [ -n "$BATCH" ]; then
            args+=(--batch "$BATCH")
          fi
          selection="$(python bulk/compute_matrix.py "${args[@]}")"
          count="$(python -c 'import json,sys; print(len(json.loads(sys.argv[1])["include"]))' "$selection")"
          # Seam outputs consumed by the Path B signer-attached encode leg (lane O).
          echo "matrix=$selection" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"

          # Assemble the operator plan: everything a signed-apply session needs to
          # resolve the identical toolchain and target the selected entries.
          SELECTION="$selection" python - > bulk-plan.json <<'PY'
          import datetime
          import json
          import os
          import sys

          sys.path.insert(0, "bulk")
          from roots_for import roots_for  # noqa: E402

          selection = json.loads(os.environ["SELECTION"])["include"]
          for item in selection:
              target = item.get("target")
              # A council/module `target` maps to its own jurisdiction roots; a
              # corpus `citation` produces a national-root module.
              item["roots"] = roots_for(target) if target else "uk"

          plan = {
              "generated_utc": datetime.datetime.now(datetime.timezone.utc).isoformat(),
              "batch": os.environ.get("BATCH") or "(all pending)",
              "limit": int(os.environ.get("LIMIT", "8")),
              "count": len(selection),
              "toolchain": {
                  "axiom_corpus_release": os.environ["RELEASE"],
                  "axiom_corpus_release_content_sha256": os.environ["RELEASE_SHA"],
                  "validation_waiver_set_sha256": os.environ["WAIVER_SHA"],
              },
              "pins": {
                  "axiom_encode_ref": os.environ["AXIOM_ENCODE_REF"],
                  "axiom_rules_engine_ref": os.environ["AXIOM_RULES_ENGINE_REF"],
                  "axiom_corpus_ref": os.environ["AXIOM_CORPUS_REF"],
                  "rulespec_us_ref": os.environ["RULESPEC_US_REF"],
                  "corpus_release_base_url": os.environ["CORPUS_RELEASE_BASE_URL"],
              },
              "corpus_path": "_axiom/axiom-corpus",
              "selection": selection,
          }
          print(json.dumps(plan, indent=2))
          PY

          # Human-readable plan summary.
          {
            echo "## Bulk encode plan"
            echo
            echo "- Batch: \`${BATCH:-(all pending)}\` | limit: \`$LIMIT\` | selected: **$count**"
            echo "- Corpus release: \`$RELEASE\`"
            echo "- Encoder pin: \`$AXIOM_ENCODE_REF\` (matches repository-checks.yml)"
            echo
            echo "\`bulk-plan.json\` (uploaded as an artifact) is consumed by an operator"
            echo "signed-apply session; see bulk/README.md. This workflow does not sign or open PRs."
            echo
            echo '| slug | backend:model | citation / target | roots |'
            echo '| --- | --- | --- | --- |'
          } >> "$GITHUB_STEP_SUMMARY"
          python - >> "$GITHUB_STEP_SUMMARY" <<'PY'
          import json
          plan = json.load(open("bulk-plan.json"))
          for item in plan["selection"]:
              ref = item.get("citation") or item.get("target") or ""
              print(f"| `{item['slug']}` | {item['backend']}:{item['model']} | `{ref}` | {item['roots']} |")
          PY

          if [ "$count" = "0" ]; then
            echo "::warning::No pending worklist entries match this dispatch (batch='${BATCH:-*}')." >&2
          fi

      - name: Upload encode plan
        uses: actions/upload-artifact@v4
        with:
          name: bulk-plan
          path: bulk-plan.json
          if-no-files-found: error

  verify-release:
    name: verify-release
    needs: plan
    if: ${{ inputs.verify_release }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rules repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Checkout axiom-corpus (pinned; matches repository-checks.yml)
        uses: actions/checkout@v6.0.2
        with:
          repository: TheAxiomFoundation/axiom-corpus
          ref: ${{ env.AXIOM_CORPUS_REF }}
          path: _axiom/axiom-corpus
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve corpus release identity
        id: toolchain
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          from pathlib import Path

          t = tomllib.loads(Path(".axiom/toolchain.toml").read_text())["toolchain"]
          print(f"release={t['axiom_corpus_release']}")
          print(f"content_sha256={t['axiom_corpus_release_content_sha256']}")
          PY

      - name: Fetch and verify the pinned signed corpus release object
        shell: bash
        env:
          RELEASE_BASE_URL: ${{ env.CORPUS_RELEASE_BASE_URL }}
          RELEASE_NAME: ${{ steps.toolchain.outputs.release }}
          RELEASE_CONTENT_SHA256: ${{ steps.toolchain.outputs.content_sha256 }}
        run: |
          set -euo pipefail
          # Mirrors the shared validate-rulespec resolution (name + content hash).
          # The Ed25519 signature and full grounding are verified by the
          # supervised PR CI and the operator session; this proves the pinned
          # release is published and content-consistent before a session starts.
          destination="_axiom/axiom-corpus/releases/$RELEASE_NAME/$RELEASE_CONTENT_SHA256.json"
          mkdir -p "$(dirname "$destination")"
          url="${RELEASE_BASE_URL%/}/releases/$RELEASE_NAME/$RELEASE_CONTENT_SHA256.json"
          if ! curl --fail --silent --show-error --location --proto '=https' --tlsv1.2 \
              --output "$destination.tmp" "$url"; then
            echo "::error::Pinned signed corpus release '$RELEASE_NAME' is not published at $url yet (release rebind pending). The plan is still valid; re-run verify-release once the release lands." >&2
            exit 1
          fi
          python - "$destination.tmp" "$RELEASE_NAME" "$RELEASE_CONTENT_SHA256" <<'PY'
          import hashlib
          import json
          import sys
          from pathlib import Path

          path, expected_name, expected_sha = Path(sys.argv[1]), sys.argv[2], sys.argv[3]
          try:
              payload = json.loads(path.read_bytes())
          except (OSError, json.JSONDecodeError) as exc:
              raise SystemExit(f"Corpus release object is not valid JSON: {exc}")
          if payload.get("release") != expected_name:
              raise SystemExit("Corpus release object: release name mismatch")
          content = payload.get("content")
          if not isinstance(content, dict):
              raise SystemExit("Corpus release object: missing content object")
          actual = hashlib.sha256(
              json.dumps(content, sort_keys=True, separators=(",", ":"), ensure_ascii=True).encode()
          ).hexdigest()
          if payload.get("content_sha256") != actual or actual != expected_sha:
              raise SystemExit(f"Corpus release object: content sha256 mismatch ({actual} != {expected_sha})")
          path.replace(path.with_suffix(""))
          print(f"Verified signed corpus release '{expected_name}' content sha256 {expected_sha}.")
          PY

      - name: Authenticate signed corpus provenance commit
        shell: bash
        env:
          RELEASE_NAME: ${{ steps.toolchain.outputs.release }}
          RELEASE_CONTENT_SHA256: ${{ steps.toolchain.outputs.content_sha256 }}
          AXIOM_CORPUS_SHA: ${{ env.AXIOM_CORPUS_REF }}
        run: |
          set -euo pipefail
          object="_axiom/axiom-corpus/releases/$RELEASE_NAME/$RELEASE_CONTENT_SHA256.json"
          release_commit="$(python - "$object" <<'PY'
          import json
          import sys

          print(json.load(open(sys.argv[1]))["content"]["git"]["commit"])
          PY
          )"
          if [[ ! "$release_commit" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Signed release provenance is not a full lowercase commit SHA." >&2
            exit 1
          fi
          default_branch="$(git -C _axiom/axiom-corpus ls-remote --symref origin HEAD | sed -n 's#^ref: refs/heads/\([^[:space:]]*\)[[:space:]]*HEAD$#\1#p')"
          git -C _axiom/axiom-corpus fetch --no-tags origin \
            "+refs/heads/$default_branch:refs/remotes/origin/$default_branch"
          git -C _axiom/axiom-corpus merge-base --is-ancestor \
            "$release_commit" "refs/remotes/origin/$default_branch" || {
              echo "::error::Signed release provenance $release_commit is not on the corpus default branch." >&2
              exit 1
            }
          git -C _axiom/axiom-corpus merge-base --is-ancestor \
            "$release_commit" "$AXIOM_CORPUS_SHA" || {
              echo "::error::Pinned corpus checkout $AXIOM_CORPUS_SHA predates signed release provenance $release_commit." >&2
              exit 1
            }
          echo "Signed release provenance $release_commit authenticated against the corpus default branch and the pinned checkout."
