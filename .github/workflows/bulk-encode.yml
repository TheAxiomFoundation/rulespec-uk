name: Bulk encode plan

# Post-#133 model. The canonical-provenance hard cut (axiom-encode#1108) removed
# the env-var apply-signing path this workflow's former autonomous
# `encode --apply` lane depended on. Under the pinned encoder (>= 0.2.1215):
#   * AXIOM_ENCODE_APPLY_SIGNING_KEY in the environment is FATAL at startup; and
#   * `encode --apply` signs the v5/Ed25519 apply manifest through an externally
#     attached trusted broker (an external Ed25519 signer connected on
#     `--apply-signer-fd`) with no unsigned path.
# No CI runner can provision that signer without reintroducing raw-private-key-
# in-CI, which is exactly what the hard cut removes. axiom-encode's own bulk
# lane was cut to routing-only for the same reason.
#
# So this workflow is now a PLANNER, not an autonomous signer. It:
#   * reads the strict 3-key .axiom/toolchain.toml (signed corpus release
#     binding: axiom_corpus_release + content sha256 + validation waiver-set
#     sha256), and rejects the removed pre-#133 keys;
#   * pins the encoder / engine / corpus / rulespec-us dependency refs
#     EXPLICITLY, matching .github/workflows/repository-checks.yml, so a
#     generation session and the PR CI resolve the identical toolchain;
#   * computes the batch selection from bulk/worklist.yaml
#     (bulk/compute_matrix.py) and emits it as `bulk-plan.json`; and
#   * (verify-release job) fetches and verifies the pinned signed corpus release
#     object from R2 + its provenance commit, mirroring the shared
#     validate-rulespec resolution semantics.
#
# HANDOFF (the clean seam the signed encode leg builds on). The plan is emitted
# two ways:
#   * job outputs `matrix` + `count` (the compute_matrix `{"include": [...]}`
#     JSON), so a downstream signer-attached `encode` job can fan out with
#     `strategy.matrix.item: fromJSON(needs.plan.outputs.matrix).include`; and
#   * the `bulk-plan.json` artifact -- the same selection enriched with the
#     pinned toolchain, dependency refs, corpus release, `corpus_path`, and
#     per-entry guard `roots` -- for out-of-workflow consumers.
#
# The TARGET consumer is the Path B CI apply-signer encode leg being built in
# axiom-encode (lane O; tracked in rulespec-uk#140). That leg checks out the
# pinned deps, provisions the trusted signing supervisor with an ATTACHED
# production external apply signer (`--apply-signer-fd`), runs
# `axiom-encode encode <citation> --apply` under it with
# `--corpus-path _axiom/axiom-corpus`, produces v5/Ed25519 modules + manifests,
# and opens PRs. This planner deliberately stops at the seam so that leg is added
# on top without reworking selection or resolution.
#
# This workflow NEVER signs, NEVER runs `encode --apply`, and NEVER opens PRs.
# The authoritative validation gate remains the required `validate / validate`
# check (repository-checks.yml -> the shared, supervised validate-rulespec
# workflow).

on:
  workflow_dispatch:
    inputs:
      batch:
        description: "Worklist batch label to plan (e.g. CTR-ENP, CTR-SC, CTR-WA). Empty = all pending."
        required: false
        type: string
        default: ""
      limit:
        description: "Max entries to include in the plan."
        required: false
        type: string
        default: "8"
      verify_release:
        description: "Fetch + verify the pinned signed corpus release object from R2 (fails closed until the release is published)."
        required: false
        type: boolean
        default: true
      run_encode:
        description: "Run the signed encode leg (attach the external apply signer, encode --apply, open PRs). Requires the apply signing secret. Schedule runs always encode."
        required: false
        type: boolean
        default: false

permissions:
  contents: read

# The plan job serialises whole dispatches; the encode job declares its own
# single-flight signing group so a signed apply transaction never overlaps.
concurrency:
  group: bulk-encode-plan
  cancel-in-progress: false

# Dependency pins, EXACTLY matching .github/workflows/repository-checks.yml so a
# generation session and the PR CI resolve the identical toolchain. Bump these
# in lockstep with repository-checks.yml.
env:
  AXIOM_ENCODE_REF: 185b2457c16df11bf328fd6257a5b7fbe3fe7534
  AXIOM_RULES_ENGINE_REF: 05eac9d2f89dabe5c6673176260762cef3a58f47
  AXIOM_CORPUS_REF: b5786e93a6286ae0dcb7b566b8499b6fe46c8b7a
  RULESPEC_US_REF: 0f291b367bf7e15555f9973112278c5cbf221653
  CORPUS_RELEASE_BASE_URL: https://pub-a8952f8657fc49fda358146ac001366c.r2.dev

jobs:
  plan:
    name: plan
    runs-on: ubuntu-latest
    # Seam for the Path B signer-attached encode leg (lane O): a downstream job
    # can `needs: plan` and fan out with
    # `strategy.matrix.item: fromJSON(needs.plan.outputs.matrix).include`.
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      count: ${{ steps.plan.outputs.count }}
    steps:
      - name: Checkout rules repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Install PyYAML
        run: python -m pip install --upgrade pip pyyaml

      - name: Resolve pinned RuleSpec toolchain (strict 3-key contract)
        id: toolchain
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import re
          import sys
          import tomllib
          from pathlib import Path

          EXPECTED = {
              "axiom_corpus_release",
              "axiom_corpus_release_content_sha256",
              "validation_waiver_set_sha256",
          }
          # Reading any of these removed pre-#133 keys is exactly the #144 defect.
          REMOVED = {
              "axiom_encode_ref",
              "axiom_rules_engine_ref",
              "axiom_corpus_ref",
              "rulespec_us_ref",
              "axiom_encode_version",
          }
          SHA256 = re.compile(r"[0-9a-f]{64}")

          data = tomllib.loads(Path(".axiom/toolchain.toml").read_text())
          if set(data) != {"toolchain"} or not isinstance(data["toolchain"], dict):
              sys.exit("toolchain.toml must contain exactly one [toolchain] table")
          t = data["toolchain"]
          leaked = REMOVED & set(t)
          if leaked:
              sys.exit(f"toolchain.toml still carries removed pre-#133 keys: {sorted(leaked)}")
          if set(t) != EXPECTED:
              sys.exit(f"[toolchain] must contain exactly {sorted(EXPECTED)}; got {sorted(t)}")
          for key in ("axiom_corpus_release_content_sha256", "validation_waiver_set_sha256"):
              if SHA256.fullmatch(str(t[key])) is None:
                  sys.exit(f"{key} must be a lowercase sha256 digest")
          for key in sorted(EXPECTED):
              print(f"{key}={t[key]}")
          PY
          echo "Resolved 3-key toolchain:"
          grep -E 'axiom_corpus_release|validation_waiver_set' "$GITHUB_OUTPUT" || true

      - name: Compute encode plan from worklist
        id: plan
        shell: bash
        env:
          BATCH: ${{ inputs.batch }}
          LIMIT: ${{ inputs.limit || '8' }}
          RELEASE: ${{ steps.toolchain.outputs.axiom_corpus_release }}
          RELEASE_SHA: ${{ steps.toolchain.outputs.axiom_corpus_release_content_sha256 }}
          WAIVER_SHA: ${{ steps.toolchain.outputs.validation_waiver_set_sha256 }}
        run: |
          set -euo pipefail
          args=(--status pending --format matrix --limit "$LIMIT")
          if [ -n "$BATCH" ]; then
            args+=(--batch "$BATCH")
          fi
          selection="$(python bulk/compute_matrix.py "${args[@]}")"
          count="$(python -c 'import json,sys; print(len(json.loads(sys.argv[1])["include"]))' "$selection")"
          # Seam outputs consumed by the Path B signer-attached encode leg (lane O).
          echo "matrix=$selection" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"

          # Assemble the operator plan: everything a signed-apply session needs to
          # resolve the identical toolchain and target the selected entries.
          SELECTION="$selection" python - > bulk-plan.json <<'PY'
          import datetime
          import json
          import os
          import sys

          sys.path.insert(0, "bulk")
          from roots_for import roots_for  # noqa: E402

          selection = json.loads(os.environ["SELECTION"])["include"]
          for item in selection:
              target = item.get("target")
              # A council/module `target` maps to its own jurisdiction roots; a
              # corpus `citation` produces a national-root module.
              item["roots"] = roots_for(target) if target else "uk"

          plan = {
              "generated_utc": datetime.datetime.now(datetime.timezone.utc).isoformat(),
              "batch": os.environ.get("BATCH") or "(all pending)",
              "limit": int(os.environ.get("LIMIT", "8")),
              "count": len(selection),
              "toolchain": {
                  "axiom_corpus_release": os.environ["RELEASE"],
                  "axiom_corpus_release_content_sha256": os.environ["RELEASE_SHA"],
                  "validation_waiver_set_sha256": os.environ["WAIVER_SHA"],
              },
              "pins": {
                  "axiom_encode_ref": os.environ["AXIOM_ENCODE_REF"],
                  "axiom_rules_engine_ref": os.environ["AXIOM_RULES_ENGINE_REF"],
                  "axiom_corpus_ref": os.environ["AXIOM_CORPUS_REF"],
                  "rulespec_us_ref": os.environ["RULESPEC_US_REF"],
                  "corpus_release_base_url": os.environ["CORPUS_RELEASE_BASE_URL"],
              },
              "corpus_path": "_axiom/axiom-corpus",
              "selection": selection,
          }
          print(json.dumps(plan, indent=2))
          PY

          # Human-readable plan summary.
          {
            echo "## Bulk encode plan"
            echo
            echo "- Batch: \`${BATCH:-(all pending)}\` | limit: \`$LIMIT\` | selected: **$count**"
            echo "- Corpus release: \`$RELEASE\`"
            echo "- Encoder pin: \`$AXIOM_ENCODE_REF\` (matches repository-checks.yml)"
            echo
            echo "\`bulk-plan.json\` (uploaded as an artifact) is consumed by an operator"
            echo "signed-apply session; see bulk/README.md. This workflow does not sign or open PRs."
            echo
            echo '| slug | backend:model | citation / target | roots |'
            echo '| --- | --- | --- | --- |'
          } >> "$GITHUB_STEP_SUMMARY"
          python - >> "$GITHUB_STEP_SUMMARY" <<'PY'
          import json
          plan = json.load(open("bulk-plan.json"))
          for item in plan["selection"]:
              ref = item.get("citation") or item.get("target") or ""
              print(f"| `{item['slug']}` | {item['backend']}:{item['model']} | `{ref}` | {item['roots']} |")
          PY

          if [ "$count" = "0" ]; then
            echo "::warning::No pending worklist entries match this dispatch (batch='${BATCH:-*}')." >&2
          fi

      - name: Upload encode plan
        uses: actions/upload-artifact@v4
        with:
          name: bulk-plan
          path: bulk-plan.json
          if-no-files-found: error

  verify-release:
    name: verify-release
    needs: plan
    if: ${{ inputs.verify_release }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rules repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Checkout axiom-corpus (pinned; matches repository-checks.yml)
        uses: actions/checkout@v6.0.2
        with:
          repository: TheAxiomFoundation/axiom-corpus
          ref: ${{ env.AXIOM_CORPUS_REF }}
          path: _axiom/axiom-corpus
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve corpus release identity
        id: toolchain
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          from pathlib import Path

          t = tomllib.loads(Path(".axiom/toolchain.toml").read_text())["toolchain"]
          print(f"release={t['axiom_corpus_release']}")
          print(f"content_sha256={t['axiom_corpus_release_content_sha256']}")
          PY

      - name: Fetch and verify the pinned signed corpus release object
        shell: bash
        env:
          RELEASE_BASE_URL: ${{ env.CORPUS_RELEASE_BASE_URL }}
          RELEASE_NAME: ${{ steps.toolchain.outputs.release }}
          RELEASE_CONTENT_SHA256: ${{ steps.toolchain.outputs.content_sha256 }}
        run: |
          set -euo pipefail
          # Mirrors the shared validate-rulespec resolution (name + content hash).
          # The Ed25519 signature and full grounding are verified by the
          # supervised PR CI and the operator session; this proves the pinned
          # release is published and content-consistent before a session starts.
          destination="_axiom/axiom-corpus/releases/$RELEASE_NAME/$RELEASE_CONTENT_SHA256.json"
          mkdir -p "$(dirname "$destination")"
          url="${RELEASE_BASE_URL%/}/releases/$RELEASE_NAME/$RELEASE_CONTENT_SHA256.json"
          if ! curl --fail --silent --show-error --location --proto '=https' --tlsv1.2 \
              --output "$destination.tmp" "$url"; then
            echo "::error::Pinned signed corpus release '$RELEASE_NAME' is not published at $url yet (release rebind pending). The plan is still valid; re-run verify-release once the release lands." >&2
            exit 1
          fi
          python - "$destination.tmp" "$RELEASE_NAME" "$RELEASE_CONTENT_SHA256" <<'PY'
          import hashlib
          import json
          import sys
          from pathlib import Path

          path, expected_name, expected_sha = Path(sys.argv[1]), sys.argv[2], sys.argv[3]
          try:
              payload = json.loads(path.read_bytes())
          except (OSError, json.JSONDecodeError) as exc:
              raise SystemExit(f"Corpus release object is not valid JSON: {exc}")
          if payload.get("release") != expected_name:
              raise SystemExit("Corpus release object: release name mismatch")
          content = payload.get("content")
          if not isinstance(content, dict):
              raise SystemExit("Corpus release object: missing content object")
          actual = hashlib.sha256(
              json.dumps(content, sort_keys=True, separators=(",", ":"), ensure_ascii=True).encode()
          ).hexdigest()
          if payload.get("content_sha256") != actual or actual != expected_sha:
              raise SystemExit(f"Corpus release object: content sha256 mismatch ({actual} != {expected_sha})")
          path.replace(path.with_suffix(""))
          print(f"Verified signed corpus release '{expected_name}' content sha256 {expected_sha}.")
          PY

      - name: Authenticate signed corpus provenance commit
        shell: bash
        env:
          RELEASE_NAME: ${{ steps.toolchain.outputs.release }}
          RELEASE_CONTENT_SHA256: ${{ steps.toolchain.outputs.content_sha256 }}
          AXIOM_CORPUS_SHA: ${{ env.AXIOM_CORPUS_REF }}
        run: |
          set -euo pipefail
          object="_axiom/axiom-corpus/releases/$RELEASE_NAME/$RELEASE_CONTENT_SHA256.json"
          release_commit="$(python - "$object" <<'PY'
          import json
          import sys

          print(json.load(open(sys.argv[1]))["content"]["git"]["commit"])
          PY
          )"
          if [[ ! "$release_commit" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Signed release provenance is not a full lowercase commit SHA." >&2
            exit 1
          fi
          default_branch="$(git -C _axiom/axiom-corpus ls-remote --symref origin HEAD | sed -n 's#^ref: refs/heads/\([^[:space:]]*\)[[:space:]]*HEAD$#\1#p')"
          git -C _axiom/axiom-corpus fetch --no-tags origin \
            "+refs/heads/$default_branch:refs/remotes/origin/$default_branch"
          git -C _axiom/axiom-corpus merge-base --is-ancestor \
            "$release_commit" "refs/remotes/origin/$default_branch" || {
              echo "::error::Signed release provenance $release_commit is not on the corpus default branch." >&2
              exit 1
            }
          git -C _axiom/axiom-corpus merge-base --is-ancestor \
            "$release_commit" "$AXIOM_CORPUS_SHA" || {
              echo "::error::Pinned corpus checkout $AXIOM_CORPUS_SHA predates signed release provenance $release_commit." >&2
              exit 1
            }
          echo "Signed release provenance $release_commit authenticated against the corpus default branch and the pinned checkout."

  # ------------------------------------------------------------------------
  # Signed encode leg (Path B, lane O; rulespec-uk#140). Attaches to the plan
  # seam: fans out over the planner's matrix and, for each entry, provisions the
  # trusted signing supervisor with an ATTACHED production external apply signer
  # (axiom-encode `cmd/axiom-encode-apply-signer`), runs `encode --apply` under
  # it to produce a v5/Ed25519 module + manifest, and opens one PR per module.
  #
  # Secret exposure discipline: this workflow triggers ONLY on workflow_dispatch
  # and schedule (never pull_request), so fork- or PR-modified workflow text can
  # never see AXIOM_ENCODE_APPLY_SIGNER_ED25519_PRIVATE_KEY. The signer also binds
  # to this repository + the main-branch workflow ref + those two events, and
  # refuses pull_request unconditionally, enforcing the same rule a second time.
  # The private key is passed to the signer over a pipe by the launcher, which
  # clears it from the environment before the supervised encoder starts.
  encode:
    name: encode
    needs: plan
    if: ${{ needs.plan.outputs.count != '0' && (github.event_name == 'schedule' || inputs.run_encode) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      # One signed apply transaction at a time: a single signer, a single
      # apply-manifest install.
      group: bulk-encode-sign
      cancel-in-progress: false
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        item: ${{ fromJSON(needs.plan.outputs.matrix).include }}
    steps:
      - name: Checkout rules repository
        uses: actions/checkout@v6.0.2
        with:
          # BULK_ENCODE_TOKEN so the opened PR triggers the required validate CI.
          token: ${{ secrets.BULK_ENCODE_TOKEN }}
          persist-credentials: true

      - name: Guard checkout leaf directory
        shell: bash
        run: |
          set -euo pipefail
          base="$(basename "$GITHUB_WORKSPACE")"
          if [ "$base" != "rulespec-uk" ]; then
            echo "::error::--apply resolver requires the checkout leaf dir to be 'rulespec-uk' (got '$base')." >&2
            exit 1
          fi

      - name: Checkout axiom-encode (inherits the proven AXIOM_ENCODE_REF)
        # Resolves the workflow-level AXIOM_ENCODE_REF unchanged. The external
        # apply signer (cmd/axiom-encode-apply-signer) exists only in commits at
        # or after axiom-encode#1135 (c04e8608). Until Max's CODEOWNERS-gated
        # lockstep re-pin bumps AXIOM_ENCODE_REF (here and in
        # repository-checks.yml) to such a commit, this leg is inert: the build
        # step below fails closed with a clear message. This PR never bumps it.
        uses: actions/checkout@v6.0.2
        with:
          repository: TheAxiomFoundation/axiom-encode
          ref: ${{ env.AXIOM_ENCODE_REF }}
          path: _axiom/axiom-encode
          persist-credentials: false

      - name: Checkout axiom-rules-engine (pinned)
        uses: actions/checkout@v6.0.2
        with:
          repository: TheAxiomFoundation/axiom-rules-engine
          ref: ${{ env.AXIOM_RULES_ENGINE_REF }}
          path: _axiom/axiom-rules-engine
          persist-credentials: false

      - name: Checkout axiom-corpus (pinned)
        uses: actions/checkout@v6.0.2
        with:
          repository: TheAxiomFoundation/axiom-corpus
          ref: ${{ env.AXIOM_CORPUS_REF }}
          path: _axiom/axiom-corpus
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout rulespec-us (pinned; encode target)
        uses: actions/checkout@v6.0.2
        with:
          repository: TheAxiomFoundation/rulespec-us
          ref: ${{ env.RULESPEC_US_REF }}
          path: _axiom/rulespec-us
          persist-credentials: false

      - name: Set up Go 1.26.1
        uses: actions/setup-go@v6.5.0
        with:
          go-version: 1.26.1
          cache: false

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"

      - name: Install axiom-encode into a build venv (site-packages source)
        working-directory: _axiom/axiom-encode
        run: |
          set -euo pipefail
          python -m venv "$RUNNER_TEMP/axiom-encode-venv"
          "$RUNNER_TEMP/axiom-encode-venv/bin/pip" install --quiet --upgrade pip
          "$RUNNER_TEMP/axiom-encode-venv/bin/pip" install --quiet .

      - name: Build axiom-rules-engine
        working-directory: _axiom/axiom-rules-engine
        run: cargo build --verbose

      - name: Expose engine and sibling checkouts
        shell: bash
        run: |
          set -euo pipefail
          echo "$GITHUB_WORKSPACE/_axiom/axiom-rules-engine/target/debug" >> "$GITHUB_PATH"
          ln -sfn "$GITHUB_WORKSPACE/_axiom/axiom-rules-engine" "$GITHUB_WORKSPACE/../axiom-rules-engine"
          ln -sfn "$GITHUB_WORKSPACE/_axiom/axiom-corpus" "$GITHUB_WORKSPACE/../axiom-corpus"
          ln -sfn "$GITHUB_WORKSPACE/_axiom/rulespec-us" "$GITHUB_WORKSPACE/../rulespec-us"

      - name: Build the signing supervisor and external apply signer
        working-directory: _axiom/axiom-encode
        env:
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          # Fail closed with an actionable message when the pinned encoder
          # predates the apply signer (axiom-encode#1135 / c04e8608). This leg
          # is inert until Max's CODEOWNERS-gated lockstep re-pin bumps
          # AXIOM_ENCODE_REF; this workflow never bumps it.
          if [ ! -d ./cmd/axiom-encode-apply-signer ]; then
            echo "::error::Pinned axiom-encode ($AXIOM_ENCODE_REF) has no cmd/axiom-encode-apply-signer. The signed encode leg is inert until the CODEOWNERS-gated lockstep re-pin bumps AXIOM_ENCODE_REF (here and in repository-checks.yml) to a commit >= c04e8608 that contains the external apply signer." >&2
            exit 1
          fi
          go build -trimpath -buildvcs=false -ldflags='-buildid=' \
            -o "$RUNNER_TEMP/axiom-encode-signing-supervisor" \
            ./cmd/axiom-encode-signing-supervisor
          go build -trimpath -buildvcs=false -ldflags='-buildid=' \
            -o "$RUNNER_TEMP/axiom-encode-apply-signer" \
            ./cmd/axiom-encode-apply-signer
          test "$("$RUNNER_TEMP/axiom-encode-apply-signer" --build-kind)" = production
          test "$("$RUNNER_TEMP/axiom-encode-signing-supervisor" --build-kind)" = production

      - name: Provision the protected signing supervisor (root-owned)
        working-directory: _axiom/axiom-encode
        env:
          TRUST_APPLY_ROOT: ${{ vars.AXIOM_ENCODE_APPLY_SIGNING_PUBLIC_KEY }}
          TRUST_EVAL_ROOT: ${{ vars.AXIOM_ENCODE_EVAL_SIGNING_PUBLIC_KEY }}
          TRUST_CORPUS_RELEASE_ROOT: ${{ vars.AXIOM_CORPUS_RELEASE_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          test -n "$TRUST_APPLY_ROOT" && test -n "$TRUST_EVAL_ROOT" && test -n "$TRUST_CORPUS_RELEASE_ROOT"
          # The provisioner copies the invoking interpreter's sys.base_prefix and
          # the given site-packages into a self-contained, root-owned runtime.
          # sudo resets PATH, so resolve the setup-python interpreter here and
          # pass its absolute path through.
          PYTHON="$(command -v python)"
          # The build venv's site-packages (contains axiom_encode + its deps) is
          # the source tree the provisioner seals into the root-owned runtime.
          SITE_PACKAGES="$RUNNER_TEMP/axiom-encode-venv/lib/python3.13/site-packages"
          test -d "$SITE_PACKAGES"
          sudo rm -rf /opt/axiom-signing
          sudo "$PYTHON" scripts/provision_verification_supervisor.py \
            --destination /opt/axiom-signing \
            --supervisor "$RUNNER_TEMP/axiom-encode-signing-supervisor" \
            --site-packages "$SITE_PACKAGES" \
            --apply-root "$TRUST_APPLY_ROOT" --eval-root "$TRUST_EVAL_ROOT" \
            --corpus-release-root "$TRUST_CORPUS_RELEASE_ROOT"
          sudo chown -R 0:0 /opt/axiom-signing
          sudo chmod -R go-w /opt/axiom-signing
          # `encode --apply` shells out to git for provenance; install it into the
          # trusted runtime's bin (the supervised child's PATH = that bin dir).
          sudo install -m 0755 "$(command -v git)" \
            "/opt/axiom-signing/python/bin/git"
          sudo chown root:root /opt
          sudo chmod go-w /opt

      - name: Encode --apply under the attached external apply signer
        id: encode
        shell: bash
        env:
          CITATION: ${{ matrix.item.citation }}
          TARGET: ${{ matrix.item.target }}
          BACKEND: ${{ matrix.item.backend }}
          MODEL: ${{ matrix.item.model }}
          # Model backend key (parent-only allowlist the supervisor forwards to
          # generation subprocesses).
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # The Ed25519 apply private key. Delivered ONLY to this step's env; the
          # launcher reads it, clears it, and streams it to the signer over a
          # pipe. Never reaches the supervised encoder's environment.
          AXIOM_ENCODE_APPLY_SIGNER_ED25519_PRIVATE_KEY: ${{ secrets.AXIOM_ENCODE_APPLY_SIGNER_ED25519_PRIVATE_KEY }}
          AXIOM_CORPUS_REPO: ${{ github.workspace }}/_axiom/axiom-corpus
          AXIOM_RULESPEC_REPO_ROOTS: ${{ github.workspace }}
        run: |
          set -euo pipefail
          ref="${CITATION:-$TARGET}"
          if [ -z "$ref" ]; then
            echo "::error::worklist entry has neither citation nor target." >&2
            exit 1
          fi
          # Runtime python version is fixed by the setup-python step above (3.13);
          # the provisioned tree carries python3.13 lib paths.
          site="/opt/axiom-signing/python/lib/python3.13/site-packages"

          set +e
          "$RUNNER_TEMP/axiom-encode-apply-signer" run \
            --scope apply_ed25519 \
            --key-env AXIOM_ENCODE_APPLY_SIGNER_ED25519_PRIVATE_KEY \
            --supervisor /opt/axiom-signing/axiom-encode-signing-supervisor \
            --trusted-signing-roots /opt/axiom-signing/signing-trust-roots.json \
            --trusted-python-runtime-root /opt/axiom-signing/python \
            --trusted-python-import-root "$site" \
            --trusted-python-package-root "$site/axiom_encode" \
            --expected-github-repository "$GITHUB_REPOSITORY" \
            --allowed-workflow-ref "${GITHUB_REPOSITORY}/.github/workflows/bulk-encode.yml@refs/heads/${GITHUB_REF_NAME}" \
            --allowed-event-name workflow_dispatch \
            --allowed-event-name schedule \
            -- /opt/axiom-signing/axiom-encode encode "$ref" \
               --backend "$BACKEND" --model "$MODEL" \
               --policy-repo-path "$GITHUB_WORKSPACE" \
               --axiom-rules-engine-path "$GITHUB_WORKSPACE/_axiom/axiom-rules-engine" \
               --corpus-path "$GITHUB_WORKSPACE/_axiom/axiom-corpus" \
               --output "$RUNNER_TEMP/encode-out" \
               --apply --no-sync 2>&1 | tee "$RUNNER_TEMP/encode.log"
          apply_status=${PIPESTATUS[0]}
          set -e

          mapfile -t applied < <(git -C "$GITHUB_WORKSPACE" status --porcelain -uall \
            | sed 's/^...//' \
            | grep -E '^[a-z]{2}(-[a-z0-9-]+)?/(statutes|regulations|policies)/.*\.yaml$' \
            | grep -v '\.test\.yaml$' || true)
          if [ "$apply_status" -ne 0 ] || [ "${#applied[@]}" -eq 0 ]; then
            echo "::error::encode --apply failed or wrote no module (status=$apply_status)." >&2
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "status=green" >> "$GITHUB_OUTPUT"
          echo "applied=${applied[0]}" >> "$GITHUB_OUTPUT"

      - name: Open PR
        if: ${{ steps.encode.outputs.status == 'green' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.BULK_ENCODE_TOKEN }}
          REF: ${{ matrix.item.citation || matrix.item.target }}
          SLUG: ${{ matrix.item.slug }}
          BACKEND: ${{ matrix.item.backend }}
          MODEL: ${{ matrix.item.model }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          branch="bulk/$SLUG"
          gh label create bulk-encode --repo "$GITHUB_REPOSITORY" \
            --color 1f6feb --description "Opened by the signed bulk-encode leg" 2>/dev/null || true
          body="$RUNNER_TEMP/pr-body.md"
          {
            echo "Produced by \`axiom-encode encode $REF --apply\` under the trusted signing"
            echo "supervisor with an attached external Ed25519 apply signer (backend $BACKEND,"
            echo "model $MODEL). Values are the encoder's; this PR is plumbing."
            echo
            echo "The apply manifest is signed \`ed25519-domain-v1\` over"
            echo "\`axiom-encode/applied-rulespec/v5\`. The authoritative gate is the required"
            echo "\`validate / validate\` check on this PR."
          } > "$body"
          git -C "$GITHUB_WORKSPACE" -c user.email=bulk-encode@axiom \
            -c user.name="bulk-encode" add -A
          git -C "$GITHUB_WORKSPACE" -c user.email=bulk-encode@axiom \
            -c user.name="bulk-encode" commit -q \
            -m "Encode $REF via the signed bulk-encode leg" \
            -m "" \
            -m "Produced by axiom-encode encode $REF --apply (backend $BACKEND, model $MODEL)." \
            -m "" \
            -m "Co-Authored-By: Claude Fable 5 <noreply@anthropic.com>"
          git -C "$GITHUB_WORKSPACE" push -f origin "HEAD:$branch"
          pr_state="$(gh pr view "$branch" --repo "$GITHUB_REPOSITORY" --json state -q .state 2>/dev/null || true)"
          if [ "$pr_state" = "OPEN" ]; then
            gh pr edit "$branch" --repo "$GITHUB_REPOSITORY" \
              --title "Encode $REF (bulk)" --body-file "$body" --add-label bulk-encode
          else
            gh pr create --repo "$GITHUB_REPOSITORY" \
              --base "$DEFAULT_BRANCH" --head "$branch" \
              --title "Encode $REF (bulk)" --body-file "$body" --label bulk-encode
          fi
          echo "PR ready for $REF on branch $branch."
