name: Repository Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    uses: TheAxiomFoundation/.github/.github/workflows/validate-rulespec.yml@main
    secrets: inherit
    with:
      validate-roots: auto
      # Re-enabled after the monorepo migration (carried 2026-06-12); the
      # full corpus now carries encoder apply-manifests or baseline manual
      # attestations (encode#1053).
      run-generated-guard: true
      # Pilot the composed-pilot programs/ guarding (encode#1053).
      guard-programs-root: true
