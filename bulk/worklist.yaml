  note: Self-contained anti-avoidance attribution rule; only internal sub-paragraph references.
- citation: uk/regulation/uksi/2012/2885/schedule/1/paragraph/13
  repo: rulespec-uk
  batch: CTR-ENP
  status: done
  heading: Schedule 1 paragraph 13 - Applicant in receipt of guarantee credit
