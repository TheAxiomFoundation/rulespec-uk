    encumbrance.'
- citation: uk/regulation/uksi/2012/2885/schedule/1/paragraph/34
  repo: rulespec-uk
  batch: CTR-ENP
  status: done
  heading: Schedule 1 paragraph 34 - Notional capital
  class: mechanics
  note: Deprivation-of-capital rule; self-contained principle with a single caveat reference to the diminishing-capital
    paragraph.
- citation: uk/regulation/uksi/2012/2885/schedule/1/paragraph/36
  repo: rulespec-uk
  batch: CTR-ENP
  status: done
  heading: Schedule 1 paragraph 36 - Capital jointly held
  class: mechanics
  note: Self-contained equal-share rule for jointly held capital; one exception reference to notional-capital.
- citation: uk/regulation/uksi/2012/2885/schedule/3/paragraph/1
  repo: rulespec-uk
  batch: CTR-ENP
  status: pending
  heading: Schedule 3 paragraph 1 - Amount of alternative maximum council tax reduction
  class: rate
  note: Second adult rebate table with concrete rates 25/15/7.5 per cent and gross-income thresholds GBP
    289.00/375.00 (current 2026-27 values); self-contained table.
- citation: uk/regulation/uksi/2012/2885/schedule/3/paragraph/3
  repo: rulespec-uk
  batch: CTR-ENP
  status: done
  heading: Schedule 3 paragraph 3 - Two or more second adults
  class: mechanics
  note: Self-contained income-aggregation rule for multiple second adults; single external reference to
    the 1992 Act discount schedule.
- citation: uk/regulation/uksi/2012/2885/schedule/4/paragraph/1
  repo: rulespec-uk
  batch: CTR-ENP
  status: done
