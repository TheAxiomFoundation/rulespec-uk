- citation: uk/regulation/uksi/2012/2885/schedule/1/paragraph/11
  repo: rulespec-uk
  batch: CTR-ENP
  status: done
  heading: 'Schedule 1 paragraph 11 - Calculation of income and capital: family and polygamous marriages'
