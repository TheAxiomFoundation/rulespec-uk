  note: 'Concrete cap: GBP 25 (lone parent) / GBP 20 (other) overall earnings disregard; self-contained.'
- citation: uk/regulation/uksi/2012/2885/schedule/4/paragraph/2
  repo: rulespec-uk
  batch: CTR-ENP
  status: done
  heading: Schedule 4 paragraph 2 - Lone parent earnings disregard
  class: deduction
  note: 'Zero cross-reference: GBP 25 of earnings disregarded for a lone parent.'
- citation: uk/regulation/uksi/2012/2885/schedule/4/paragraph/4
  repo: rulespec-uk
  batch: CTR-ENP
  status: pending
  heading: Schedule 4 paragraph 4 - Carer earnings disregard
  class: deduction
  note: Concrete GBP 20 carer earnings disregard with aggregation cap; single reference to the carer-premium
    condition.
- citation: uk/regulation/uksi/2012/2885/schedule/4/paragraph/9
  repo: rulespec-uk
  batch: CTR-ENP
  status: done
  heading: Schedule 4 paragraph 9 - Earnings from employment that has ended
  class: deduction
  note: Self-contained full disregard of earnings from employment ended before entitlement; one carve-out
    reference.
- citation: uk/regulation/uksi/2012/2885/schedule/5/paragraph/7
  repo: rulespec-uk
  batch: CTR-ENP
  status: done
  heading: Schedule 5 paragraph 7 - Widowed parent's allowance disregard
  class: deduction
  note: Concrete GBP 15 disregard of widowed parent's allowance; external anchor to SSCBA s.39A only.
- citation: uk/regulation/uksi/2012/2885/schedule/5/paragraph/8
  repo: rulespec-uk
  batch: CTR-ENP
  status: done
  heading: Schedule 5 paragraph 8 - Widowed mother's allowance disregard
  class: deduction
  note: Concrete GBP 15 disregard of widowed mother's allowance; external anchor to SSCBA s.37 only.
- citation: uk/regulation/uksi/2012/2885/schedule/6/paragraph/1
  repo: rulespec-uk
  batch: CTR-ENP
  status: done
  heading: Schedule 6 paragraph 1 - Premises to be occupied as home
  class: deduction
  note: 'Self-contained capital disregard: premises to be occupied within 26 weeks.'
- citation: uk/regulation/uksi/2012/2885/schedule/6/paragraph/8
  repo: rulespec-uk
  batch: CTR-ENP
  status: done
  heading: Schedule 6 paragraph 8 - Personal possessions
  class: deduction
  note: 'Zero cross-reference capital disregard: all personal possessions.'
- citation: uk/regulation/uksi/2012/2885/schedule/6/paragraph/11
  repo: rulespec-uk
  batch: CTR-ENP
  status: done
  heading: Schedule 6 paragraph 11 - Surrender value of life insurance
  class: deduction
  note: 'Zero cross-reference capital disregard: surrender value of any life insurance policy.'
- citation: uk/regulation/uksi/2012/2885/schedule/6/paragraph/26
  repo: rulespec-uk
  batch: CTR-ENP
  status: done
  heading: Schedule 6 paragraph 26 - Dwelling occupied as the home
  class: deduction
  note: 'Self-contained capital disregard: the dwelling occupied as the home (one only).'
- citation: uk/regulation/ssi/2021/249/13
  repo: rulespec-uk
  batch: CTR-SC
  status: pending
  heading: Conditions of entitlement to council tax reduction (CTR(S) Regs 2021 reg 13)
  class: entitlement
  note: Working-age award spine. Entitlement conditions plus the amount formula - max CTR where income
    <= applicable amount, else max CTR less amount B where amount B is 2 6/7 per cent of (weekly income
    - applicable amount). References sibling exclusion regs 15/16/19/20 and reg 66 as conditions, not
    value imports.
- citation: uk/regulation/ssi/2021/249/14
  repo: rulespec-uk
  batch: CTR-SC
  status: pending
  heading: Conditions of entitlement - dwellings in bands E to H (CTR(S) Regs 2021 reg 14)
  class: entitlement
  note: Higher-band variant of reg 13 with band income limits GBP 321 / GBP 479 and the same 2 6/7 per
    cent taper; applies where its amount exceeds the reg 13 amount.
- citation: uk/regulation/ssi/2021/249/35
  repo: rulespec-uk
  batch: CTR-SC
  status: done
  heading: Applicable amount (CTR(S) Regs 2021 reg 35)
  class: mechanics
  note: Weekly applicable amount = aggregate of personal allowance plus child, disabled child, carer and
    other premiums, each determined under a Schedule 1 paragraph.
- citation: uk/regulation/ssi/2021/249/63
  repo: rulespec-uk
  batch: CTR-SC
  status: pending
  heading: Assumed yield from capital / tariff income (CTR(S) Regs 2021 reg 63)
  class: mechanics
  note: Self-contained tariff income - capital yields GBP 4.35/month (GBP 1/week) for each GBP 250, or
    part, in excess of GBP 6,000.
- citation: uk/regulation/ssi/2021/249/66
  repo: rulespec-uk
  batch: CTR-SC
  status: done
  heading: Capital limit (CTR(S) Regs 2021 reg 66)
  class: mechanics
  note: Self-contained - no entitlement where capital exceeds GBP 16,000. Single sentence.
- citation: uk/regulation/ssi/2021/249/79
  repo: rulespec-uk
  batch: CTR-SC
  status: pending
  heading: Maximum council tax reduction (CTR(S) Regs 2021 reg 79)
  class: mechanics
  note: Maximum CTR = amount A / amount B, A = annual council tax for the dwelling, B = days in the year,
    less non-dependant deductions; band multipliers 1.075-1.225 for bands E-H. References reg 90 for the
    deductions term.
- citation: uk/regulation/ssi/2021/249/91
  repo: rulespec-uk
  batch: CTR-SC
  status: done
  heading: Second adult rebate (CTR(S) Regs 2021 reg 91)
  class: mechanics
  note: Second adult rebate where reg 13(3) and (7) are met, determined per Schedule 2, apportioned across
    jointly and severally liable residents.
- citation: uk/regulation/ssi/2021/249/schedule/1/paragraph/1
  repo: rulespec-uk
  batch: CTR-SC
  status: done
  heading: Personal allowances table (CTR(S) Regs 2021 Sch 1 para 1)
  class: rate
  note: Weekly personal allowance amounts - e.g. GBP 75.65 (single under 25), GBP 95.55 (single 25+, or
    lone parent) for purposes of reg 35(a).
- citation: uk/regulation/ssi/2021/249/schedule/1/paragraph/2
  repo: rulespec-uk
  batch: CTR-SC
  status: done
  heading: Child premium amount (CTR(S) Regs 2021 Sch 1 para 2)
  class: rate
  note: Self-contained - child premium is GBP 109.85 for each child or young person (reg 35(b)).
- citation: uk/regulation/ssi/2021/249/schedule/2/paragraph/1
  repo: rulespec-uk
  batch: CTR-SC
  status: pending
  heading: Amount of second adult rebate table (CTR(S) Regs 2021 Sch 2 para 1)
  class: rate
  note: Second adult rebate = 25 / 15 / 7.5 per cent of the day's council tax by the second adult's benefit
    status and gross income bands (GBP 282 / GBP 383).
- citation: uk/regulation/ssi/2012/319/14
  repo: rulespec-uk
  batch: CTR-SC
  status: pending
  heading: Conditions of entitlement to council tax reduction (CTR(SPC)(S) Regs 2012 reg 14)
  class: entitlement
  note: Pension-age award spine. Entitlement conditions plus amount formula with the same 2 6/7 per cent
    taper of (weekly income - applicable amount) against daily max CTR.
- citation: uk/regulation/ssi/2012/319/14A
  repo: rulespec-uk
  batch: CTR-SC
  status: done
  heading: Conditions of entitlement - dwellings in bands E to H (CTR(SPC)(S) Regs 2012 reg 14A)
  class: entitlement
  note: Pension-age higher-band variant of reg 14; applies where its amount exceeds the reg 14 amount.
- citation: uk/regulation/ssi/2012/319/20
  repo: rulespec-uk
  batch: CTR-SC
  status: done
  heading: Applicable amount (CTR(SPC)(S) Regs 2012 reg 20)
  class: mechanics
  note: Pension-age applicable amount = personal allowance (Sch 1 para 2) plus child (para 3), premiums
    (Parts 3-4) and a GBP 19.48 transitional family amount.
- citation: uk/regulation/ssi/2012/319/40
  repo: rulespec-uk
  batch: CTR-SC
  status: done
  heading: Capital limit (CTR(SPC)(S) Regs 2012 reg 40)
  class: mechanics
  note: Self-contained - no entitlement where capital exceeds GBP 16,000.
- citation: uk/regulation/ssi/2012/319/47
