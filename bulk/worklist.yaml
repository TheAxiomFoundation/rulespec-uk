  note: 'Zero cross-references: partner/polygamous income and capital treated as applicant''s.'
- citation: uk/regulation/uksi/2012/2885/schedule/1/paragraph/12
  repo: rulespec-uk
  batch: CTR-ENP
  status: done
  heading: Schedule 1 paragraph 12 - Non-dependant income and capital treated as applicant's
