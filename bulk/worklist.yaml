- citation: uk/regulation/uksi/2012/2885/schedule/1/paragraph/31
  repo: rulespec-uk
  batch: CTR-ENP
  status: pending
  heading: Schedule 1 paragraph 31 - Calculation of capital
  class: mechanics
  note: 'Capital head: whole capital less Schedule 6 disregards, plus CTC/WTC/SPC arrears treated as capital;
