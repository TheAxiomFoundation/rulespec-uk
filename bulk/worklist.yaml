  batch: CTR-ENP
  status: done
  heading: Regulation 11 - Pensioners (prescribed classes; capital limit)
  class: definition
  note: 'Self-contained: prescribes the pensioner classes and the GBP 16,000 capital limit (capital exceeding
    it must be excluded); references are external anchors (Sch 1A to the 1992 Act), not sibling-subsection
    imports.'
