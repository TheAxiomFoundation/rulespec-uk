format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/7/paragraph/1
  summary: |-
    The amounts specified in column (2) below in respect of each person or couple specified in column (1) are to be the amounts specified for the purposes of paragraphs 1(1)(a) and 2(2)(a) and (b) of Schedule 6.
rules:
  - name: single_applicant_main_phase_employment_and_support_allowance_amount
    kind: parameter
    dtype: Money
    period: Week
    unit: GBP
    source: Schedule 7 paragraph 1, column (2), item 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/7/paragraph/1
              excerpt: "| is entitled to main phase employment and support allowance; | £101.85; |"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          101.85

  - name: single_applicant_aged_not_less_than_25_amount
    kind: parameter
    dtype: Money
    period: Week
    unit: GBP
