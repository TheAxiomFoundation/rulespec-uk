format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/1/paragraph/1
  summary: |-
    “The applicable amount for a pensioner for a week is the aggregate” of the applicable personal allowance, child or young person amount, family premium, and premiums. “Additional spouse” means a spouse additional to the other party to the marriage; “patient” excludes a person serving a sentence of imprisonment or detention in a youth custody institution.
rules:
  - name: pensioner_weekly_applicable_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Week
    unit: GBP
    source: Schedule 1 paragraph 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/1/paragraph/1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          personal_allowance_amount
          + child_or_young_person_amount
          + family_premium_amount
          + applicable_premiums_amount
  - name: additional_spouse
    kind: derived
    entity: Person
    dtype: Judgment
    period: Week
    source: Schedule 1 paragraph 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/1/paragraph/1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_spouse_of_either_party_to_marriage
          and person_is_additional_to_other_party_to_marriage
  - name: patient
    kind: derived
    entity: Person
    dtype: Judgment
    period: Week
    source: Schedule 1 paragraph 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/1/paragraph/1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_receives_free_in_patient_treatment
          and
          not person_is_serving_sentence_of_imprisonment_or_youth_custody_detention
