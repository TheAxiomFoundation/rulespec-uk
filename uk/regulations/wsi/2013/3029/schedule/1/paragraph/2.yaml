format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/1/paragraph/2
  summary: |-
    The maximum council tax reduction for a day is 100 per cent of A/B less non-dependant deductions; A is adjusted for applicable council-tax reductions, and is divided among jointly and severally liable persons except where liability is only with a partner.
rules:
  - name: maximum_council_tax_reduction_percentage
    kind: parameter
    dtype: Rate
    source: WSI 2013/3029, Sch. 1, para. 2(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/1/paragraph/2
              excerpt: "100 per cent of the amount A/B"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: daily_maximum_council_tax_reduction
    kind: derived
    entity: Person
    dtype: Money
    unit: GBP
    period: Day
    source: WSI 2013/3029, Sch. 1, para. 2(1)-(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/1/paragraph/2
              excerpt: "the amount of a person’s maximum council tax reduction in respect of a day is 100 per cent of the amount A/B"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/1/paragraph/2
              excerpt: "A is to be divided by the number of persons who are jointly and severally liable"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/1/paragraph/2
              excerpt: "with only a partner, sub-paragraph (3) does not apply"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/1/paragraph/2
              excerpt: "less any deductions in respect of non-dependants"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, (maximum_council_tax_reduction_percentage * (if applicant_is_jointly_and_severally_liable_for_council_tax and not applicant_is_jointly_and_severally_liable_only_with_partner: council_tax_liability_after_1992_act_reductions_and_discounts / jointly_and_severally_liable_person_count_excluding_schedule_11_paragraph_3_students else: council_tax_liability_after_1992_act_reductions_and_discounts) / days_in_relevant_financial_year) - non_dependant_deductions_under_paragraph_3)
