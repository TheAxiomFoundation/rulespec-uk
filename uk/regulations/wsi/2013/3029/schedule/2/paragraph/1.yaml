format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/2/paragraph/1
  summary: |-
    Single applicant or lone parent who has attained pensionable age: £256.00.
    Couple where one or both members have attained pensionable age: £383.35.
    For a qualifying polygamous marriage: £383.35 for the applicant and other party, plus £127.35 for each additional spouse in the same household.
rules:
  - name: single_applicant_or_lone_parent_pensionable_age_amount
    kind: parameter
    dtype: Money
    unit: GBP
    source: Schedule 2, paragraph 1, table row 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/2/paragraph/1
              excerpt: "Single applicant or lone parent who has attained pensionable age | £256.00"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          256.00

  - name: couple_pensionable_age_amount
    kind: parameter
    dtype: Money
    unit: GBP
    source: Schedule 2, paragraph 1, table row 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/2/paragraph/1
              excerpt: "Couple where one or both members have attained pensionable age | £383.35"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          383.35

  - name: polygamous_marriage_applicant_and_other_party_amount
    kind: parameter
    dtype: Money
    unit: GBP
    source: Schedule 2, paragraph 1, table row 3(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/2/paragraph/1
              excerpt: "for the applicant and the other party to the marriage"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          383.35

  - name: polygamous_marriage_additional_spouse_amount
    kind: parameter
    dtype: Money
    unit: GBP
    source: Schedule 2, paragraph 1, table row 3(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/2/paragraph/1
              excerpt: "for each additional spouse who is a member of the same household as the applicant."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          127.35

  - name: pensionable_age_person_couple_or_polygamous_marriage_amount
    kind: derived
    entity: Family
    dtype: Money
    period: Week
    unit: GBP
    source: Schedule 2, paragraph 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/2/paragraph/1
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/2/paragraph/1
              excerpt: "one or more members of the marriage have attained pensionable age"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if applicant_is_member_of_polygamous_marriage and one_or_more_members_of_polygamous_marriage_have_attained_pensionable_age:
            polygamous_marriage_applicant_and_other_party_amount + (polygamous_marriage_additional_spouse_amount * max(0, number_of_additional_spouses_in_same_household_as_applicant))
          else:
            if single_applicant_or_lone_parent_has_attained_pensionable_age:
              single_applicant_or_lone_parent_pensionable_age_amount
            else:
              if couple_has_one_or_both_members_who_have_attained_pensionable_age:
                couple_pensionable_age_amount
              else:
                0
