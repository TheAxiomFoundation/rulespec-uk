format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/6/paragraph/5
  summary: |-
    “the non-dependant deductions in respect of a day referred to in paragraph 4 are— in respect of a non-dependant aged 18 or over in remunerative work, £20.05 x 1/7; [and] ... £6.70 x 1/7.” For remunerative work, lower deductions apply across the stated weekly-income bands. The paragraph also prescribes couple consolidation, apportionment, income disregards, and circumstances in which no deduction is made.
  deferred_outputs:
    - output: uk:regulations/wsi/2013/3029/schedule/6/paragraph/5#non_dependant_deduction_for_day
      reason: >-
        The final deduction requires relation-scoped consolidation for couples and
        polygamous marriages, equal apportionment among jointly and severally liable
        persons, numerous applicant- and non-dependant-specific exceptions, and
        disregards from joint or individual weekly gross income. The available
        context does not provide the relations required to represent those mechanics
        faithfully. The executable provisional amount therefore stops before those
        adjustments.
      source_values:
        - uk:regulations/wsi/2013/3029/schedule/6/paragraph/5#maximum_deductions_for_couple_or_polygamous_marriage
        - uk:regulations/wsi/2013/3029/schedule/6/paragraph/5#minimum_liable_persons_for_apportionment
        - uk:regulations/wsi/2013/3029/schedule/6/paragraph/5#extended_patient_period_weeks
        - uk:regulations/wsi/2013/3029/schedule/6/paragraph/5#maximum_patient_interval_days

rules:
  - name: adult_non_dependant_age
    kind: parameter
    dtype: Integer
    source: Schedule 6 paragraph 5(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/6/paragraph/5
              excerpt: "a non-dependant aged 18 or over"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          18

  - name: daily_deduction_weekly_divisor
    kind: parameter
    dtype: Integer
    source: Schedule 6 paragraph 5(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: unit
            source:
              corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/6/paragraph/5
              excerpt: "£20.05 x 1/7"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          7

  - name: adult_non_remunerative_work_weekly_deduction
    kind: parameter
    dtype: Money
    period: Week
    unit: GBP
    source: Schedule 6 paragraph 5(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/6/paragraph/5
              excerpt: "£6.70 x 1/7"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          6.70

  - name: lowest_income_band_upper_bound
    kind: parameter
    dtype: Money
    period: Week
    unit: GBP
    source: Schedule 6 paragraph 5(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/6/paragraph/5
              excerpt: "less than £279.00"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          279.00

  - name: lower_middle_income_band_lower_bound
    kind: parameter
    dtype: Money
    period: Week
    unit: GBP
    source: Schedule 6 paragraph 5(2)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/6/paragraph/5
              excerpt: "not less than £279.00 but less than £485.00"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          279.00

  - name: lower_middle_income_band_upper_bound
    kind: parameter
    dtype: Money
    period: Week
    unit: GBP
    source: Schedule 6 paragraph 5(2)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/6/paragraph/5
              excerpt: "not less than £279.00 but less than £485.00"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          485.00

  - name: upper_middle_income_band_lower_bound
    kind: parameter
    dtype: Money
    period: Week
    unit: GBP
    source: Schedule 6 paragraph 5(2)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/6/paragraph/5
              excerpt: "not less than £485.00 but less than £605.00"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          485.00

  - name: upper_middle_income_band_upper_bound
    kind: parameter
    dtype: Money
    period: Week
    unit: GBP
    source: Schedule 6 paragraph 5(2)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/6/paragraph/5
              excerpt: "not less than £485.00 but less than £605.00"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          605.00

  - name: remunerative_work_weekly_deduction_by_income_band
    kind: parameter
    dtype: Money
    period: Week
    unit: GBP
    indexed_by: remunerative_work_income_band
    source: Schedule 6 paragraph 5(1)(a) and (2)
    metadata:
      proof:
        atoms:
          - path: versions[0].values
            kind: parameter_table
            source:
              corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/6/paragraph/5
              excerpt: "in respect of a non-dependant aged 18 or over in remunerative work, \u00a320.05 x 1/7;\nin respect of a non-dependant aged 18 or over to whom paragraph (a) does not apply, \u00a36.70 x 1/7.\nIn the case of a non-dependant aged 18 or over to whom sub-paragraph (1)(a) applies, where it is shown to the appropriate authority that that non-dependant\u2019s normal gross weekly income is\u2014\nless than \u00a3279.00, the deduction to be made under this paragraph is that specified in sub-paragraph (1)(b);\nnot less than \u00a3279.00 but less than \u00a3485.00, the deduction to be made under this paragraph is \u00a313.35 x 1/7;\nnot less than \u00a3485.00 but less than \u00a3605.00, the deduction to be made under this paragraph is \u00a316.80 x 1/7."
              table:
                header: "remunerative-work non-dependant deductions"
                row_key: "normal gross weekly income band"
                column_key: "weekly deduction"
    versions:
      - effective_from: '0001-01-01'
        values:
          0: 6.70
          1: 13.35
          2: 16.80
          3: 20.05

  - name: maximum_deductions_for_couple_or_polygamous_marriage
    kind: parameter
    dtype: Count
    source: Schedule 6 paragraph 5(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/6/paragraph/5
              excerpt: "Only one deduction is to be made"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: minimum_liable_persons_for_apportionment
    kind: parameter
    dtype: Count
    source: Schedule 6 paragraph 5(5)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/6/paragraph/5
              excerpt: "a non-dependant of two or more of the liable persons"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          2

  - name: extended_patient_period_weeks
    kind: parameter
    dtype: Integer
    period: Week
    source: Schedule 6 paragraph 5(7)(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/6/paragraph/5
              excerpt: "a patient for a period in excess of 52 weeks"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          52

  - name: maximum_patient_interval_days
    kind: parameter
    dtype: Integer
    period: Day
    source: Schedule 6 paragraph 5(7)(d)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/6/paragraph/5
              excerpt: "intervals each not exceeding 28 days"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          28

  - name: remunerative_work_income_band
    kind: derived
    entity: Person
    dtype: Integer
    period: Week
    source: Schedule 6 paragraph 5(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: ordering
            source:
              corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/6/paragraph/5
              excerpt: "less than \u00a3279.00"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if normal_gross_weekly_income < lowest_income_band_upper_bound: 0 else: if normal_gross_weekly_income >= lower_middle_income_band_lower_bound and normal_gross_weekly_income < lower_middle_income_band_upper_bound: 1 else: if normal_gross_weekly_income >= upper_middle_income_band_lower_bound and normal_gross_weekly_income < upper_middle_income_band_upper_bound: 2 else: 3

  - name: provisional_non_dependant_deduction_for_day_before_exceptions_and_grouping
    kind: derived
    entity: Person
    dtype: Money
    period: Day
    unit: GBP
    source: Schedule 6 paragraph 5(1) and (2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/wsi/2013/3029/schedule/6/paragraph/5
              excerpt: "the non-dependant deductions in respect of a day"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if person_is_non_dependant and person_age >= adult_non_dependant_age: if person_is_in_remunerative_work: remunerative_work_weekly_deduction_by_income_band[remunerative_work_income_band] / daily_deduction_weekly_divisor else: adult_non_remunerative_work_weekly_deduction / daily_deduction_weekly_divisor else: 0
