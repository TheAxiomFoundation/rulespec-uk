format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/ssi/2012/319/47
  summary: The daily maximum is 100 per cent of A/B, less regulation 48 non-dependant
    deductions. For regulation 14A, A is multiplied by the valuation-band factor.
    Where applicable, A is divided among jointly and severally liable persons, except
    where the applicant is liable only with the applicant's partner.
rules:
- name: maximum_council_tax_support_rate
  kind: parameter
  dtype: Rate
  source: Regulation 47(1) and (1A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: uk/regulation/ssi/2012/319/47
          excerpt: "100 per cent of the amount A/B where\u2014"
  versions:
  - effective_from: '0001-01-01'
    formula: '1'
- name: regulation_14a_band_e_multiplier
  kind: parameter
  dtype: Rate
  source: Regulation 47(1B)(b)(i)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: uk/regulation/ssi/2012/319/47
          excerpt: 1.075 if the relevant dwelling is in valuation band E;
  versions:
  - effective_from: '0001-01-01'
    formula: '1.075'
- name: regulation_14a_band_f_multiplier
  kind: parameter
  dtype: Rate
  source: Regulation 47(1B)(b)(ii)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: uk/regulation/ssi/2012/319/47
          excerpt: 1.125 if the relevant dwelling is in valuation band F;
  versions:
  - effective_from: '0001-01-01'
    formula: '1.125'
- name: regulation_14a_band_g_multiplier
  kind: parameter
  dtype: Rate
  source: Regulation 47(1B)(b)(iii)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: uk/regulation/ssi/2012/319/47
          excerpt: 1.175 if the relevant dwelling is in valuation band G;
  versions:
  - effective_from: '0001-01-01'
    formula: '1.175'
- name: regulation_14a_band_h_multiplier
  kind: parameter
  dtype: Rate
  source: Regulation 47(1B)(b)(iv)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: uk/regulation/ssi/2012/319/47
          excerpt: 1.225 if the relevant dwelling is in valuation band H.
  versions:
  - effective_from: '0001-01-01'
    formula: '1.225'
- name: applicable_annual_council_tax_amount_after_joint_liability_division
  kind: derived
  entity: Person
  dtype: Money
  period: Day
  unit: GBP
  source: Regulation 47(1)(a) and (2)-(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: uk/regulation/ssi/2012/319/47
          excerpt: A is the amount set by the relevant authority as the council tax
            for the relevant financial year
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: uk/regulation/ssi/2012/319/47
          excerpt: the amount A is to be divided by the number of persons who are
            jointly and severally liable for that tax.
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: uk/regulation/ssi/2012/319/47
  versions:
  - effective_from: '0001-01-01'
    formula: 'if applicant_is_jointly_and_severally_liable_for_council_tax and applicant_is_resident_with_one_or_more_other_jointly_liable_persons
      and not applicant_is_jointly_and_severally_liable_only_with_partner: annual_council_tax_amount_after_discounts_and_other_reductions
      / number_of_jointly_and_severally_liable_persons_excluding_covered_students
      else: annual_council_tax_amount_after_discounts_and_other_reductions'
- name: regulation_14a_valuation_band_multiplier
  kind: derived
  entity: Person
  dtype: Rate
  period: Day
  source: Regulation 47(1B)(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: uk/regulation/ssi/2012/319/47
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: uk/regulation/ssi/2012/319/47
          excerpt: 1.075 if the relevant dwelling is in valuation band E;
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: uk/regulation/ssi/2012/319/47
          excerpt: 1.125 if the relevant dwelling is in valuation band F;
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: uk/regulation/ssi/2012/319/47
          excerpt: 1.175 if the relevant dwelling is in valuation band G;
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: uk/regulation/ssi/2012/319/47
          excerpt: 1.225 if the relevant dwelling is in valuation band H.
  versions:
  - effective_from: '0001-01-01'
    formula: "if relevant_dwelling_is_in_valuation_band_e:\n  regulation_14a_band_e_multiplier\n\
      else:\n  if relevant_dwelling_is_in_valuation_band_f:\n    regulation_14a_band_f_multiplier\n\
      \  else:\n    if relevant_dwelling_is_in_valuation_band_g:\n      regulation_14a_band_g_multiplier\n\
      \    else:\n      if relevant_dwelling_is_in_valuation_band_h:\n        regulation_14a_band_h_multiplier\n\
      \      else:\n        0"
- name: maximum_council_tax_reduction_for_regulation_14
  kind: derived
  entity: Person
  dtype: Money
  period: Day
  unit: GBP
  source: Regulation 47(1)-(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: uk/regulation/ssi/2012/319/47
          excerpt: "100 per cent of the amount A/B where\u2014"
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: uk/regulation/ssi/2012/319/47
          excerpt: B is the number of days in that financial year,
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: uk/regulation/ssi/2012/319/47
          excerpt: less any deductions in respect of non-dependants which fall to
            be made under regulation 48 (non-dependant deductions).
  versions:
  - effective_from: '0001-01-01'
    formula: 'if person_is_liable_to_pay_council_tax_for_day: max( 0, maximum_council_tax_support_rate
      * applicable_annual_council_tax_amount_after_joint_liability_division / number_of_days_in_financial_year
      - non_dependant_deductions_under_regulation_48 ) else: 0'
- name: maximum_council_tax_reduction_for_regulation_14a
  kind: derived
  entity: Person
  dtype: Money
  period: Day
  unit: GBP
  source: Regulation 47(1A)-(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: uk/regulation/ssi/2012/319/47
      - path: versions[0].formula
        kind: definition
        source:
          corpus_citation_path: uk/regulation/ssi/2012/319/47
          excerpt: B is the number of days in that financial year,
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: uk/regulation/ssi/2012/319/47
          excerpt: less any deductions in respect of non-dependants which fall to
            be made under regulation 48.
  versions:
  - effective_from: '0001-01-01'
    formula: 'if person_is_liable_to_pay_council_tax_for_day: max( 0, maximum_council_tax_support_rate
      * applicable_annual_council_tax_amount_after_joint_liability_division * regulation_14a_valuation_band_multiplier
      / number_of_days_in_financial_year - non_dependant_deductions_under_regulation_48
      ) else: 0'
