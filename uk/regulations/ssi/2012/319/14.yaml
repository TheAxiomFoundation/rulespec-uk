format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/ssi/2012/319/14
  summary: A relevant person is entitled in respect of a day when the common conditions
    and either the income-based or alternative-maximum conditions are satisfied, entitlement
    has commenced, and the reduction is not less than that calculated under regulation
    14A. Amount B is 2 6/7 per cent of weekly income exceeding the applicable amount;
    where both routes apply, the greater reduction is awarded.
imports:
- uk:regulations/ssi/2012/319/14A#council_tax_reduction_before_regulation_14_comparison
rules:
- name: regulation_14_income_excess_reduction_rate
  kind: parameter
  dtype: Rate
  source: The Council Tax Reduction (Scotland) Regulations 2012, regulation 14(5)(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: uk/regulation/ssi/2012/319/14
          excerpt: amount B is 2 6/7 per cent of the difference
  versions:
  - effective_from: '0001-01-01'
    formula: '0.02857142857142857142857142857'
- name: regulation_14_common_conditions_satisfied
  kind: derived
  entity: Person
  dtype: Judgment
  period: Day
  source: The Council Tax Reduction (Scotland) Regulations 2012, regulation 14(1)-(3)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: uk/regulation/ssi/2012/319/14
  versions:
  - effective_from: '0001-01-01'
    formula: 'relevant_person_is_liable_to_pay_council_tax_under_section_75

      and relevant_person_is_liable_for_council_tax_for_dwelling_as_sole_or_main_residence

      and not regulation_15_applies

      and not regulation_16_applies

      and not regulation_19_applies

      and relevant_person_has_made_application_in_accordance_with_part_9'
- name: regulation_14_income_excess_reduction_amount
  kind: derived
  entity: Person
  dtype: Money
  period: Day
  unit: GBP
  source: The Council Tax Reduction (Scotland) Regulations 2012, regulation 14(5)(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: uk/regulation/ssi/2012/319/14
          excerpt: amount B is 2 6/7 per cent of the difference
  versions:
  - effective_from: '0001-01-01'
    formula: 'regulation_14_income_excess_reduction_rate

      * max(0, relevant_person_weekly_income - applicable_amount)'
- name: regulation_14_income_route_satisfied
  kind: derived
  entity: Person
  dtype: Judgment
  period: Day
  source: The Council Tax Reduction (Scotland) Regulations 2012, regulation 14(4)-(5)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: uk/regulation/ssi/2012/319/14
  versions:
  - effective_from: '0001-01-01'
    formula: "appropriate_maximum_council_tax_reduction_exists\nand (\n  relevant_person_has_no_income\n\
      \  or relevant_person_weekly_income <= applicable_amount\n  or appropriate_maximum_council_tax_reduction\
      \ > regulation_14_income_excess_reduction_amount\n)"
- name: regulation_14_alternative_route_satisfied
  kind: derived
  entity: Person
  dtype: Judgment
  period: Day
  source: The Council Tax Reduction (Scotland) Regulations 2012, regulation 14(6)-(7)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: uk/regulation/ssi/2012/319/14
  versions:
  - effective_from: '0001-01-01'
    formula: 'no_included_other_resident_is_liable_to_pay_rent_to_relevant_person

      and relevant_person_is_entitled_to_alternative_maximum_reduction_because_of_resident_income'
- name: regulation_14_reduction_before_regulation_14a_comparison
  kind: derived
  entity: Person
  dtype: Money
  period: Day
  unit: GBP
  source: The Council Tax Reduction (Scotland) Regulations 2012, regulation 14(8)-(9)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: uk/regulation/ssi/2012/319/14
  versions:
  - effective_from: '0001-01-01'
    formula: "max(\n  (if regulation_14_income_route_satisfied:\n    if relevant_person_has_no_income\
      \ or relevant_person_weekly_income <= applicable_amount:\n      appropriate_maximum_council_tax_reduction\n\
      \    else:\n      max(0, appropriate_maximum_council_tax_reduction - regulation_14_income_excess_reduction_amount)\n\
      \  else:\n    0),\n  (if regulation_14_alternative_route_satisfied:\n    appropriate_alternative_maximum_council_tax_reduction\n\
      \  else:\n    0)\n)"
- name: regulation_14_reduction_entitlement
  kind: derived
  entity: Person
  dtype: Judgment
  period: Day
  source: The Council Tax Reduction (Scotland) Regulations 2012, regulation 14(1)-(3A)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: uk/regulation/ssi/2012/319/14
      - path: versions[0].formula
        kind: import
        import:
          target: uk:regulations/ssi/2012/319/14A#council_tax_reduction_before_regulation_14_comparison
          output: council_tax_reduction_before_regulation_14_comparison
          hash: sha256:c6c2d3aab9bc32e1bc4a736c99503323e35078e2a062299f83fb40432f0b9d29
  versions:
  - effective_from: '0001-01-01'
    formula: 'relevant_person_entitlement_to_council_tax_reduction_has_commenced

      and regulation_14_common_conditions_satisfied

      and (regulation_14_income_route_satisfied or regulation_14_alternative_route_satisfied)

      and regulation_14_reduction_before_regulation_14a_comparison >= council_tax_reduction_before_regulation_14_comparison'
- name: regulation_14_council_tax_reduction
  kind: derived
  entity: Person
  dtype: Money
  period: Day
  unit: GBP
  source: The Council Tax Reduction (Scotland) Regulations 2012, regulation 14(1),
    (8)-(9)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: uk/regulation/ssi/2012/319/14
  versions:
  - effective_from: '0001-01-01'
    formula: 'if regulation_14_reduction_entitlement: regulation_14_reduction_before_regulation_14a_comparison
      else: 0'
