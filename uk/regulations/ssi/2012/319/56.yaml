format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/ssi/2012/319/56
  summary: |-
    Where an applicant is jointly and severally liable for council tax and resident with others, the Schedule 5 amount is divided by the number jointly liable; this does not apply where liability with the partner only arises solely under sections 77 or 77A.
  deferred_outputs:
    - output: uk:regulations/ssi/2012/319/56#alternative_maximum_council_tax_reduction
      reason: Schedule 5, which determines the underlying amount, is not available in the supplied context.
rules:
  - name: joint_liability_division_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Regulation 56(2)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: uk/regulation/ssi/2012/319/56
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          applicant_is_jointly_and_severally_liable_for_council_tax
          and applicant_is_resident_with_one_or_more_other_persons
          and not liability_with_partner_is_only_by_virtue_of_sections_77_or_77a
