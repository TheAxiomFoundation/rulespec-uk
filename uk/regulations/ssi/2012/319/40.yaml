format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/ssi/2012/319/40
  summary: |-
    No person is entitled to council tax reduction if that person's capital exceeds £16,000.
rules:
  - name: council_tax_reduction_capital_limit
    kind: parameter
    dtype: Money
    unit: GBP
    source: SSI 2012/319, reg. 40
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/ssi/2012/319/40
              excerpt: capital exceeds £16,000
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          16000
  - name: capital_does_not_disqualify_council_tax_reduction
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: SSI 2012/319, reg. 40
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/regulation/ssi/2012/319/40
              excerpt: No person is entitled to council tax reduction if that person's capital exceeds £16,000.
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          capital <= council_tax_reduction_capital_limit
