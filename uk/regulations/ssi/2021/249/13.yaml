format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/ssi/2021/249/13
  summary: "Entitlement requires the relevant person\u2019s capital not to exceed\
    \ the regulation 66 limit and either the maximum-reduction route or the second-adult-rebate\
    \ route. Amount B is \u201C2 6/7 per cent of the difference\u201D between weekly\
    \ income and the applicable amount. The second-adult route requires that no other\
    \ counted resident is liable to pay rent to the relevant person and that the relevant\
    \ person is entitled to second adult rebate because of resident income."
  deferred_outputs:
  - output: uk:regulations/ssi/2021/249/13#council_tax_reduction_entitlement
    reason: The complete entitlement determination depends on operative results from
      regulations 14, 15, 16, 19, 20, and 33 and on the appropriate maximum council
      tax reduction, none of which is supplied as an executable copied export for
      this target.
    source_values:
    - uk:regulations/ssi/2021/249/13#council_tax_reduction_excess_income_taper_rate
  - output: uk:regulations/ssi/2021/249/13#council_tax_reduction_amount
    reason: The complete amount requires the appropriate maximum council tax reduction
      and resolution of the regulation 14 comparison and entitlement commencement
      conditions, for which no executable copied exports are supplied.
    source_values:
    - uk:regulations/ssi/2021/249/13#council_tax_reduction_excess_income_taper_rate
imports:
- uk:regulations/ssi/2021/249/91#second_adult_rebate
