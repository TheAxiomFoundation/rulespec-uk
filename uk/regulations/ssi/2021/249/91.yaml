format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/ssi/2021/249/91
  summary: |-
    The second adult rebate is the schedule 2 amount, divided by the number jointly and severally liable where the applicant resides with other jointly liable persons, except where the only other liable person is the applicant's partner.
rules:
  - name: second_adult_rebate
    kind: derived
    entity: Person
    dtype: Money
    unit: GBP
    source: regulation 91(1) to (3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/regulation/ssi/2021/249/91
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/ssi/2021/249/91
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: uk/regulation/ssi/2021/249/91
    versions:
      - effective_from: '2021-04-05'
        formula: |-
          if conditions_of_entitlement_in_regulation_13_3_are_fulfilled
          and conditions_of_entitlement_in_regulation_13_7_are_fulfilled:
            if applicant_is_jointly_and_severally_liable_and_resident_with_one_or_more_other_jointly_liable_persons
            and not applicant_is_jointly_and_severally_liable_only_with_applicants_partner:
              second_adult_rebate_amount_determined_in_accordance_with_schedule_2 / number_of_persons_jointly_and_severally_liable
            else:
              second_adult_rebate_amount_determined_in_accordance_with_schedule_2
          else:
            0
