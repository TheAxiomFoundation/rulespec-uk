format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/ssi/2021/249/79
  summary: |-
    For regulation 13, maximum council tax reduction for a liable day is amount A divided by the number of days in the financial year, less regulation 90 non-dependant deductions. Amount A reflects applicable discounts and section 80 or 80A liability reductions. Where applicable, amount A is divided among jointly and severally liable persons, excluding students; this division does not apply where the applicant is liable only with the applicant's partner. Paragraph (3) specifies C as 1.075, 1.125, 1.175, or 1.225 for valuation bands E, F, G, or H.
  deferred_outputs:
    - output: uk:regulations/ssi/2021/249/79#maximum_council_tax_reduction_for_regulation_14
      reason: The supplied corpus text omits the mathematical expression preceding “less any deductions” in paragraph (2), so the band E-to-H amount cannot be computed faithfully from the sole legal authority.
      source_values:
        - uk:regulations/ssi/2021/249/79#valuation_band_e_factor
        - uk:regulations/ssi/2021/249/79#valuation_band_f_factor
        - uk:regulations/ssi/2021/249/79#valuation_band_g_factor
        - uk:regulations/ssi/2021/249/79#valuation_band_h_factor
rules:
  - name: valuation_band_e_factor
    kind: parameter
    dtype: Decimal
    source: regulation 79(3)(b)(i)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: uk/regulation/ssi/2021/249/79
              excerpt: "1.075 if the relevant dwelling is in valuation band E"
    versions:
      - effective_from: '2021-04-05'
        formula: |-
          1.075

  - name: valuation_band_f_factor
    kind: parameter
    dtype: Decimal
    source: regulation 79(3)(b)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: uk/regulation/ssi/2021/249/79
              excerpt: "1.125 if the relevant dwelling is in valuation band F"
    versions:
      - effective_from: '2021-04-05'
        formula: |-
          1.125

  - name: valuation_band_g_factor
    kind: parameter
    dtype: Decimal
    source: regulation 79(3)(b)(iii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: uk/regulation/ssi/2021/249/79
              excerpt: "1.175 if the relevant dwelling is in valuation band G"
    versions:
      - effective_from: '2021-04-05'
        formula: |-
          1.175

  - name: valuation_band_h_factor
    kind: parameter
    dtype: Decimal
    source: regulation 79(3)(b)(iv)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: uk/regulation/ssi/2021/249/79
              excerpt: "1.225 if the relevant dwelling is in valuation band H"
    versions:
      - effective_from: '2021-04-05'
        formula: |-
          1.225

  - name: applicable_valuation_band_e_to_h_factor
    kind: derived
    entity: Person
    dtype: Decimal
    period: Day
    source: regulation 79(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/ssi/2021/249/79
              excerpt: "band H"
          - path: versions[0].formula
            kind: import
            import:
              target: uk:regulations/ssi/2021/249/79#valuation_band_e_factor
              output: valuation_band_e_factor
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: uk:regulations/ssi/2021/249/79#valuation_band_f_factor
              output: valuation_band_f_factor
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: uk:regulations/ssi/2021/249/79#valuation_band_g_factor
              output: valuation_band_g_factor
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: uk:regulations/ssi/2021/249/79#valuation_band_h_factor
              output: valuation_band_h_factor
              hash: sha256:local
    versions:
      - effective_from: '2021-04-05'
        formula: |-
          if valuation_band == "E": valuation_band_e_factor else: if valuation_band == "F": valuation_band_f_factor else: if valuation_band == "G": valuation_band_g_factor else: if valuation_band == "H": valuation_band_h_factor else: 0

  - name: annual_council_tax_amount_a
    kind: derived
    entity: Person
    dtype: Money
    unit: GBP
    period: Year
    source: regulation 79(1), definition of amount A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/ssi/2021/249/79
              excerpt: "A is the amount set"
    versions:
      - effective_from: '2021-04-05'
        formula: |-
          max(0, annual_council_tax_for_dwelling - appropriate_dwelling_discount - section_80_or_80a_liability_reduction_other_than_under_these_regulations)

  - name: annual_council_tax_amount_a_after_joint_liability_adjustment
    kind: derived
    entity: Person
    dtype: Money
    unit: GBP
    period: Year
    source: regulation 79(4) and (5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/ssi/2021/249/79
              excerpt: "amount A is to be divided by the number of persons who are jointly and severally liable for that tax"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: uk/regulation/ssi/2021/249/79
              excerpt: "with only the applicant’s partner, paragraph (4) does not apply"
          - path: versions[0].formula
            kind: import
            import:
              target: uk:regulations/ssi/2021/249/79#annual_council_tax_amount_a
              output: annual_council_tax_amount_a
              hash: sha256:local
    versions:
      - effective_from: '2021-04-05'
        formula: |-
          if applicant_is_jointly_and_severally_liable_and_resident_with_one_or_more_other_counted_persons and not applicant_is_jointly_and_severally_liable_only_with_applicants_partner: annual_council_tax_amount_a / number_of_counted_persons_jointly_and_severally_liable else: annual_council_tax_amount_a

  - name: maximum_council_tax_reduction_for_regulation_13
    kind: derived
    entity: Person
    dtype: Money
    unit: GBP
    period: Day
    source: regulation 79(1), (4), and (5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/ssi/2021/249/79
              excerpt: "amount A divided by the amount B"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: uk/regulation/ssi/2021/249/79
              excerpt: "B is the number of days in that financial year"
          - path: versions[0].formula
            kind: import
            import:
              target: uk:regulations/ssi/2021/249/79#annual_council_tax_amount_a_after_joint_liability_adjustment
              output: annual_council_tax_amount_a_after_joint_liability_adjustment
              hash: sha256:local
    versions:
      - effective_from: '2021-04-05'
        formula: |-
          max(0, (annual_council_tax_amount_a_after_joint_liability_adjustment / number_of_days_in_financial_year) - daily_non_dependant_deductions_under_regulation_90)
