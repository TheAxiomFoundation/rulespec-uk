format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/ssi/2021/249/14
  summary: "Entitlement requires liability for a band E, F, G or H dwelling occupied\
    \ as the relevant person\u2019s sole or main residence. The weekly income limits\
    \ are \xA3321 for a person who is neither a member of a couple nor responsible\
    \ for a child or young person, and \xA3479 otherwise. Amount B is 2 6/7 per cent\
    \ of income exceeding the applicable limit."
  deferred_outputs:
  - output: uk:regulations/ssi/2021/249/14#council_tax_reduction_entitlement
    reason: Complete entitlement also depends on regulations 15, 16, 19, 20, and 33
      and on application and appropriate-maximum-reduction conditions for which no
      executable copied exports are supplied.
    source_values:
    - uk:regulations/ssi/2021/249/14#single_person_without_child_weekly_income_limit
    - uk:regulations/ssi/2021/249/14#other_person_weekly_income_limit
    - uk:regulations/ssi/2021/249/14#band_e_to_h_excess_income_taper_rate
rules:
- name: single_person_without_child_weekly_income_limit
  kind: parameter
  dtype: Money
  unit: GBP
  period: Week
  source: SSI 2021/249, regulation 14(5)(a)(ii)(aa)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: uk/regulation/ssi/2021/249/14
          excerpt: "\xA3321, in the case of a person to whom paragraph (6) applies,"
  versions:
  - effective_from: '2021-04-05'
    formula: '321'
- name: other_person_weekly_income_limit
  kind: parameter
  dtype: Money
  unit: GBP
  period: Week
  source: SSI 2021/249, regulation 14(5)(a)(ii)(bb)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: uk/regulation/ssi/2021/249/14
          excerpt: "\xA3479, in any other case, or"
  versions:
  - effective_from: '2021-04-05'
    formula: '479'
- name: band_e_to_h_excess_income_taper_rate
  kind: parameter
  dtype: Rate
  source: SSI 2021/249, regulation 14(5)(b)(ii)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: parameter
        source:
          corpus_citation_path: uk/regulation/ssi/2021/249/14
          excerpt: amount B is 2 6/7 per cent of the difference
  versions:
  - effective_from: '2021-04-05'
    formula: '0.02857142857142857142857142857'
- name: band_e_to_h_dwelling_condition_satisfied
  kind: derived
  entity: Person
  dtype: Judgment
  period: Day
  source: SSI 2021/249, regulation 14(3)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: uk/regulation/ssi/2021/249/14
          excerpt: is for the day liable to pay council tax in respect of a dwelling
            in valuation band E, F, G or H in which that person resides as their sole
            or main residence,
  versions:
  - effective_from: '2021-04-05'
    formula: 'person_is_liable_to_pay_council_tax_for_the_day

      and dwelling_is_in_valuation_band_e_f_g_or_h

      and dwelling_is_persons_sole_or_main_residence'
- name: paragraph_6_applies
  kind: derived
  entity: Person
  dtype: Judgment
  period: Week
  source: SSI 2021/249, regulation 14(6)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: uk/regulation/ssi/2021/249/14
          excerpt: is not a member of a couple, and
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: uk/regulation/ssi/2021/249/14
          excerpt: is not responsible for a child or young person.
  versions:
  - effective_from: '2021-04-05'
    formula: 'not person_is_member_of_a_couple

      and not person_is_responsible_for_child_or_young_person'
- name: relevant_person_has_no_weekly_income
  kind: derived
  entity: Person
  dtype: Judgment
  period: Week
  source: SSI 2021/249, regulation 14(5)(a)(i)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: uk/regulation/ssi/2021/249/14
          excerpt: the relevant person has no income, or
  versions:
  - effective_from: '2021-04-05'
    formula: weekly_income == 0
- name: weekly_income_does_not_exceed_applicable_limit
  kind: derived
  entity: Person
  dtype: Judgment
  period: Week
  source: SSI 2021/249, regulation 14(5)(a)(ii) and (6)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: uk/regulation/ssi/2021/249/14
          excerpt: "\xA3321, in the case of a person to whom paragraph (6) applies,"
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: uk/regulation/ssi/2021/249/14
          excerpt: "\xA3479, in any other case, or"
  versions:
  - effective_from: '2021-04-05'
    formula: "(((paragraph_6_applies) and weekly_income <= (single_person_without_child_weekly_income_limit))\n\
      \  or (not (paragraph_6_applies) and weekly_income <= (other_person_weekly_income_limit)))"
- name: band_e_to_h_amount_b
  kind: derived
  entity: Person
  dtype: Money
  unit: GBP
  period: Week
  source: SSI 2021/249, regulation 14(5)(b)(ii)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: uk/regulation/ssi/2021/249/14
          excerpt: amount B is 2 6/7 per cent of the difference
  versions:
  - effective_from: '2021-04-05'
    formula: 'band_e_to_h_excess_income_taper_rate

      * max(0, weekly_income - (if paragraph_6_applies: single_person_without_child_weekly_income_limit
      else: other_person_weekly_income_limit))'
- name: appropriate_maximum_reduction_exceeds_amount_b
  kind: derived
  entity: Person
  dtype: Judgment
  period: Week
  source: SSI 2021/249, regulation 14(5)(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: uk/regulation/ssi/2021/249/14
          excerpt: "amount A is the appropriate maximum council tax reduction in the\
            \ relevant person\u2019s case, and"
  versions:
  - effective_from: '2021-04-05'
    formula: appropriate_maximum_council_tax_reduction > band_e_to_h_amount_b
- name: council_tax_reduction_amount_under_band_e_to_h_route
  kind: derived
  entity: Person
  dtype: Money
  unit: GBP
  period: Day
  source: SSI 2021/249, regulation 14(7)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: uk/regulation/ssi/2021/249/14
          excerpt: the amount found by deducting amount B from amount A
  versions:
  - effective_from: '2021-04-05'
    formula: "if relevant_person_has_no_weekly_income or weekly_income_does_not_exceed_applicable_limit:\n\
      \  appropriate_maximum_council_tax_reduction\nelse:\n  if appropriate_maximum_reduction_exceeds_amount_b:\n\
      \    max(0, appropriate_maximum_council_tax_reduction - band_e_to_h_amount_b)\n\
      \  else:\n    0"
- name: band_e_to_h_reduction_exceeds_regulation_13_reduction
  kind: derived
  entity: Person
  dtype: Judgment
  period: Day
  source: SSI 2021/249, regulation 14(1)(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: uk/regulation/ssi/2021/249/14
          excerpt: the amount of council tax reduction calculated under this regulation
            is greater than the amount of council tax reduction calculated under regulation
            13, and
  versions:
  - effective_from: '2021-04-05'
    formula: 'council_tax_reduction_amount_under_band_e_to_h_route

      > council_tax_reduction_calculated_under_regulation_13'
