format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/ssi/2021/249/35
  summary: |-
    “An applicant’s weekly applicable amount is the aggregate” of the personal allowance, child and disability-related premiums, carer premium, applicable disability premiums, applicable component, transitional family premium, and transitional addition.
rules:
  - name: weekly_applicable_amount
    kind: derived
    entity: Family
    dtype: Money
    unit: GBP
    period: Week
    source: uk/regulation/ssi/2021/249/35
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/ssi/2021/249/35
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          personal_allowance
          + child_premium
          + disabled_child_or_enhanced_disability_premium
          + carer_premium
          + disability_premiums
          + applicable_component
          + transitional_family_premium
          + transitional_addition
