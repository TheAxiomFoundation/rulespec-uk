format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/ssi/2021/249/66
  summary: |-
    No person is entitled to council tax reduction if that person’s capital exceeds £16,000.
rules:
  - name: council_tax_reduction_capital_limit
    kind: parameter
    dtype: Money
    unit: GBP
    source: SSI 2021/249, regulation 66
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/ssi/2021/249/66
              excerpt: "capital exceeds £16,000"
    versions:
      - effective_from: '2021-04-05'
        formula: |-
          16000

  - name: excess_capital_disqualifies_person_from_council_tax_reduction
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: SSI 2021/249, regulation 66
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/regulation/ssi/2021/249/66
              excerpt: "No person is entitled to council tax reduction if that person’s capital exceeds £16,000."
    versions:
      - effective_from: '2021-04-05'
        formula: |-
          capital > council_tax_reduction_capital_limit
