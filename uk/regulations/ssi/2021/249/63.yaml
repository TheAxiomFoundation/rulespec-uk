format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/ssi/2021/249/63
  summary: |-
    An applicant’s capital is treated as yielding £4.35 monthly, or £1 weekly, for each £250 (including any incomplete £250) in excess of £6,000. This does not apply to disregarded capital or where actual annuity or trust income is taken into account. Actual income from capital treated as yielding income becomes capital from the day it is due.
rules:
  - name: capital_tariff_income_threshold
    kind: parameter
    dtype: Money
    unit: GBP
    source: regulation 63(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/ssi/2021/249/63
              excerpt: "in excess of £6,000"
    versions:
      - effective_from: '2021-04-05'
        formula: |-
          6000

  - name: capital_tariff_income_band_size
    kind: parameter
    dtype: Money
    unit: GBP
    source: regulation 63(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/ssi/2021/249/63
              excerpt: "for each £250"
    versions:
      - effective_from: '2021-04-05'
        formula: |-
          250

  - name: monthly_income_per_capital_band
    kind: parameter
    dtype: Money
    period: Month
    unit: GBP
    source: regulation 63(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/ssi/2021/249/63
              excerpt: "a monthly income of £4.35 for each £250"
    versions:
      - effective_from: '2021-04-05'
        formula: |-
          4.35

  - name: weekly_income_per_capital_band
    kind: parameter
    dtype: Money
    period: Week
    unit: GBP
    source: regulation 63(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/ssi/2021/249/63
              excerpt: "a weekly income of £1 for each £250"
    versions:
      - effective_from: '2021-04-05'
        formula: |-
          1

  - name: capital_is_treated_as_yielding_income
    kind: derived
    entity: Person
    dtype: Judgment
    source: regulation 63(1) and (2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: uk/regulation/ssi/2021/249/63
              excerpt: "Paragraph (1) does not apply where the capital is disregarded or the actual income from that capital is taken into account"
    versions:
      - effective_from: '2021-04-05'
        formula: |-
          not capital_is_disregarded
          and not actual_income_from_capital_is_taken_into_account_as_annuity_income_under_regulation_57_1_j
          and not actual_income_from_capital_is_taken_into_account_as_trust_income_under_regulation_57_1_k

  - name: monthly_income_treated_as_yielded_by_capital
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: GBP
    source: regulation 63(1)(a) and (2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/ssi/2021/249/63
              excerpt: "£4.35 for each £250 in excess of £6,000 and £4.35 for any excess which is not a complete £250"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: uk/regulation/ssi/2021/249/63
    versions:
      - effective_from: '2021-04-05'
        formula: |-
          if capital_is_treated_as_yielding_income:
            monthly_income_per_capital_band * ceil(max(0, applicant_capital - capital_tariff_income_threshold) / capital_tariff_income_band_size)
          else: 0

  - name: weekly_income_treated_as_yielded_by_capital
    kind: derived
    entity: Person
    dtype: Money
    period: Week
    unit: GBP
    source: regulation 63(1)(b) and (2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/ssi/2021/249/63
              excerpt: "£1 for each £250 in excess of £6,000 and £1 for any excess which is not a complete £250"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: uk/regulation/ssi/2021/249/63
    versions:
      - effective_from: '2021-04-05'
        formula: |-
          if capital_is_treated_as_yielding_income:
            weekly_income_per_capital_band * ceil(max(0, applicant_capital - capital_tariff_income_threshold) / capital_tariff_income_band_size)
          else: 0

  - name: actual_income_from_yielding_capital_treated_as_capital
    kind: derived
    entity: Person
    dtype: Money
    period: Day
    unit: GBP
    source: regulation 63(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/ssi/2021/249/63
              excerpt: "actual income derived from that capital"
    versions:
      - effective_from: '2021-04-05'
        formula: |-
          if capital_is_treated_as_yielding_income and actual_income_from_capital_is_due_to_be_paid_to_applicant_on_or_before_day:
            actual_income_derived_from_capital
          else: 0
