format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2002/1792/15
  summary: |-
    For section 15(2) of the State Pension Credit Act 2002, subject to capital disregarded under regulation 17(8), a claimant's capital is deemed to yield weekly income of GBP 1 for each complete or incomplete GBP 500 above GBP 10,000.
rules:
  - name: capital_deemed_income_lower_threshold
    kind: parameter
    dtype: Money
    unit: GBP
    source: State Pension Credit Regulations 2002, regulation 15(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2002/1792/15
              excerpt: "in excess of £10,000"
    versions:
      - effective_from: '2009-11-02'
        formula: |-
          10000

  - name: capital_deemed_income_band_size
    kind: parameter
    dtype: Money
    unit: GBP
    source: State Pension Credit Regulations 2002, regulation 15(6)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2002/1792/15
              excerpt: "for each £500"
    versions:
      - effective_from: '2009-11-02'
        formula: |-
          500

  - name: capital_deemed_income_weekly_amount_per_band
    kind: parameter
    dtype: Money
    period: Week
    unit: GBP
    source: State Pension Credit Regulations 2002, regulation 15(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2002/1792/15
              excerpt: "a) £1 for each £500 in excess of £10,000;"
    versions:
      - effective_from: '2009-11-02'
        formula: |-
          1

  - name: capital_treated_as_yielding_weekly_income
    kind: derived
    entity: Person
    dtype: Judgment
    period: Week
    source: State Pension Credit Regulations 2002, regulation 15(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2002/1792/15
              excerpt: "capital shall be deemed to yield a weekly income"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: uk/regulation/uksi/2002/1792/15
              excerpt: "subject to regulation 17(8)"
    versions:
      - effective_from: '2009-11-02'
        formula: |-
          claimant_capital > capital_deemed_income_lower_threshold
          and not capital_disregarded_under_regulation_17_8

  - name: capital_deemed_weekly_income
    kind: derived
    entity: Person
    dtype: Money
    period: Week
    unit: GBP
    source: State Pension Credit Regulations 2002, regulation 15(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2002/1792/15
              excerpt: "£1 for each £500 in excess of £10,000"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2002/1792/15
              excerpt: "£1 for any excess which is not a complete £500"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: uk/regulation/uksi/2002/1792/15
              excerpt: "subject to regulation 17(8)"
    versions:
      - effective_from: '2009-11-02'
        formula: |-
          if capital_treated_as_yielding_weekly_income: capital_deemed_income_weekly_amount_per_band * ceil((claimant_capital - capital_deemed_income_lower_threshold) / capital_deemed_income_band_size) else: 0
