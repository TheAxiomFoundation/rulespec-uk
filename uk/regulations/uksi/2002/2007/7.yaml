  source_verification:
    corpus_citation_path: uk/regulation/uksi/2002/2007/7
  summary: |-
    Regulation 7 determines the maximum rate at which a claimant or joint claimants may be entitled to Child Tax Credit. The family element applies where the claimant or either joint claimant is responsible for a child or qualifying young person born before 6 April 2017, and the family element amount is GBP 545.
