format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2004/692/schedule/1
  summary: |-
    Schedule 1 of the Communications (Television Licensing) Regulations 2004 sets TV licence issue fees. The colour TV licence General Form fee is GBP 180.00 from 1 April 2026.
rules:
  - name: colour_tv_licence_general_form_issue_fee
    kind: parameter
    dtype: Money
    period: Year
    unit: GBP
    source: Schedule 1, row 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2004/692/schedule/1
              excerpt: "| 2TV licence (including colour) General Form | A licence—to install and use television receivers at the single place specified in the licence or, as the case may be, in the single vehicle, vessel or caravan so specified (“the specified location”); | £180.00 |"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          180.00
