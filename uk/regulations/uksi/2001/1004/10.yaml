format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2001/1004/10
  summary: |-
    For the purposes of sections 5(1), 9A and 9B of the Act (earnings limits
    and thresholds to be specified for each tax year in respect of Class 1
    contributions), for the tax year which begins on 6th April 2026— the lower
    earnings limit shall be £129; the upper earnings limit shall be £967; the
    primary threshold shall be £242; the secondary threshold shall be £96; the
    upper secondary threshold for the Under 21 group shall be £967; and the
    upper secondary threshold for relevant apprentices shall be £967.
imports: []
