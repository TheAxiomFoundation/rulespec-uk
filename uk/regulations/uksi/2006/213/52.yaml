format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2006/213/52
  summary: |-
    Working-age Housing Benefit capital between the applicable lower threshold and GBP 16,000 is treated as weekly tariff income of GBP 1 for each complete or incomplete GBP 250 above that threshold. The ordinary lower threshold is GBP 6,000, with a GBP 10,000 lower threshold for prescribed paragraph (4) circumstances.
rules:
  - name: ordinary_capital_tariff_income_lower_threshold
    kind: parameter
    dtype: Money
    unit: GBP
    source: Housing Benefit Regulations 2006, regulation 52(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2006/213/52
              excerpt: "exceeds £6,000"
    versions:
      - effective_from: '2006-03-06'
        formula: |-
          6000

  - name: prescribed_circumstances_capital_tariff_income_lower_threshold
    kind: parameter
    dtype: Money
    unit: GBP
    source: Housing Benefit Regulations 2006, regulation 52(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2006/213/52
              excerpt: "exceeds £10,000"
    versions:
      - effective_from: '2006-03-06'
        formula: |-
          10000

  - name: capital_tariff_income_upper_limit
    kind: parameter
    dtype: Money
    unit: GBP
    source: Housing Benefit Regulations 2006, regulation 52(1), (3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2006/213/52
              excerpt: "but not exceeding £16,000"
    versions:
      - effective_from: '2006-03-06'
        formula: |-
          16000

  - name: capital_tariff_income_band_size
    kind: parameter
    dtype: Money
    unit: GBP
    source: Housing Benefit Regulations 2006, regulation 52(1), (6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2006/213/52
              excerpt: "for each complete £250"
    versions:
      - effective_from: '2006-03-06'
        formula: |-
          250

  - name: capital_tariff_income_weekly_amount_per_band
    kind: parameter
    dtype: Money
    period: Week
    unit: GBP
    source: Housing Benefit Regulations 2006, regulation 52(1), (6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2006/213/52
              excerpt: "weekly tariff income of £1"
    versions:
      - effective_from: '2006-03-06'
        formula: |-
          1

  - name: applicable_capital_tariff_income_lower_threshold
    kind: derived
    entity: Person
    dtype: Money
    unit: GBP
    source: Housing Benefit Regulations 2006, regulation 52(1), (3), (4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2006/213/52
              excerpt: "Except where the circumstances prescribed in paragraph"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2006/213/52
              excerpt: "circumstances prescribed in paragraph (4) apply"
    versions:
      - effective_from: '2006-03-06'
        formula: |-
          if claimant_in_prescribed_circumstances_under_regulation_52_4: prescribed_circumstances_capital_tariff_income_lower_threshold else: ordinary_capital_tariff_income_lower_threshold

  - name: capital_treated_as_yielding_weekly_tariff_income
    kind: derived
    entity: Person
    dtype: Judgment
    period: Week
    source: Housing Benefit Regulations 2006, regulation 52(1), (3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2006/213/52
              excerpt: "it shall be treated as equivalent to a weekly tariff income"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/regulation/uksi/2006/213/52
              excerpt: "but not exceeding £16,000"
    versions:
      - effective_from: '2006-03-06'
        formula: |-
          claimant_capital > applicable_capital_tariff_income_lower_threshold
          and claimant_capital <= capital_tariff_income_upper_limit

  - name: capital_tariff_weekly_income
    kind: derived
    entity: Person
    dtype: Money
    period: Week
    unit: GBP
    source: Housing Benefit Regulations 2006, regulation 52(1), (3), (6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2006/213/52
              excerpt: "£1 for each complete £250"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2006/213/52
              excerpt: "not a complete £250"
    versions:
      - effective_from: '2006-03-06'
        formula: |-
          if capital_treated_as_yielding_weekly_tariff_income: capital_tariff_income_weekly_amount_per_band * ceil((claimant_capital - applicable_capital_tariff_income_lower_threshold) / capital_tariff_income_band_size) else: 0
