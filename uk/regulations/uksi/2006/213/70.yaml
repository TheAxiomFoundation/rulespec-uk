format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2006/213/70
  summary: |-
    "appropriate maximum housing benefit in any week shall be 100 per cent. of his eligible rent calculated on a weekly basis ... less any deductions in respect of non-dependants"
rules:
  - name: maximum_housing_benefit_eligible_rent_percentage
    kind: parameter
    dtype: Rate
    source: Housing Benefit Regulations 2006, regulation 70
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2006/213/70
              excerpt: "100 per cent. of his eligible rent"
    versions:
      - effective_from: '2006-03-06'
        formula: |-
          1

  - name: appropriate_maximum_housing_benefit
    kind: derived
    entity: Person
    dtype: Money
    period: Week
    unit: GBP
    source: Housing Benefit Regulations 2006, regulation 70
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2006/213/70
              excerpt: "100 per cent. of his eligible rent calculated on a weekly basis"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2006/213/70
              excerpt: "less any deductions in respect of non-dependants"
    versions:
      - effective_from: '2006-03-06'
        formula: |-
          max(0, maximum_housing_benefit_eligible_rent_percentage * eligible_rent_calculated_weekly_in_accordance_with_regulations_80_and_81 - non_dependant_deductions_under_regulation_74)
