format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2006/214/29
  summary: |-
    For pension-age Housing Benefit, subject to capital disregarded under regulation 44(2), a claimant's capital is treated as weekly income of GBP 1 for each complete or incomplete GBP 500 above GBP 10,000.
rules:
  - name: capital_tariff_income_lower_threshold
    kind: parameter
    dtype: Money
    unit: GBP
    source: Housing Benefit (Persons who have attained the qualifying age for state pension credit) Regulations 2006, regulation 29(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2006/214/29
              excerpt: "in excess of £10,000"
    versions:
      - effective_from: '2006-03-06'
        formula: |-
          10000

  - name: capital_tariff_income_band_size
    kind: parameter
    dtype: Money
    unit: GBP
    source: Housing Benefit (Persons who have attained the qualifying age for state pension credit) Regulations 2006, regulation 29(2)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2006/214/29
              excerpt: "for each £500"
    versions:
      - effective_from: '2006-03-06'
        formula: |-
          500

  - name: capital_tariff_income_weekly_amount_per_band
    kind: parameter
    dtype: Money
    period: Week
    unit: GBP
    source: Housing Benefit (Persons who have attained the qualifying age for state pension credit) Regulations 2006, regulation 29(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2006/214/29
              excerpt: "weekly income of— £1"
    versions:
      - effective_from: '2006-03-06'
        formula: |-
          1

  - name: capital_treated_as_yielding_weekly_income
    kind: derived
    entity: Person
    dtype: Judgment
    period: Week
    source: Housing Benefit (Persons who have attained the qualifying age for state pension credit) Regulations 2006, regulation 29(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2006/214/29
              excerpt: "capital shall be treated as if it were a weekly income"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: uk/regulation/uksi/2006/214/29
              excerpt: "subject to regulation 44(2)"
    versions:
      - effective_from: '2006-03-06'
        formula: |-
          claimant_capital > capital_tariff_income_lower_threshold
          and not capital_disregarded_under_regulation_44_2

  - name: capital_tariff_weekly_income
    kind: derived
    entity: Person
    dtype: Money
    period: Week
    unit: GBP
    source: Housing Benefit (Persons who have attained the qualifying age for state pension credit) Regulations 2006, regulation 29(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2006/214/29
              excerpt: "£1 for each £500 in excess of £10,000"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2006/214/29
              excerpt: "£1 for any excess which is not a complete £500"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: uk/regulation/uksi/2006/214/29
              excerpt: "subject to regulation 44(2)"
    versions:
      - effective_from: '2006-03-06'
        formula: |-
          if capital_treated_as_yielding_weekly_income: capital_tariff_income_weekly_amount_per_band * ceil((claimant_capital - capital_tariff_income_lower_threshold) / capital_tariff_income_band_size) else: 0
