format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2006/214/50
  summary: |-
    The appropriate maximum housing benefit in any week is 100 per cent of eligible rent calculated weekly under regulations 61 and 62, less non-dependant deductions under regulation 55.
rules:
  - name: maximum_housing_benefit_eligible_rent_rate
    kind: parameter
    dtype: Rate
    source: Housing Benefit Regulations 2006 regulation 50
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: uk/regulation/uksi/2006/214/50
              excerpt: "100 per cent. of his eligible rent"
    versions:
      - effective_from: '2006-03-06'
        formula: |-
          1.00

  - name: appropriate_maximum_housing_benefit
    kind: derived
    entity: Person
    dtype: Money
    unit: GBP
    period: Week
    source: Housing Benefit Regulations 2006 regulation 50
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2006/214/50
          - path: versions[0].formula
            kind: import
            import:
              target: uk:regulations/uksi/2006/214/50#maximum_housing_benefit_eligible_rent_rate
              output: maximum_housing_benefit_eligible_rent_rate
              hash: sha256:local
    versions:
      - effective_from: '2006-03-06'
        formula: |-
          max(0, maximum_housing_benefit_eligible_rent_rate * eligible_rent_calculated_weekly_in_accordance_with_regulations_61_and_62 - non_dependant_deductions_under_regulation_55)
