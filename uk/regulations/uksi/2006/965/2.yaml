format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2006/965/2
  summary: |-
    "The weekly rate of child benefit payable in respect of a child or qualifying young person shall be— ... £27.05 (“the enhanced rate”); in any other case, £17.90." The enhanced rate is coordinated across spouses, civil partners, persons living as spouses or civil partners, and polygamous marriages; it is not payable to voluntary organisations or certain persons residing with a parent; specified benefits can require the enhanced rate.
rules:
  - name: child_benefit_enhanced_weekly_rate
    kind: parameter
    dtype: Money
    period: Week
    unit: GBP
    source: paragraph (1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2006/965/2
              excerpt: "£27.05 (“the enhanced rate”)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          27.05

  - name: child_benefit_other_weekly_rate
    kind: parameter
    dtype: Money
    period: Week
    unit: GBP
    source: paragraph (1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2006/965/2
              excerpt: "in any other case, £17.90"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          17.90

  - name: member_of_polygamous_marriage
    kind: derived
    entity: Person
    dtype: Judgment
    period: Week
    source: paragraph (3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: uk/regulation/uksi/2006/965/2
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          during_subsistence_of_marriage_any_party_married_to_more_than_one_person
          and marriage_ceremony_took_place_under_law_permitting_polygamy

  - name: child_benefit_enhanced_due_to_specified_benefit
    kind: derived
    entity: Person
    dtype: Judgment
    period: Week
    source: paragraphs (5) and (6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/regulation/uksi/2006/965/2
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          specified_benefit_allowance_or_increase_paid_for_week_to_person
          and specified_benefit_is_in_respect_of_only_elder_or_eldest_child_for_child_benefit_entitlement

  - name: child_benefit_enhanced_rate_payable
    kind: derived
    entity: Person
    dtype: Judgment
    period: Week
    source: paragraphs (1) to (5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2006/965/2
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: uk/regulation/uksi/2006/965/2
          - path: versions[0].formula
            kind: import
            import:
              target: uk:regulations/uksi/2006/965/2#child_benefit_enhanced_due_to_specified_benefit
              output: child_benefit_enhanced_due_to_specified_benefit
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          child_benefit_enhanced_due_to_specified_benefit
          or (
            child_or_qualifying_young_person_is_only_elder_or_eldest_for_payee
            and (
              not paragraph_2_relationship_coordination_applies
              or child_or_qualifying_young_person_is_elder_or_eldest_among_paragraph_2_children
            )
            and not payee_is_voluntary_organisation
            and not payee_resides_with_parent_otherwise_than_paragraph_2_a
          )

  - name: child_benefit_weekly_rate
    kind: derived
    entity: Person
    dtype: Money
    period: Week
    unit: GBP
    source: paragraphs (1) to (5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2006/965/2
          - path: versions[0].formula
            kind: import
            import:
              target: uk:regulations/uksi/2006/965/2#child_benefit_enhanced_weekly_rate
              output: child_benefit_enhanced_weekly_rate
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: uk:regulations/uksi/2006/965/2#child_benefit_other_weekly_rate
              output: child_benefit_other_weekly_rate
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: uk:regulations/uksi/2006/965/2#child_benefit_enhanced_rate_payable
              output: child_benefit_enhanced_rate_payable
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if child_benefit_enhanced_rate_payable: child_benefit_enhanced_weekly_rate else: child_benefit_other_weekly_rate
