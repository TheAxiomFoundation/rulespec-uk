format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2008/794/118
  summary: |-
    Income-related ESA capital between the applicable lower threshold and GBP 16,000 is treated as weekly income of GBP 1 for each complete or incomplete GBP 250 above that threshold. The ordinary lower threshold is GBP 6,000, with a GBP 10,000 lower threshold for prescribed accommodation cases.
rules:
  - name: ordinary_capital_tariff_income_lower_threshold
    kind: parameter
    dtype: Money
    unit: GBP
    source: Employment and Support Allowance Regulations 2008, regulation 118(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2008/794/118
              excerpt: "exceeds £6,000"
    versions:
      - effective_from: '2008-10-27'
        formula: |-
          6000

  - name: prescribed_accommodation_capital_tariff_income_lower_threshold
    kind: parameter
    dtype: Money
    unit: GBP
    source: Employment and Support Allowance Regulations 2008, regulation 118(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2008/794/118
              excerpt: "exceeds £10,000"
    versions:
      - effective_from: '2008-10-27'
        formula: |-
          10000

  - name: capital_tariff_income_upper_limit
    kind: parameter
    dtype: Money
    unit: GBP
    source: Employment and Support Allowance Regulations 2008, regulation 118(1)-(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2008/794/118
              excerpt: "but not exceeding £16,000"
    versions:
      - effective_from: '2008-10-27'
        formula: |-
          16000

  - name: capital_tariff_income_band_size
    kind: parameter
    dtype: Money
    unit: GBP
    source: Employment and Support Allowance Regulations 2008, regulation 118(1), (5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2008/794/118
              excerpt: "for each complete £250"
    versions:
      - effective_from: '2008-10-27'
        formula: |-
          250

  - name: capital_tariff_income_weekly_amount_per_band
    kind: parameter
    dtype: Money
    period: Week
    unit: GBP
    source: Employment and Support Allowance Regulations 2008, regulation 118(1), (5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2008/794/118
              excerpt: "weekly income of £1"
    versions:
      - effective_from: '2008-10-27'
        formula: |-
          1

  - name: applicable_capital_tariff_income_lower_threshold
    kind: derived
    entity: Person
    dtype: Money
    unit: GBP
    source: Employment and Support Allowance Regulations 2008, regulation 118(1)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2008/794/118
              excerpt: "Except where the circumstances prescribed in paragraph (3) apply"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2008/794/118
              excerpt: "the circumstances prescribed in paragraph (3) apply"
    versions:
      - effective_from: '2008-10-27'
        formula: |-
          if claimant_in_prescribed_accommodation_under_regulation_118_3: prescribed_accommodation_capital_tariff_income_lower_threshold else: ordinary_capital_tariff_income_lower_threshold

  - name: capital_treated_as_yielding_weekly_income
    kind: derived
    entity: Person
    dtype: Judgment
    period: Week
    source: Employment and Support Allowance Regulations 2008, regulation 118(1)-(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2008/794/118
              excerpt: "it is to be treated as equivalent to a weekly income"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/regulation/uksi/2008/794/118
              excerpt: "but not exceeding £16,000"
    versions:
      - effective_from: '2008-10-27'
        formula: |-
          claimant_capital > applicable_capital_tariff_income_lower_threshold
          and claimant_capital <= capital_tariff_income_upper_limit

  - name: capital_tariff_weekly_income
    kind: derived
    entity: Person
    dtype: Money
    period: Week
    unit: GBP
    source: Employment and Support Allowance Regulations 2008, regulation 118(1), (2), (5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2008/794/118
              excerpt: "£1 for each complete £250"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2008/794/118
              excerpt: "where any part of the excess is not a complete £250"
    versions:
      - effective_from: '2008-10-27'
        formula: |-
          if capital_treated_as_yielding_weekly_income: capital_tariff_income_weekly_amount_per_band * ceil((claimant_capital - applicable_capital_tariff_income_lower_threshold) / capital_tariff_income_band_size) else: 0
