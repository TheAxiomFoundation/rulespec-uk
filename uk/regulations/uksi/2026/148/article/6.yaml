format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2026/148/article/6
  summary: |-
    Article 6(1) of the Social Security Benefits Up-rating Order 2026 amends regulation 1A of the State Pension Regulations 2015 to set the full weekly rate of the new State Pension from 6 April 2026. It substitutes GBP 241.30 for GBP 230.25.
rules:
  - name: full_new_state_pension_substituted_amount
    kind: parameter
    dtype: Money
    period: Week
    unit: GBP
    source: Article 6(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2026/148/article/6
              excerpt: "for \"£230.25\" substitute \"£241.30\""
    versions:
      - effective_from: '2026-04-06'
        formula: |-
          241.30

  - name: full_new_state_pension_weekly_rate
    kind: derived
    dtype: Money
    period: Week
    unit: GBP
    source: Article 6(1), applied to regulation 1A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2026/148/article/6
              excerpt: "for \"£230.25\" substitute \"£241.30\""
    versions:
      - effective_from: '2026-04-06'
        formula: |-
          full_new_state_pension_substituted_amount
