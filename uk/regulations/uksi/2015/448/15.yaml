format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2015/448/15
  summary: |-
    Regulation 15 of the Childcare Payments (Eligibility) Regulations 2015 treats a person as meeting the income condition only if the person does not expect adjusted net income to exceed GBP 100,000 for the relevant tax year.
rules:
  - name: tax_free_childcare_maximum_adjusted_net_income
    kind: parameter
    dtype: Money
    period: Year
    unit: GBP
    source: Childcare Payments (Eligibility) Regulations 2015 reg. 15(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2015/448/15
              excerpt: "adjusted net income to exceed \u00a3100,000"
    versions:
      - effective_from: '2015-01-01'
        formula: |-
          100000
