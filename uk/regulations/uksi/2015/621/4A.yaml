module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2015/621/4A
  summary: |-
    The hourly rate of the national minimum wage is £10.85 for a worker aged 18 years or over but not yet aged 21, £8.00 for a worker aged under 18, and £8.00 for a worker to whom the apprenticeship rate applies. If the apprenticeship rate applies, the national living wage rate and the 18-to-under-21 and under-18 rates do not apply.
