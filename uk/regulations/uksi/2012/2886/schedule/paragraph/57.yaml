format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2012/2886/schedule/paragraph/57
  summary: |-
    “The maximum deduction … where the applicant’s family includes only one child … £175.00 per week; where … more than one child … £300 per week.”
  deferred_outputs:
    - output: uk:regulations/uksi/2012/2886/schedule/paragraph/57#applicant_weekly_income
      reason: >-
        The final weekly-income calculation is expressly subject to paragraph 60
        and requires calculations under paragraphs 58, 71, and 72, but no copied
        RuleSpec context supplies the required executable outputs.
      source_values:
        - uk:regulations/uksi/2012/2886/schedule/paragraph/57#single_child_care_deduction_cap
        - uk:regulations/uksi/2012/2886/schedule/paragraph/57#multiple_child_care_deduction_cap
rules:
  - name: single_child_care_deduction_cap
    kind: parameter
    dtype: Money
    period: Week
    unit: GBP
    source: Schedule, paragraph 57(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2886/schedule/paragraph/57
              excerpt: "only one child"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          175.00

  - name: multiple_child_care_deduction_cap
    kind: parameter
    dtype: Money
    period: Week
    unit: GBP
    source: Schedule, paragraph 57(3)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2886/schedule/paragraph/57
              excerpt: "more than one child"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          300

  - name: maximum_relevant_child_care_charge_deduction
    kind: derived
    entity: Family
    dtype: Money
    period: Week
    unit: GBP
    source: Schedule, paragraph 57(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2886/schedule/paragraph/57
              excerpt: "only one child"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if number_of_children_for_whom_relevant_child_care_charges_are_paid == 1: single_child_care_deduction_cap else: if number_of_children_for_whom_relevant_child_care_charges_are_paid > 1: multiple_child_care_deduction_cap else: 0
