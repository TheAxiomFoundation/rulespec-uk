format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2012/2886/schedule/paragraph/23
  summary: |-
    The class consists of any person whose capital exceeds £16,000; capital is calculated in accordance with Part 10.
rules:
  - name: capital_disqualification_limit
    kind: parameter
    dtype: Money
    unit: GBP
    source: U.K. S.I. 2012/2886, Schedule, paragraph 23(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2886/schedule/paragraph/23
              excerpt: "capital exceeds £16,000"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          16000
  - name: person_is_in_capital_exceeding_class
    kind: derived
    entity: Person
    dtype: Judgment
    period: Week
    source: U.K. S.I. 2012/2886, Schedule, paragraph 23
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2886/schedule/paragraph/23
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          capital_calculated_in_accordance_with_part_10 > capital_disqualification_limit
