format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2012/2886/schedule/paragraph/50
  summary: |-
    “does not exceed a week, the weekly amount is to be the amount of that payment”;
    for a month, multiply the payment by 12 and divide by 52; in any other case,
    divide by the number of days in the period and multiply by 7. Self-employed
    earnings are divided by the assessment-period days and multiplied by 7.
rules:
  - name: months_in_annual_weekly_conversion
    kind: parameter
    dtype: Count
    source: Schedule, paragraph 50, monthly-payment calculation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2886/schedule/paragraph/50
              excerpt: "multiplying the amount of the payment by 12"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12

  - name: weeks_in_annual_weekly_conversion
    kind: parameter
    dtype: Count
    source: Schedule, paragraph 50, monthly-payment calculation
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2886/schedule/paragraph/50
              excerpt: "dividing the product by 52"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          52

  - name: days_in_weekly_conversion
    kind: parameter
    dtype: Count
    source: Schedule, paragraph 50, daily-period calculations
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2886/schedule/paragraph/50
              excerpt: "multiplying the product by 7"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          7

  - name: weekly_amount_of_payment_for_paragraphs_47_49_and_59
    kind: derived
    entity: Payment
    dtype: Money
    unit: GBP
    period: Week
    source: Schedule, paragraph 50, first paragraph
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2886/schedule/paragraph/50
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if payment_period_does_not_exceed_week:
            payment_amount
          else:
            if payment_period_is_month:
              payment_amount * months_in_annual_weekly_conversion / weeks_in_annual_weekly_conversion
            else:
              payment_amount / number_of_days_in_payment_period * days_in_weekly_conversion

  - name: weekly_earnings_of_self_employed_applicant
    kind: derived
    entity: Person
    dtype: Money
    unit: GBP
    period: Week
    source: Schedule, paragraph 50, second paragraph
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2886/schedule/paragraph/50
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          earnings_over_assessment_period / number_of_days_in_assessment_period * days_in_weekly_conversion
