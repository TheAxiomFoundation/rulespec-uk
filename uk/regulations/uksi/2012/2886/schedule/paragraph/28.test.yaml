    uk:regulations/uksi/2012/2886/schedule/paragraph/28#input.other_party_to_earlier_marriage_lives_in_same_household: true
  output:
    uk:regulations/uksi/2012/2886/schedule/paragraph/28#universal_credit_maximum_amount_applies: holds
    uk:regulations/uksi/2012/2886/schedule/paragraph/28#applicable_amount_from_universal_credit_maximum_amount: 120
