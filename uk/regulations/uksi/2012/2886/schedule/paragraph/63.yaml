format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2012/2886/schedule/paragraph/63
  summary: |-
    The applicant’s capital is the whole capital calculated under this Part, with paragraph 64 income added for a non-pensioner and applicable Schedule 9 or 10 capital disregarded. A pensioner’s qualifying tax-credit or state-pension-credit arrears are included. A child’s or young person’s capital is excluded for a non-pensioner applicant.
rules:
  - name: applicant_capital_taken_into_account
    kind: derived
    entity: Person
    dtype: Money
    unit: GBP
    source: Schedule, paragraph 63
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2886/schedule/paragraph/63
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2886/schedule/paragraph/63
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(
            0,
            capital_calculated_in_accordance_with_this_part
            + (if applicant_is_pensioner:
                child_tax_credit_arrears_for_period_with_prior_scheme_reduction
                + working_tax_credit_arrears_for_period_with_prior_scheme_reduction
                + state_pension_credit_arrears_for_period_with_prior_scheme_reduction
              else:
                income_treated_as_capital_under_paragraph_64
                - capital_of_child_or_young_person_who_is_family_member)
            - (if applicant_is_pensioner:
                capital_disregarded_under_schedule_9
              else:
                capital_disregarded_under_schedule_10)
          )
