        kind: formula
        source:
          corpus_citation_path: uk/regulation/uksi/2012/2886/schedule/paragraph/34
  versions:
  - effective_from: '0001-01-01'
    formula: 'if non_dependant_arrangements_deeming_applies: non_dependant_capital_calculated_as_for_applicant_under_following_provisions_of_this_part
      else: 0'
- name: applicant_own_income_and_capital_disregarded_under_non_dependant_arrangements_rule
  kind: derived
  entity: Person
  dtype: Judgment
  source: Schedule, paragraph 34
  metadata:
    proof:
      atoms:
