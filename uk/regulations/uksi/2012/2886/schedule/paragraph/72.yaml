format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2012/2886/schedule/paragraph/72
  summary: "The capital of an applicant who is not a pensioner is treated as weekly\
    \ income of \xA31 for each \xA3250 in excess of \xA36,000 but not exceeding \xA3\
    16,000, with \xA31 for any incomplete \xA3250 excess."
rules:
- name: capital_tariff_income_threshold
  kind: parameter
  dtype: Money
  unit: GBP
  source: Schedule, paragraph 72
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: uk/regulation/uksi/2012/2886/schedule/paragraph/72
          excerpt: "in excess of \xA36,000"
  versions:
  - effective_from: '0001-01-01'
    formula: '6000'
- name: capital_tariff_income_upper_limit
  kind: parameter
  dtype: Money
  unit: GBP
  source: Schedule, paragraph 72
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: uk/regulation/uksi/2012/2886/schedule/paragraph/72
          excerpt: "but not exceeding \xA316,000"
  versions:
  - effective_from: '0001-01-01'
    formula: '16000'
- name: capital_tariff_band_size
  kind: parameter
  dtype: Money
  unit: GBP
  source: Schedule, paragraph 72
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: uk/regulation/uksi/2012/2886/schedule/paragraph/72
          excerpt: "for each \xA3250"
  versions:
  - effective_from: '0001-01-01'
    formula: '250'
- name: weekly_income_per_capital_tariff_band
  kind: parameter
  dtype: Money
  unit: GBP
  period: Week
  source: Schedule, paragraph 72
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: uk/regulation/uksi/2012/2886/schedule/paragraph/72
          excerpt: "\xA31 for each \xA3250"
  versions:
  - effective_from: '0001-01-01'
    formula: '1'
- name: weekly_income_treated_as_from_non_pensioner_capital
  kind: derived
  entity: Person
  dtype: Money
  unit: GBP
  period: Week
  source: Schedule, paragraph 72
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: uk/regulation/uksi/2012/2886/schedule/paragraph/72
          excerpt: "\xA31 for any excess which is not a complete \xA3250."
      - path: versions[0].formula
        kind: condition
        source:
          corpus_citation_path: uk/regulation/uksi/2012/2886/schedule/paragraph/72
          excerpt: an applicant who is not a pensioner
  versions:
  - effective_from: '0001-01-01'
    formula: 'if applicant_is_a_pensioner: 0 else: ceil( max( 0, min( capital_calculated_in_accordance_with_this_part,
      capital_tariff_income_upper_limit ) - capital_tariff_income_threshold ) / capital_tariff_band_size
      ) * weekly_income_per_capital_tariff_band'
