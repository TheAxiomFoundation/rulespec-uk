format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2012/2886/appendix/3/paragraph/3
  summary: |-
    A person is entitled to £65.62 for the period from birth until the day before the first Monday in September following their sixteenth birthday, and £65.62 for the period from that Monday until the day before their twentieth birthday.
rules:
  - name: child_birth_to_sixteenth_birthday_amount
    kind: parameter
    dtype: Money
    period: Week
    unit: GBP
    source: Appendix 3, paragraph 3, table, row (a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2886/appendix/3/paragraph/3
              excerpt: "£65.62"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          65.62
  - name: young_person_sixteenth_to_twentieth_birthday_amount
    kind: parameter
    dtype: Money
    period: Week
    unit: GBP
    source: Appendix 3, paragraph 3, table, row (b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2886/appendix/3/paragraph/3
              excerpt: "£65.62"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          65.62
  - name: child_birth_to_sixteenth_birthday_weekly_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Week
    unit: GBP
    source: Appendix 3, paragraph 3, table, row (a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2886/appendix/3/paragraph/3
              excerpt: "beginning on that person’s date of birth and ending on the day preceding the first Monday in September following that person’s sixteenth birthday"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2886/appendix/3/paragraph/3
              excerpt: "£65.62"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if person_is_in_birth_to_first_monday_after_sixteenth_birthday_period: child_birth_to_sixteenth_birthday_amount else: 0
  - name: young_person_sixteenth_to_twentieth_birthday_weekly_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Week
    unit: GBP
    source: Appendix 3, paragraph 3, table, row (b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2886/appendix/3/paragraph/3
              excerpt: "beginning on the first Monday in September following that person’s sixteenth birthday and ending on the day preceding that person’s twentieth birthday"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2886/appendix/3/paragraph/3
              excerpt: "£65.62"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if person_is_in_first_monday_after_sixteenth_to_twentieth_birthday_period: young_person_sixteenth_to_twentieth_birthday_amount else: 0
