format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2012/2886/appendix/3/paragraph/1
  summary: |-
    “The amounts specified in column (2) below in respect of each person or couple specified in column (1)” are £71.70 for a single applicant entitled to main phase employment and support allowance, £71.70 for a single applicant aged at least 25, £56.80 for a single applicant aged at least 18 but under 25, £71.70 for a lone parent, and £112.55 for a couple.
rules:
  - name: single_applicant_main_phase_employment_and_support_allowance_amount
    kind: parameter
    dtype: Money
    unit: GBP
    source: Appendix 3, paragraph 1, table row (1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2886/appendix/3/paragraph/1
              excerpt: "| (a) is entitled to main phase employment and support allowance; | (a) \u00a371.70; |"
              table:
                header: "Person or couple / Amount"
                row: "(1)(a)"
                column: "Amount"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          71.70

  - name: single_applicant_aged_at_least_25_amount
    kind: parameter
    dtype: Money
    unit: GBP
    source: Appendix 3, paragraph 1, table row (1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2886/appendix/3/paragraph/1
              excerpt: "| (b) is aged not less than 25; | (b) \u00a371.70; |"
              table:
                header: "Person or couple / Amount"
                row: "(1)(b)"
                column: "Amount"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          71.70

  - name: single_applicant_aged_18_to_24_amount
    kind: parameter
    dtype: Money
    unit: GBP
    source: Appendix 3, paragraph 1, table row (1)(c)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2886/appendix/3/paragraph/1
              excerpt: "| (c) is aged not less than 18 but less than 25. | (c) \u00a356.80. |"
              table:
                header: "Person or couple / Amount"
                row: "(1)(c)"
                column: "Amount"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          56.80

  - name: lone_parent_amount
    kind: parameter
    dtype: Money
    unit: GBP
    source: Appendix 3, paragraph 1, table row (2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2886/appendix/3/paragraph/1
              excerpt: "| (2) Lone parent. | (2) \u00a371.70. |"
              table:
                header: "Person or couple / Amount"
                row: "(2) Lone parent"
                column: "Amount"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          71.70

  - name: couple_amount
    kind: parameter
    dtype: Money
    unit: GBP
    source: Appendix 3, paragraph 1, table row (3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: table_cell
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2886/appendix/3/paragraph/1
              excerpt: "| (3) Couple. | (3) \u00a3112.55. |"
              table:
                header: "Person or couple / Amount"
                row: "(3) Couple"
                column: "Amount"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          112.55

  - name: person_or_couple_applicable_amount
    kind: derived
    entity: Family
    dtype: Money
    unit: GBP
    source: Appendix 3, paragraph 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2886/appendix/3/paragraph/1
              excerpt: "The amounts specified in column (2) below in respect of each person or couple specified in column (1)"
          - path: versions[0].formula
            kind: import
            import:
              target: uk:regulations/uksi/2012/2886/appendix/3/paragraph/1#single_applicant_main_phase_employment_and_support_allowance_amount
              output: single_applicant_main_phase_employment_and_support_allowance_amount
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: uk:regulations/uksi/2012/2886/appendix/3/paragraph/1#single_applicant_aged_at_least_25_amount
              output: single_applicant_aged_at_least_25_amount
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: uk:regulations/uksi/2012/2886/appendix/3/paragraph/1#single_applicant_aged_18_to_24_amount
              output: single_applicant_aged_18_to_24_amount
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: uk:regulations/uksi/2012/2886/appendix/3/paragraph/1#lone_parent_amount
              output: lone_parent_amount
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: uk:regulations/uksi/2012/2886/appendix/3/paragraph/1#couple_amount
              output: couple_amount
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if applicant_is_single and applicant_is_entitled_to_main_phase_employment_and_support_allowance: single_applicant_main_phase_employment_and_support_allowance_amount else: if applicant_is_single and applicant_is_aged_not_less_than_25: single_applicant_aged_at_least_25_amount else: if applicant_is_single and applicant_is_aged_not_less_than_18_but_less_than_25: single_applicant_aged_18_to_24_amount else: if applicant_is_lone_parent: lone_parent_amount else: if applicants_are_a_couple: couple_amount else: 0
