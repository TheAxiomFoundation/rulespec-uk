format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2012/2885/11
  summary: |-
    Subject to paragraph (2), the classes of pensioners described in paragraph 1 of Schedule 1 must be included in an authority’s scheme. Pensioners whose capital exceeds £16,000 must not be included. Capital is calculated in accordance with Part 6 of Schedule 1.
rules:
  - name: pensioner_capital_exclusion_threshold
    kind: parameter
    dtype: Money
    unit: GBP
    source: Regulation 11(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2885/11
              excerpt: "Pensioners whose capital exceeds £16,000"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          16000

  - name: pensioner_must_be_included_in_authority_scheme
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Regulation 11(1), subject to Regulation 11(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2885/11
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2885/11
              excerpt: "Pensioners whose capital exceeds £16,000"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_pensioner_described_in_schedule_1_paragraph_1
          and pensioner_capital_calculated_in_accordance_with_part_6_of_schedule_1 <= pensioner_capital_exclusion_threshold

  - name: pensioner_must_not_be_included_in_authority_scheme
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Regulation 11(2), with capital calculated under Regulation 11(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2885/11
              excerpt: "Pensioners whose capital exceeds £16,000"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2885/11
              excerpt: "Capital for the purposes of paragraph (2) is to be calculated in accordance with Part 6 of Schedule 1."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_pensioner
          and pensioner_capital_calculated_in_accordance_with_part_6_of_schedule_1 > pensioner_capital_exclusion_threshold
