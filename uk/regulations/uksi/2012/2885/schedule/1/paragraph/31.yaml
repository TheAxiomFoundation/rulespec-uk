format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2012/2885/schedule/1/paragraph/31
  summary: |-
    An applicant’s capital is treated as including arrears of child tax credit, working tax credit, or state pension credit where paid for a period for which a scheme reduction had already been allowed.
rules:
  - name: arrears_payment_amount_treated_as_applicant_capital
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: GBP
    source: Schedule 1, paragraph 31(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2885/schedule/1/paragraph/31
              excerpt: "capital is to be treated as including any payment made to him by way of arrears"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2885/schedule/1/paragraph/31
              excerpt: "child tax credit; working tax credit; state pension credit"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2885/schedule/1/paragraph/31
              excerpt: "if the payment was made in respect of a period for the whole or part of which a reduction under an authority’s scheme was allowed"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if (payment_is_arrears_of_child_tax_credit
          or payment_is_arrears_of_working_tax_credit
          or payment_is_arrears_of_state_pension_credit)
          and payment_was_made_in_respect_of_period_with_prior_scheme_reduction:
            payment_amount
          else: 0
