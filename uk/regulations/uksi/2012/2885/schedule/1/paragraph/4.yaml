format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2012/2885/schedule/1/paragraph/4
  summary: |-
    "On any day class C consists of any person who is a pensioner" and meets the council-tax, residence, reduction-calculation, prescribed-class, application, and sub-paragraph (2) conditions, subject to paragraph 5.
rules:
  - name: person_is_in_class_c
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: Schedule 1, paragraph 4(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2885/schedule/1/paragraph/4
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_is_pensioner
          and person_is_liable_to_pay_council_tax_for_resident_dwelling
          and not person_is_absent_from_dwelling_throughout_day
          and maximum_council_tax_reduction_amount_can_be_calculated
          and not person_is_in_prescribed_class_excluded_from_authority_scheme
          and person_has_made_application
          and condition_in_subparagraph_2_is_met
          and not paragraph_5_displaces_class_c
