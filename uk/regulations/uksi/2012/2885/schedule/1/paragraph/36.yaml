module:
  status: deferred
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2012/2885/schedule/1/paragraph/36
  summary: |-
    “Except where an applicant possesses capital which is disregarded under paragraph 34(4) (notional capital)”; absent evidence to the contrary, an applicant jointly beneficially entitled in possession to a capital asset is treated as entitled to an equal share.
  deferred_outputs:
    - output: uk:regulations/uksi/2012/2885/schedule/1/paragraph/36#applicant_jointly_owned_asset_capital_treated_as_possessing
      reason: >-
        The equal-share deeming rule is displaced where the applicant possesses
        notional capital disregarded under paragraph 34(4), but no copied
        RuleSpec context supplies paragraph 34(4)'s operative exception.
        Faithfully computing the final treated capital amount also requires the
        applicant's evidenced beneficial share when evidence rebuts the
        statutory equal-share presumption.
