format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2012/2885/schedule/6/paragraph/1
  summary: |-
    Premises acquired for occupation by the applicant, intended as the applicant's home within 26 weeks of acquisition or within a longer reasonable period to obtain possession and commence occupation.
rules:
  - name: home_occupation_intention_period_weeks
    kind: parameter
    dtype: Count
    period: Week
    source: UKSI 2012/2885, Schedule 6, paragraph 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2885/schedule/6/paragraph/1
              excerpt: "within 26 weeks of the date of acquisition"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          26
  - name: premises_qualify_for_home_occupation
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Week
    source: UKSI 2012/2885, Schedule 6, paragraph 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2885/schedule/6/paragraph/1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          premises_acquired_for_occupation_by_applicant
          and applicant_intends_to_occupy_premises_as_home
          and (
            intended_occupation_weeks_after_acquisition <= home_occupation_intention_period_weeks
            or longer_period_is_reasonable_to_obtain_possession_and_commence_occupation
          )
