format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2012/2885/schedule/4/paragraph/9
  summary: |-
    Earnings derived from employment ended before the day on which the applicant first satisfies entitlement conditions, other than earnings referred to in Schedule 1 paragraph 17(9)(b).
rules:
  - name: earnings_from_pre_entitlement_employment_disregarded
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Day
    source: Schedule 4, paragraph 9
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2885/schedule/4/paragraph/9
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          payment_is_earnings_derived_from_employment
          and employment_ended_before_first_entitlement_day
          and not payment_is_earnings_referred_to_in_schedule_1_paragraph_17_9_b
