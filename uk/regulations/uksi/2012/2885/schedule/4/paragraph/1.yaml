format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2012/2885/schedule/4/paragraph/1
  summary: |-
    Where two or more of paragraphs 2 to 5 apply, the overall maximum sum disregarded is £25 for a lone parent and £20 in any other case.
rules:
  - name: lone_parent_overall_disregard_cap
    kind: parameter
    dtype: Money
    unit: GBP
    source: uk/regulation/uksi/2012/2885/schedule/4/paragraph/1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2885/schedule/4/paragraph/1
              excerpt: "£25 in the case of a lone parent"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          25
  - name: other_case_overall_disregard_cap
    kind: parameter
    dtype: Money
    unit: GBP
    source: uk/regulation/uksi/2012/2885/schedule/4/paragraph/1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2885/schedule/4/paragraph/1
              excerpt: "£20 in any other case"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          20
  - name: overall_disregard_cap_when_multiple_paragraphs_apply
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: GBP
    source: uk/regulation/uksi/2012/2885/schedule/4/paragraph/1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2012/2885/schedule/4/paragraph/1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if two_or_more_of_paragraphs_2_to_5_apply:
            if case_is_lone_parent:
              lone_parent_overall_disregard_cap
            else:
              other_case_overall_disregard_cap
          else:
            0
