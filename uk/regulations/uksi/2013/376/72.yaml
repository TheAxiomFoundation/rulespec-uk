format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2013/376/72
  summary: |-
    A person's capital is treated as yielding monthly income of £4.35 for each £250, including an incomplete £250, above £6,000; paragraph (1) does not apply for disregarded capital or actual income taken into account under regulation 66(1)(i) or (j).
rules:
  - name: capital_tariff_income_lower_threshold
    kind: parameter
    dtype: Money
    unit: GBP
    source: Universal Credit Regulations 2013, regulation 72(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/72
              excerpt: "in excess of £6,000"
    versions:
      - effective_from: '2013-04-29'
        formula: |-
          6000

  - name: capital_tariff_income_band_size
    kind: parameter
    dtype: Money
    unit: GBP
    source: Universal Credit Regulations 2013, regulation 72(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/72
              excerpt: "for each £250"
    versions:
      - effective_from: '2013-04-29'
        formula: |-
          250

  - name: capital_tariff_income_monthly_amount_per_band
    kind: parameter
    dtype: Money
    period: Month
    unit: GBP
    source: Universal Credit Regulations 2013, regulation 72(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/72
              excerpt: "monthly income of £4.35"
    versions:
      - effective_from: '2013-04-29'
        formula: |-
          4.35

  - name: capital_treated_as_yielding_income
    kind: derived
    entity: Person
    dtype: Judgment
    source: Universal Credit Regulations 2013, regulation 72(1)-(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/72
              excerpt: "capital is to be treated as yielding a monthly income"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/72
              excerpt: "Paragraph (1) does not apply where the capital is disregarded"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/72
              excerpt: "Paragraph (1) does not apply where the capital is disregarded or the actual income from that capital is taken into account under regulation 66(1)(i) (income from an annuity) or (j) (income from a trust)."
    versions:
      - effective_from: '2013-04-29'
        formula: |-
          person_capital > capital_tariff_income_lower_threshold
          and not capital_is_disregarded
          and not actual_income_from_capital_taken_into_account_under_regulation_66_1_i_annuity
          and not actual_income_from_capital_taken_into_account_under_regulation_66_1_j_trust

  - name: capital_tariff_monthly_income
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: GBP
    source: Universal Credit Regulations 2013, regulation 72(1)-(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/72
              excerpt: "£4.35 for each £250 in excess of £6,000 and £4.35 for any excess which is not a complete £250"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/72
              excerpt: "Paragraph (1) does not apply"
    versions:
      - effective_from: '2013-04-29'
        formula: |-
          if capital_treated_as_yielding_income: capital_tariff_income_monthly_amount_per_band * ceil((person_capital - capital_tariff_income_lower_threshold) / capital_tariff_income_band_size) else: 0

  - name: actual_income_from_tariffed_capital_treated_as_capital
    kind: derived
    entity: Person
    dtype: Money
    period: Day
    unit: GBP
    source: Universal Credit Regulations 2013, regulation 72(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/72
              excerpt: "Where a person's capital is treated as yielding income, any actual income derived from that capital, for example rental, interest or dividends, is to be treated as part of the person's capital from the day it is due to be paid to the person."
    versions:
      - effective_from: '2013-04-29'
        formula: |-
          if capital_treated_as_yielding_income: actual_income_derived_from_that_capital_due_to_be_paid_to_person_on_day_amount else: 0
