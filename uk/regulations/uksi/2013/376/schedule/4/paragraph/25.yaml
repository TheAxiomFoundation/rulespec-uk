format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2013/376/schedule/4/paragraph/25
  summary: |-
    "The renter's cap rent is to be determined as follows"; determine the category of accommodation, determine the maximum allowable amount under sub-paragraph (2) or (4), and "The result is the renter's cap rent."
rules:
  - name: subparagraph_4_maximum_allowable_amount_condition_applies
    kind: derived
    entity: Family
    dtype: Judgment
    period: Month
    source: Schedule 4 paragraph 25(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/schedule/4/paragraph/25
              excerpt: "But the maximum allowable amount in relation to the renter is to be determined under sub-paragraph (4) in any case where—\nparagraph 4 of Schedule 3 (claimant housed in two dwellings by provider of social housing) applies to the renter; and"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/schedule/4/paragraph/25
              excerpt: "But the maximum allowable amount in relation to the renter is to be determined under sub-paragraph (4) in any case where—\nparagraph 4 of Schedule 3 (claimant housed in two dwellings by provider of social housing) applies to the renter; and\nthe maximum allowable amount determined under sub-paragraph (2) for the renter in relation to accommodation A and the amount so determined in relation to accommodation B are different (references to accommodation A and accommodation B are to be understood in accordance with paragraph 4 of Schedule 3); and"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/schedule/4/paragraph/25
              excerpt: "But the maximum allowable amount in relation to the renter is to be determined under sub-paragraph (4) in any case where—\nparagraph 4 of Schedule 3 (claimant housed in two dwellings by provider of social housing) applies to the renter; and\nthe maximum allowable amount determined under sub-paragraph (2) for the renter in relation to accommodation A and the amount so determined in relation to accommodation B are different (references to accommodation A and accommodation B are to be understood in accordance with paragraph 4 of Schedule 3); and\na single calculation is to be made in relation to the renter under paragraph 17 (renter treated as occupying single accommodation)."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          schedule_3_paragraph_4_applies_to_renter
          and not (maximum_allowable_amount_for_accommodation_a_under_subparagraph_2_when_current_pair_first_calculated == maximum_allowable_amount_for_accommodation_b_under_subparagraph_2_when_current_pair_first_calculated)
          and single_calculation_to_be_made_under_paragraph_17

  - name: renters_cap_rent
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: GBP
    source: Schedule 4 paragraph 25(1)-(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/schedule/4/paragraph/25
              excerpt: "The result is the renter's cap rent."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/schedule/4/paragraph/25
              excerpt: "The maximum allowable amount to be used in relation to the renter is the local housing allowance which applies at the relevant time to—\nthe broad rental market area in which the renter's accommodation is situated; and\nthe category of accommodation determined at step 1 as that to which the renter is entitled."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/schedule/4/paragraph/25
              excerpt: "is to be determined by reference to the accommodation for which the amount referred to in sub-paragraph (3)(b) is lower when the calculation is first made;"
          - path: versions[0].formula
            kind: import
            import:
              target: uk:regulations/uksi/2013/376/schedule/4/paragraph/25#subparagraph_4_maximum_allowable_amount_condition_applies
              output: subparagraph_4_maximum_allowable_amount_condition_applies
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if subparagraph_4_maximum_allowable_amount_condition_applies: if maximum_allowable_amount_for_accommodation_a_under_subparagraph_2_when_current_pair_first_calculated < maximum_allowable_amount_for_accommodation_b_under_subparagraph_2_when_current_pair_first_calculated: local_housing_allowance_for_accommodation_a_broad_rental_market_area_and_entitled_category else: local_housing_allowance_for_accommodation_b_broad_rental_market_area_and_entitled_category else: local_housing_allowance_for_renters_broad_rental_market_area_and_entitled_category
