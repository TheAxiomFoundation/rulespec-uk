format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2013/376/schedule/4/paragraph/28
  summary: |-
    "specified renter" means a renter for whom all conditions are met: the renter is a single person or member of a couple claiming as a single person, is under 35, is not an excepted person under paragraph 29, is not responsible for any children or qualifying young persons, and has no non-dependant in relation to the renter.
