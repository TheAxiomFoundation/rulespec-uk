format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2013/376/schedule/5/paragraph/2
  summary: |-
    “owner-occupier” means a single owner-occupier within the meaning of paragraph 1(2) or each of joint owner-occupiers; “relevant date” means, in relation to an owner-occupier, the date on which an amount of housing costs element calculated under this Schedule is first included in the owner-occupier’s award.
