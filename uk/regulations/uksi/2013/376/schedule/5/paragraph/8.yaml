format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2013/376/schedule/5/paragraph/8
  summary: |-
    "Where an owner-occupier meets the payment condition, liability condition and occupation condition... and the qualifying period has ended, each of the relevant payments is to be taken into account..." No account is taken to the extent those conditions are not met, and a particular payment is not brought into account more than once.
imports:
  - uk:regulations/uksi/2013/376/schedule/5/paragraph/3#relevant_payment
rules:
  - name: relevant_payment_taken_into_account_for_calculation_under_this_part
    kind: derived
    entity: Payment
    dtype: Judgment
    period: Month
    source: SI 2013/376 Schedule 5 paragraph 8(1) and (3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: uk:regulations/uksi/2013/376/schedule/5/paragraph/3#relevant_payment
              output: relevant_payment
              hash: sha256:2b2137c3a23c4833d7780cd134a3b04fdfc6acd5d92ed40cd3bd19c8ac81b18c
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/schedule/5/paragraph/8
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/schedule/5/paragraph/8
              excerpt: "not to be brought into account more than once"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          relevant_payment
          and owner_occupier_meets_payment_condition_in_respect_of_that_relevant_payment
          and owner_occupier_meets_liability_condition_in_respect_of_that_relevant_payment
          and owner_occupier_meets_occupation_condition_in_respect_of_that_relevant_payment
          and qualifying_period_has_ended
          and not particular_payment_already_brought_into_account

  - name: relevant_payment_amount_taken_into_account_for_calculation_under_this_part
    kind: derived
    entity: Payment
    dtype: Money
    unit: GBP
    period: Month
    source: SI 2013/376 Schedule 5 paragraph 8(1) to (3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: uk:regulations/uksi/2013/376/schedule/5/paragraph/8#relevant_payment_taken_into_account_for_calculation_under_this_part
              output: relevant_payment_taken_into_account_for_calculation_under_this_part
              hash: sha256:local
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/schedule/5/paragraph/8
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/schedule/5/paragraph/8
              excerpt: "No account is to be taken of any amount of a relevant payment to the extent that the conditions referred to in sub-paragraph (1) are not met in respect of that amount."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if relevant_payment_taken_into_account_for_calculation_under_this_part: relevant_payment_amount_for_which_conditions_are_met else: 0
