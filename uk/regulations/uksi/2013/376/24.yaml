        source:
          corpus_citation_path: uk/regulation/uksi/2013/376/24
          excerpt: the lower rate, where the child or qualifying young person is entitled
            to disability living allowance... or personal independence payment (unless
            sub-paragraph (b) applies)
  versions:
  - effective_from: '0001-01-01'
    formula: "(\n  child_or_qualifying_young_person_entitled_to_disability_living_allowance\n\
      \  or child_or_qualifying_young_person_entitled_to_scottish_adult_disability_living_allowance\n\
      \  or child_or_qualifying_young_person_entitled_to_child_disability_payment\n\
      \  or child_or_qualifying_young_person_entitled_to_adult_disability_payment\n\
      \  or child_or_qualifying_young_person_entitled_to_personal_independence_payment\n\
      )\nand\nnot higher_rate_disabled_child_addition_applies"
