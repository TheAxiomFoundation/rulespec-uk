format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2013/376/26
  summary: |-
    Provides the housing costs element amount where regulation 25 conditions are met; Schedule 4 applies for rent payments and Schedule 5 for service charge payments, with shared ownership aggregating both schedule amounts and service charges calculated under Schedule 4.
rules:
  - name: schedule_4_has_effect_for_claimant
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Universal Credit Regulations 2013, regulation 26(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/26
              excerpt: "the claimant meets all of those conditions"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/26
              excerpt: "rent payments"
    versions:
      - effective_from: '2013-04-29'
        formula: |-
          claimant_meets_all_conditions_specified_in_regulation_25
          and claimant_is_liable_for_rent_payments

  - name: schedule_5_has_effect_for_claimant
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Universal Credit Regulations 2013, regulation 26(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/26
              excerpt: "the claimant meets all of those conditions"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/26
              excerpt: "service charge payments"
    versions:
      - effective_from: '2013-04-29'
        formula: |-
          claimant_meets_all_conditions_specified_in_regulation_25
          and claimant_is_liable_for_service_charge_payments

  - name: shared_ownership_tenancy
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Universal Credit Regulations 2013, regulation 26(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/26
              excerpt: "“Shared ownership tenancy” means—"
    versions:
      - effective_from: '2013-04-29'
        formula: |-
          claimant_has_shared_ownership_tenancy_in_england_or_wales
          or claimant_has_shared_ownership_tenancy_in_scotland

  - name: housing_cost_element_under_shared_ownership
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: GBP
    source: Universal Credit Regulations 2013, regulation 26(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/26
              excerpt: "the aggregate of those amounts"
    versions:
      - effective_from: '2013-04-29'
        formula: |-
          if schedule_4_has_effect_for_claimant and schedule_5_has_effect_for_claimant and shared_ownership_tenancy: max(0, amount_calculated_under_schedule_4 + amount_calculated_under_schedule_5) else: 0

  - name: service_charge_payments_amount_calculated_under_schedule_4_for_shared_ownership
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Universal Credit Regulations 2013, regulation 26(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/26
              excerpt: ". . . . . . .\nservice charge payments ...."
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/26
              excerpt: "calculated under Schedule 4"
    versions:
      - effective_from: '2013-04-29'
        formula: |-
          schedule_4_has_effect_for_claimant
          and schedule_5_has_effect_for_claimant
          and shared_ownership_tenancy
          and claimant_is_liable_for_service_charge_payments
