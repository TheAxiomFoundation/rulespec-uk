            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/36
              excerpt: "maximum amount for two or more children | £1,836.16"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if childcare_costs_element_child_count == 1: childcare_costs_element_one_child_maximum_amount else: if childcare_costs_element_child_count >= 2: childcare_costs_element_two_or_more_children_maximum_amount else: 0
