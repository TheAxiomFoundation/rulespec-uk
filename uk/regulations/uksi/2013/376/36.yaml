format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2013/376/36
  summary: |-
    The amounts of the standard allowance, child element, LCWRA element and carer element, and the maximum amounts of the childcare costs element, are given in a table for each assessment period. Where a claimant is a member of a couple but claims as a single person, the single claimant amounts apply.
rules:
  - name: standard_allowance_single_under_25_amount
    kind: parameter
    dtype: Money
    period: Month
    unit: GBP
    source: Universal Credit Regulations 2013, regulation 36 table, Standard allowance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/36
              excerpt: "single claimant aged under 25 | £338.58"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          338.58

