              excerpt: "pre-2026 claimant, severe conditions criteria claimant or claimant who is terminally ill | £429.80"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if claimant_has_limited_capability_for_work_and_work_related_activity: if claimant_is_pre_commencement_lcwra_claimant or claimant_is_severe_conditions_criteria_claimant or claimant_is_terminally_ill: lcwra_protected_claimant_amount else: lcwra_ordinary_claimant_amount else: 0

