  - name: standard_allowance_amount
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: GBP
    source: Universal Credit Regulations 2013, regulation 36 table and single-claimant sentence
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/36
              excerpt: "In the case of an award where the claimant is a member of a couple, but claims as a single person, the amounts are those shown in the table for a single claimant."
          - path: versions[0].formula
            kind: parameter_table
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/36
              table:
                header: "Standard allowance"
                row_key: "claimant age and joint-claim status"
                column_key: "Amount for each assessment period"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if award_is_for_joint_claimants: if either_joint_claimant_is_aged_25_or_over: standard_allowance_joint_either_25_or_over_amount else: standard_allowance_joint_both_under_25_amount else: if single_claimant_is_aged_25_or_over: standard_allowance_single_25_or_over_amount else: standard_allowance_single_under_25_amount

  - name: child_element_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: GBP
    source: Universal Credit Regulations 2013, regulation 36 table, Child element
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/36
              excerpt: "first child or qualifying young person | £351.88"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/36
              excerpt: "|  | second and each subsequenteach child or qualifying young person | £303.94 |"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if child_is_first_child_or_qualifying_young_person: first_child_element_amount else: if child_is_second_or_subsequent_child_or_qualifying_young_person: second_and_subsequent_child_element_amount else: 0

