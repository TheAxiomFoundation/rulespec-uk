# Expected values computed by the axiom-rules-engine from the corpus-grounded
# Statutory Paternity Pay structure (SSCBA 1992 Part 12ZA: s.171ZA lower-
# earnings-limit qualifying condition, s.171ZE 2-week paternity pay period and
# earnings-related weekly rate as prescribed). The earnings-related percentage
# (0.9), the lower earnings limit (£130), and the 2-week paid period are all set
# by regulation under s.171ZE and supplied as inputs.
#
# The weekly-amount arithmetic is 0.9 * normal weekly earnings, paid across 2
# weeks. These cases use round weekly-earnings figures so the expected amounts
# terminate: £200/week gives 0.9 * 200 * 2 = £360; £400/week gives £720; and
# £100/week is below the £130 lower earnings limit, so there is no entitlement.
# The end-to-end UKMOD UK_2026 bpact_s parity check — where the supplied weekly
# earnings equal UKMOD's yem/30.5*7 proxy and the pilot reconstructs the live
# oracle exactly (annual gross £25,000 -> £860.66, £8,000 -> £275.41) — lives in
# the axiom-oracles uk-statutory-pay suite. Coverage: every derived rule is
# asserted in at least one case; every supplied input is assigned in every case.
- name: spp_400_weekly_earnings_full_period
  period: {period_kind: tax_year, start: '2026-04-06', end: '2027-04-05'}
  input:
    uk:statutes/statutory_paternity_pay/pilot_statutory_paternity_pay_oracle_pipeline#input.uk_spp_pilot_supplied_normal_weekly_earnings: 400
    uk:statutes/statutory_paternity_pay/pilot_statutory_paternity_pay_oracle_pipeline#input.uk_spp_pilot_supplied_earnings_related_rate: 0.9
    uk:statutes/statutory_paternity_pay/pilot_statutory_paternity_pay_oracle_pipeline#input.uk_spp_pilot_supplied_lower_earnings_limit_weekly: 130
    uk:statutes/statutory_paternity_pay/pilot_statutory_paternity_pay_oracle_pipeline#input.uk_spp_pilot_supplied_paternity_pay_period_weeks: 2
  output:
    uk:statutes/statutory_paternity_pay/pilot_statutory_paternity_pay_oracle_pipeline#uk_spp_pilot_earnings_related_rate: 0.9
    uk:statutes/statutory_paternity_pay/pilot_statutory_paternity_pay_oracle_pipeline#uk_spp_pilot_lower_earnings_limit_weekly: 130
    uk:statutes/statutory_paternity_pay/pilot_statutory_paternity_pay_oracle_pipeline#uk_spp_pilot_paternity_pay_period_weeks: 2
    uk:statutes/statutory_paternity_pay/pilot_statutory_paternity_pay_oracle_pipeline#uk_spp_pilot_normal_weekly_earnings: 400
    uk:statutes/statutory_paternity_pay/pilot_statutory_paternity_pay_oracle_pipeline#uk_spp_pilot_is_entitled: 1
    uk:statutes/statutory_paternity_pay/pilot_statutory_paternity_pay_oracle_pipeline#uk_spp_pilot_weekly_amount: 360
    uk:statutes/statutory_paternity_pay/pilot_statutory_paternity_pay_oracle_pipeline#uk_spp_pilot_total_entitlement: 720
