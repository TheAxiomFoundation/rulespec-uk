format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - uk/statute/ukpga/1992/4/13
      - uk/guidance/govuk/national-insurance-rates/rates-and-allowances/block-11
      - uk/guidance/govuk/national-insurance-rates/rates-and-allowances/block-13
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - uk/statute/ukpga/1992/4/13
        - uk/guidance/govuk/national-insurance-rates/rates-and-allowances/block-11
        - uk/guidance/govuk/national-insurance-rates/rates-and-allowances/block-13
      rationale: |-
        The statute was checked first: SSCBA 1992 s.13(1) is the charging
        provision for the Class 3 weekly amount, and its current
        legislation.gov.uk expression grounds the 2025-04-06 version verbatim
        ("shall be £17.75"). That base text carries only the 2025-26 figure:
        the annual re-rating is made by administrative order and is not
        consolidated into the s.13 text, so no statute or regulation text in
        the corpus contains the 2026-27 amount. The GOV.UK "Rates and
        allowances: National Insurance contributions" page is the official
        HMRC parameter source for the re-rated weekly amount ("Class 3 rate
        £18.40" in the "£ per week 2026 to 2027" column, block-11), with the
        effective date grounded by block-13 ("new National Insurance rates
        and thresholds from 6 April 2026") and the amount cross-checked by
        the page's own 2026-27 Direct Debit schedule (4-week months £73.60 =
        4 x £18.40, 5-week months £92.00 = 5 x £18.40). This mirrors the
        student-loan-repayments and Scottish-rate-resolution pattern of
        grounding administratively set parameter values to official guidance
        while the charging provision stays grounded to statute.
  summary: |-
    Class 3 National Insurance contributions are voluntary flat-rate
    contributions. Section 13 of the Social Security Contributions and Benefits
    Act 1992 provides for earners and others over the age of 16 to be entitled,
    if they so wish and subject to prescribed conditions, to pay Class 3
    contributions; the amount of a Class 3 contribution is a flat weekly
    figure. The s.13(1) base text on legislation.gov.uk reads £17.75, the
    2025-26 rate; the annual administrative re-rating is not consolidated into
    the base text, and the GOV.UK "Rates and allowances: National Insurance
    contributions" guidance carries the 2026-27 weekly rate of £18.40 from
    6 April 2026. Payment is allowed only with a view to enabling the
    contributor to satisfy conditions of entitlement to benefit by acquiring
    the requisite earnings factor. Because Class 3 is elective, the payment is only made when
    the contributor chooses to pay: the contribution amount is the flat rate for
    each week for which the contributor elects to pay, and zero otherwise. The
    election, the over-16 condition, the satisfaction of the prescribed
    conditions, and the benefit-purpose condition are supplied as case inputs.
rules:
  - name: class_3_weekly_contribution_amount
    kind: parameter
    dtype: Money
    period: Week
    unit: GBP
    source: Social Security Contributions and Benefits Act 1992 s.13(1), as re-rated for 2026-27 per GOV.UK rates and allowances guidance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/statute/ukpga/1992/4/13
              excerpt: "shall be £17.75"
          - path: versions[1].formula
            kind: amount
            source:
              corpus_citation_path: uk/guidance/govuk/national-insurance-rates/rates-and-allowances/block-11
              excerpt: "Class 3 rate £18.40"
          - path: versions[1].effective_from
            kind: effective_period
            source:
              corpus_citation_path: uk/guidance/govuk/national-insurance-rates/rates-and-allowances/block-11
              excerpt: "£ per week 2026 to 2027"
          - path: versions[1].effective_from
            kind: effective_period
            source:
              corpus_citation_path: uk/guidance/govuk/national-insurance-rates/rates-and-allowances/block-13
              excerpt: "new National Insurance rates and thresholds from 6 April 2026"
    versions:
      - effective_from: '2025-04-06'
        formula: |-
          17.75
      - effective_from: '2026-04-06'
        formula: |-
          18.40

  - name: entitled_to_pay_class_3_contribution
    kind: derived
    entity: Person
    dtype: Judgment
    period: Week
    source: Social Security Contributions and Benefits Act 1992 s.13(1), (2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/statute/ukpga/1992/4/13
              excerpt: "if over the age of 16, to be entitled if they so wish"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/statute/ukpga/1992/4/13
              excerpt: "allowed only with a view to enabling the contributor to satisfy"
    versions:
      - effective_from: '2025-04-06'
        formula: |-
          contributor_is_over_16
          and contributor_satisfies_prescribed_conditions_to_pay_class_3
          and payment_is_with_a_view_to_satisfying_benefit_entitlement_conditions

  - name: class_3_contribution_if_elected
    kind: derived
    entity: Person
    dtype: Money
    period: Week
    unit: GBP
    source: Social Security Contributions and Benefits Act 1992 s.13(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/1992/4/13
              excerpt: "to be entitled if they so wish, but subject to any prescribed conditions, to pay Class 3 contributions"
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/1992/4/13#class_3_weekly_contribution_amount
              output: class_3_weekly_contribution_amount
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/1992/4/13#entitled_to_pay_class_3_contribution
              output: entitled_to_pay_class_3_contribution
              hash: sha256:local
    versions:
      - effective_from: '2025-04-06'
        formula: |-
          if entitled_to_pay_class_3_contribution and contributor_elects_to_pay_class_3_contribution: class_3_weekly_contribution_amount else: 0
