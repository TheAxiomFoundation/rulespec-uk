format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/statute/ukpga/1992/4/142
  summary: |-
    A person is a child if he has not attained the age of 16. A qualifying young person is a person, other than a child, who has not attained a Treasury-prescribed age greater than 16 and satisfies Treasury-prescribed conditions.
rules:
  - name: child_age_limit
    kind: parameter
    dtype: Integer
    source: Social Security Contributions and Benefits Act 1992, section 142(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: uk/statute/ukpga/1992/4/142
              excerpt: "has not attained the age of 16"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          16

  - name: child
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: Social Security Contributions and Benefits Act 1992, section 142(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: uk/statute/ukpga/1992/4/142
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/1992/4/142#child_age_limit
              output: child_age_limit
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_age < child_age_limit

  - name: qualifying_young_person
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: Social Security Contributions and Benefits Act 1992, section 142(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: uk/statute/ukpga/1992/4/142
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/1992/4/142#child
              output: child
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/1992/4/142#child_age_limit
              output: child_age_limit
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not child
          and prescribed_qualifying_young_person_age > child_age_limit
          and person_age < prescribed_qualifying_young_person_age
          and person_satisfies_prescribed_qualifying_young_person_conditions
