  source_verification:
    corpus_citation_path: uk/statute/ukpga/1992/4/141
  summary: |-
    A person responsible for one or more children or qualifying young persons in a week is entitled to Child Benefit for that week in respect of each child or qualifying young person for whom the person is responsible.
