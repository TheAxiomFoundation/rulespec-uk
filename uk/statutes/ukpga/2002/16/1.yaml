format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/statute/ukpga/2002/16/1
  summary: |-
    A claimant is entitled to state pension credit if he is in Great Britain, has attained the qualifying age, and satisfies the guarantee credit condition in section 2(1) or the savings credit conditions in section 3(1) and (2). "The qualifying age" means pensionable age for a woman, or for a man the age which is pensionable age for a woman born on the same day.
  deferred_outputs:
    - output: uk:statutes/ukpga/2002/16/1#state_pension_credit_entitlement
      reason: Entitlement depends on whether the claimant satisfies the condition in section 2(1) or the conditions in section 3(1) and (2), but those cited provisions are not available in copied RuleSpec context.
    - output: uk:statutes/ukpga/2002/16/1#guarantee_credit_entitlement
      reason: Entitlement to and calculation of guarantee credit depend on section 2, including section 2(1), but that cited provision is not available in copied RuleSpec context.
    - output: uk:statutes/ukpga/2002/16/1#savings_credit_entitlement
      reason: Entitlement to and calculation of savings credit depend on section 3, including section 3(1) and (2), but that cited provision is not available in copied RuleSpec context.
rules:
  - name: qualifying_age
    kind: derived
    entity: Person
    dtype: Count
    period: Day
    source: State Pension Credit Act 2002 s 1(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: uk/statute/ukpga/2002/16/1
              excerpt: "in the case of a woman, pensionable age; or\nin the case of a man, the age which is pensionable age in the case of a woman born on the same day as the man."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if claimant_is_woman: pensionable_age else: pensionable_age_for_woman_born_same_day
  - name: claimant_has_attained_qualifying_age
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: State Pension Credit Act 2002 s 1(2)(b), (6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/statute/ukpga/2002/16/1
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          claimant_age >= qualifying_age
