format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/statute/ukpga/1994/23/24
  summary: |-
    Output tax is VAT on supplies made by a taxable person. Input tax includes
    VAT on supplies of goods or services to the taxable person used for the
    purposes of the person's business.
imports:
  - uk:statutes/ukpga/1994/23/2#standard_rate_of_vat
rules:
  - name: output_tax_on_standard_rated_taxable_supplies
    kind: derived
    entity: Firm
    dtype: Money
    period: Year
    unit: GBP
    source: Value Added Tax Act 1994 s.24(2), read with s.2(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: uk/statute/ukpga/1994/23/24
              excerpt: "output tax ... means VAT on supplies which he makes"
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/1994/23/2#standard_rate_of_vat
              output: standard_rate_of_vat
              hash: sha256:4a9b7c8c3abbec9370dc2c16d3b68a9736bb6adb3790c92a926142f02c04c215
    versions:
      - effective_from: '2011-01-04'
        formula: |-
          if taxable_person: standard_rated_taxable_supplies_value * standard_rate_of_vat else: 0

  - name: input_tax_on_standard_rated_business_purchases
    kind: derived
    entity: Firm
    dtype: Money
    period: Year
    unit: GBP
    source: Value Added Tax Act 1994 s.24(1), read with s.2(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: uk/statute/ukpga/1994/23/24
              excerpt: "input tax ... means ... VAT on the supply to him of any goods or services"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/statute/ukpga/1994/23/24
              excerpt: "goods or services used or to be used for the purpose of any business"
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/1994/23/2#standard_rate_of_vat
              output: standard_rate_of_vat
              hash: sha256:4a9b7c8c3abbec9370dc2c16d3b68a9736bb6adb3790c92a926142f02c04c215
    versions:
      - effective_from: '2011-01-04'
        formula: |-
          if taxable_person: standard_rated_deductible_business_purchase_value * standard_rate_of_vat else: 0
