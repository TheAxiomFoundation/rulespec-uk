format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/statute/ukpga/2003/21/363
  summary: |-
    A television receiver must not be installed or used unless authorised by a licence under this Part. Installing or using a receiver in contravention is an offence; possession or control with intent, knowledge, or reasonable grounds to believe another intends contravening installation or use is also an offence. Dealer-business acts solely for installing on delivery, demonstration, testing, or repair do not contravene subsection (1). Offences are punishable on summary conviction by a fine not exceeding level 3 on the standard scale.
rules:
  - name: maximum_standard_scale_level_for_section_offence
    kind: parameter
    dtype: Integer
    source: Communications Act 2003 s.363(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: uk/statute/ukpga/2003/21/363
              excerpt: "fine not exceeding level 3 on the standard scale"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          3

  - name: dealer_business_noncontravention_applies
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: Communications Act 2003 s.363(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: uk/statute/ukpga/2003/21/363
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          thing_done_in_course_of_business_of_dealer_in_television_receivers
          and (thing_done_solely_for_installing_television_receiver_on_delivery or thing_done_solely_for_demonstrating_testing_or_repairing_television_receiver)

  - name: subsection_1_contravened_by_receiver_installation_or_use
    kind: derived
    entity: Asset
    dtype: Judgment
    period: Day
    source: Communications Act 2003 s.363(1), (5), (6), (7)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: uk/statute/ukpga/2003/21/363
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: uk/statute/ukpga/2003/21/363
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          television_receiver_is_installed_or_used
          and not installation_and_use_of_television_receiver_authorised_by_licence_under_this_part
          and not dealer_business_noncontravention_applies
          and not installation_or_use_of_television_receiver_exempt_from_licence_requirement_under_regulations

  - name: person_guilty_of_installation_or_use_offence
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: Communications Act 2003 s.363(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: uk/statute/ukpga/2003/21/363
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_installs_or_uses_television_receiver_in_contravention_of_subsection_1

  - name: person_guilty_of_possession_or_control_intent_offence
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: Communications Act 2003 s.363(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: uk/statute/ukpga/2003/21/363
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_has_television_receiver_in_possession_or_under_control
          and (person_intends_to_install_or_use_it_in_contravention_of_subsection_1 or person_knows_or_has_reasonable_grounds_for_believing_another_person_intends_to_install_or_use_it_in_contravention_of_subsection_1)

  - name: person_guilty_of_section_offence
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: Communications Act 2003 s.363(2), (3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2003/21/363
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          person_guilty_of_installation_or_use_offence
          or person_guilty_of_possession_or_control_intent_offence

  - name: section_offence_fine_level_on_summary_conviction
    kind: derived
    entity: Person
    dtype: Integer
    period: Day
    source: Communications Act 2003 s.363(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2003/21/363
              excerpt: "liable, on summary conviction, to a fine not exceeding level 3"
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/2003/21/363#maximum_standard_scale_level_for_section_offence
              output: maximum_standard_scale_level_for_section_offence
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if person_guilty_of_section_offence: maximum_standard_scale_level_for_section_offence else: 0
