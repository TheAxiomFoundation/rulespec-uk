format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/statute/ukpga/2003/1/681G
  summary: |-
    A person is a “partner” of another person at any time if condition A or condition B is met. Condition A covers persons married to, or civil partners of, each other who are neither separated under a court order nor separated in circumstances likely to be permanent. Condition B covers persons not married to, or civil partners of, each other but living together as if married or civil partners.
rules:
  - name: partner
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: ITTOIA 2005 s 681G
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: uk/statute/ukpga/2003/1/681G
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/statute/ukpga/2003/1/681G
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          (
            persons_are_married_to_or_civil_partners_of_each_other
            and not separated_under_a_court_order
            and not separated_in_circumstances_likely_to_be_permanent
          )
          or (
            not persons_are_married_to_or_civil_partners_of_each_other
            and living_together_as_if_married_couple_or_civil_partners
          )
