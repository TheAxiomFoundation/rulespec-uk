              target: uk:statutes/ukpga/2003/1/681G#partner_condition_a_for_chapter_met
              output: partner_condition_a_for_chapter_met
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/2003/1/681G#partner_condition_b_for_chapter_met
