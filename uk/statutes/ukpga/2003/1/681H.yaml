  summary: |-
    This section applies for the purposes of this Chapter. “Adjusted net income” means the person's adjusted net income as determined under section 58 of ITA 2007. “Week” means a 7-day period beginning with a Monday, and is in a tax year iff that Monday is in the tax year.
