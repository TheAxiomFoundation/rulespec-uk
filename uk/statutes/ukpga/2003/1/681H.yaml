    - output: uk:statutes/ukpga/2003/1/681H#week_in_tax_year
      reason: The week definition turns on the calendar day on which the week begins and whether that Monday is in the tax year; the available RuleSpec surface for this eval does not provide date-valued period-boundary operations or an appropriate non-person entity for a standalone statutory period definition.
