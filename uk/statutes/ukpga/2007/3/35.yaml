format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/statute/ukpga/2007/3/35
  summary: |-
    An individual who makes a claim is entitled to a personal allowance of £12,570 for a tax year if the individual meets the requirements of section 56; where adjusted net income exceeds £100,000, the allowance is reduced by one-half of the excess and any remaining allowance is rounded up to the nearest £1.
rules:
  - name: personal_allowance_base_amount
    kind: parameter
    dtype: Money
    unit: GBP
    source: Income Tax Act 2007 s.35(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/35
              excerpt: "personal allowance of £12,570"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          12570

  - name: adjusted_net_income_reduction_threshold
    kind: parameter
    dtype: Money
    unit: GBP
    source: Income Tax Act 2007 s.35(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/35
              excerpt: "adjusted net income exceeds £100,000"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          100000

  - name: excess_income_reduction_fraction
    kind: parameter
    dtype: Rate
    source: Income Tax Act 2007 s.35(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/35
              excerpt: "reduced by one-half of the excess"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1 / 2

  - name: allowance_rounding_multiple
    kind: parameter
    dtype: Money
    unit: GBP
    source: Income Tax Act 2007 s.35(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/35
              excerpt: "multiple of £1"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          1

  - name: individual_entitled_to_personal_allowance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: Income Tax Act 2007 s.35(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/35
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          individual_makes_claim
          and individual_meets_requirements_under_section_56

  - name: personal_allowance
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.35(1)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/35
              excerpt: "allowance under subsection (1) is reduced by one-half of the excess"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/35
              excerpt: "rounded up to the nearest amount which is a multiple of £1"
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/2007/3/35#personal_allowance_base_amount
              output: personal_allowance_base_amount
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/2007/3/35#adjusted_net_income_reduction_threshold
              output: adjusted_net_income_reduction_threshold
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/2007/3/35#excess_income_reduction_fraction
              output: excess_income_reduction_fraction
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/2007/3/35#allowance_rounding_multiple
              output: allowance_rounding_multiple
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/2007/3/35#individual_entitled_to_personal_allowance
              output: individual_entitled_to_personal_allowance
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if individual_entitled_to_personal_allowance: ceil(max(0, personal_allowance_base_amount - (excess_income_reduction_fraction * max(0, adjusted_net_income - adjusted_net_income_reduction_threshold))) / allowance_rounding_multiple) * allowance_rounding_multiple else: 0
