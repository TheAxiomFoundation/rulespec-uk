              target: uk:statutes/ukpga/2007/3/13A#dividend_upper_rate_amount_charged_at_dividend_nil_rate
              output: dividend_upper_rate_amount_charged_at_dividend_nil_rate
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/2007/3/13A#dividend_additional_rate_amount_charged_at_dividend_nil_rate
              output: dividend_additional_rate_amount_charged_at_dividend_nil_rate
              hash: sha256:local
    versions:
      - effective_from: '2024-04-06'
        formula: |-
          dividend_ordinary_rate_amount_charged_at_dividend_nil_rate + dividend_upper_rate_amount_charged_at_dividend_nil_rate + dividend_additional_rate_amount_charged_at_dividend_nil_rate
