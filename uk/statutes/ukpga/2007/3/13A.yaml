format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/statute/ukpga/2007/3/13A
  summary: |-
    Section 13A: income tax is charged at the dividend nil rate (rather than the dividend ordinary, upper or additional rate) on the first £500 of an individual's dividend income that would otherwise be charged at those rates. The allowance is applied in priority order: first to amounts that would be charged at the dividend ordinary rate (D), then to amounts at the dividend upper rate (U), then to amounts at the dividend additional rate (A).

imports:
  - uk:statutes/ukpga/2007/3/13#dividend_income_charged_at_dividend_ordinary_rate
  - uk:statutes/ukpga/2007/3/13#dividend_income_charged_at_dividend_upper_rate
  - uk:statutes/ukpga/2007/3/13#dividend_income_charged_at_dividend_additional_rate

rules:
  - name: dividend_nil_rate_allowance
    kind: parameter
    dtype: Money
    unit: GBP
    source: Income Tax Act 2007 s.13A Steps 1-3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/13A
              excerpt: "the first £500"
    versions:
      - effective_from: '2024-04-06'
        formula: |-
          500

  - name: dividend_ordinary_rate_amount_charged_at_dividend_nil_rate
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.13A Step 1 (Rules 1A, 1B, 1C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/13A
              excerpt: "If D is more than £500, the first £500 of D is charged at the dividend nil rate"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/13A
              excerpt: "If D is equal to £500, D is charged at the dividend nil rate"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/13A
              excerpt: "If D is less than £500 but more than nil, D is charged at the dividend nil rate"
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/2007/3/13#dividend_income_charged_at_dividend_ordinary_rate
              output: dividend_income_charged_at_dividend_ordinary_rate
              hash: sha256:103b4694da54842205d993789d69ba83efa904a3ef166e27057aed0b20926881
    versions:
      - effective_from: '2024-04-06'
        formula: |-
          min(dividend_income_charged_at_dividend_ordinary_rate, dividend_nil_rate_allowance)

  - name: dividend_upper_rate_amount_charged_at_dividend_nil_rate
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.13A Step 2 (Rules 2A, 2B, 2C)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/13A
              excerpt: "the first £M of U is charged at the dividend nil rate (rather than the dividend upper rate), where £M is the difference between £500 and D"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/13A
              excerpt: "If the total of D and U is equal to £500, U is charged at the dividend nil rate"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/13A
              excerpt: "If the total of D and U is less than £500 but more than nil, U is charged at the dividend nil rate"
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/2007/3/13#dividend_income_charged_at_dividend_ordinary_rate
              output: dividend_income_charged_at_dividend_ordinary_rate
              hash: sha256:103b4694da54842205d993789d69ba83efa904a3ef166e27057aed0b20926881
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/2007/3/13#dividend_income_charged_at_dividend_upper_rate
              output: dividend_income_charged_at_dividend_upper_rate
              hash: sha256:103b4694da54842205d993789d69ba83efa904a3ef166e27057aed0b20926881
    versions:
      - effective_from: '2024-04-06'
        formula: |-
          min(dividend_income_charged_at_dividend_upper_rate, max(0, dividend_nil_rate_allowance - dividend_income_charged_at_dividend_ordinary_rate))

  - name: dividend_additional_rate_amount_charged_at_dividend_nil_rate
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.13A Step 3 (Rules 3A, 3B)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/13A
              excerpt: "the first £M of U is charged at the dividend nil rate (rather than the dividend upper rate), where £M is the difference between £500 and D, and"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/13A
              excerpt: "If the total of D, U and A is less than or equal to £500, A is charged at the dividend nil rate"
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/2007/3/13#dividend_income_charged_at_dividend_ordinary_rate
              output: dividend_income_charged_at_dividend_ordinary_rate
              hash: sha256:103b4694da54842205d993789d69ba83efa904a3ef166e27057aed0b20926881
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/2007/3/13#dividend_income_charged_at_dividend_upper_rate
              output: dividend_income_charged_at_dividend_upper_rate
              hash: sha256:103b4694da54842205d993789d69ba83efa904a3ef166e27057aed0b20926881
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/2007/3/13#dividend_income_charged_at_dividend_additional_rate
              output: dividend_income_charged_at_dividend_additional_rate
              hash: sha256:103b4694da54842205d993789d69ba83efa904a3ef166e27057aed0b20926881
    versions:
      - effective_from: '2024-04-06'
        formula: |-
          min(dividend_income_charged_at_dividend_additional_rate, max(0, dividend_nil_rate_allowance - dividend_income_charged_at_dividend_ordinary_rate - dividend_income_charged_at_dividend_upper_rate))

  - name: income_charged_at_dividend_nil_rate
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.13A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/13A
              excerpt: "Income tax is charged at the dividend nil rate (rather than the dividend ordinary rate, dividend upper rate or dividend additional rate) on one or more amounts of the individual's income"
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/2007/3/13A#dividend_ordinary_rate_amount_charged_at_dividend_nil_rate
              output: dividend_ordinary_rate_amount_charged_at_dividend_nil_rate
              hash: sha256:local
          - path: versions[0].formula
