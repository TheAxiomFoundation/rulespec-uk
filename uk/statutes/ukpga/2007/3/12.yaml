format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/statute/ukpga/2007/3/12
  summary: |-
    Section 12 charges income tax at the starting rate for savings on so much
    of an individual's income up to the starting rate limit for savings as
    (a) is savings income, and (b) would otherwise be charged at the basic
    rate or the default basic rate. The starting rate limit for savings is
    £5,000. This is subject to any provisions of the Income Tax Acts (apart
    from section 10). Section 16 has effect for determining the extent to
    which a person's income up to the starting rate limit for savings
    consists of savings income.

rules:
  - name: starting_rate_limit_for_savings
    kind: parameter
    dtype: Money
    unit: GBP
    period: Year
    source: ITA 2007 s.12(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/12
              excerpt: "The starting rate limit for savings is £5,000"
    versions:
      - effective_from: '2024-04-06'
        formula: |-
          5000

  - name: savings_income_charged_at_starting_rate_for_savings
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: ITA 2007 s.12(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/12
              excerpt: "on so much of an individual's income up to the starting rate limit for savings as— \n\ta) is savings income, and \n\tb) would otherwise be charged at the basic rate or the default basic rate ."
    versions:
      - effective_from: '2024-04-06'
        formula: |-
          max(0, min(savings_income_otherwise_charged_at_basic_or_default_basic_rate, starting_rate_limit_for_savings - income_already_charged_before_section_12_savings_income))

  - name: tax_on_savings_income_charged_at_starting_rate_for_savings
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: ITA 2007 s.12(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/12
              excerpt: "Income tax is charged at the starting rate for savings"
    versions:
      - effective_from: '2024-04-06'
        formula: |-
          savings_income_charged_at_starting_rate_for_savings * starting_rate_for_savings
