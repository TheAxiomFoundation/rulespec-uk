format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/statute/ukpga/2007/3/10
  summary: |-
    Income tax on an individual's income up to the basic rate limit is charged at the basic rate.
    Income tax is charged at the higher rate on income above the basic rate limit and up to the
    higher rate limit. Income tax is charged at the additional rate on income above the higher
    rate limit. The basic rate limit is £37,700. The higher rate limit for a tax year equals
    twice the amount specified in subsection (1) of section 35 (personal allowance) plus the
    amount specified in subsection (2) of that section (amount at which personal allowance
    starts to be withdrawn).
imports:
  - uk:statutes/ukpga/2007/3/35#personal_allowance_base_amount
  - uk:statutes/ukpga/2007/3/35#adjusted_net_income_reduction_threshold
rules:
  - name: basic_rate_limit
    kind: parameter
    dtype: Money
    unit: GBP
    source: Income Tax Act 2007 s.10(5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/10
              excerpt: "The basic rate limit is £37,700"
    versions:
      - effective_from: '2024-04-06'
        formula: |-
          37700

  - name: higher_rate_limit
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.10(5A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/10
              excerpt: "a) twice the amount specified in subsection (1) of section 35 (personal allowance) for the tax year, plus \n\tb) the amount specified in subsection (2) of that section (amount at which personal allowance starts to be withdrawn)."
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/2007/3/35#personal_allowance_base_amount
              output: personal_allowance_base_amount
              hash: sha256:40fa47b7b5bdef3c8bac84cbdb483cd114c81aa40560bfd5bfc3e3d19b4eeaf7
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/2007/3/35#adjusted_net_income_reduction_threshold
              output: adjusted_net_income_reduction_threshold
              hash: sha256:40fa47b7b5bdef3c8bac84cbdb483cd114c81aa40560bfd5bfc3e3d19b4eeaf7
    versions:
      - effective_from: '2024-04-06'
        formula: |-
          2 * personal_allowance_base_amount + adjusted_net_income_reduction_threshold

  - name: income_charged_at_basic_rate
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.10(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/10
              excerpt: "Income tax on an individual's income up to the basic rate limit is charged at the basic rate"
    versions:
      - effective_from: '2024-04-06'
        formula: |-
          min(income_charged_under_section_10, basic_rate_limit)

  - name: income_charged_at_higher_rate
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.10(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/10
              excerpt: "Income tax is charged at the higher rate on an individual's income above the basic rate limit and up to the higher rate limit"
    versions:
      - effective_from: '2024-04-06'
        formula: |-
          max(0, min(income_charged_under_section_10, higher_rate_limit) - basic_rate_limit)

  - name: income_charged_at_additional_rate
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.10(3A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/10
              excerpt: "Income tax is charged at the additional rate on an individual's income above the higher rate limit"
    versions:
      - effective_from: '2024-04-06'
        formula: |-
          max(0, income_charged_under_section_10 - higher_rate_limit)

  - name: tax_on_income_charged_at_basic_rate
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.10(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/10
              excerpt: "charged at the basic rate"
    versions:
      - effective_from: '2024-04-06'
        formula: |-
          income_charged_at_basic_rate * basic_rate

  - name: tax_on_income_charged_at_higher_rate
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.10(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/10
              excerpt: "charged at the higher rate"
    versions:
      - effective_from: '2024-04-06'
        formula: |-
          income_charged_at_higher_rate * higher_rate

  - name: tax_on_income_charged_at_additional_rate
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.10(3A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/10
              excerpt: "charged at the additional rate"
    versions:
      - effective_from: '2024-04-06'
        formula: |-
          income_charged_at_additional_rate * additional_rate

  - name: income_tax_on_section_10_income
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.10(2), (3), (3A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/10
              excerpt: "Income tax on an individual's income up to the basic rate limit is charged at the basic rate"
    versions:
      - effective_from: '2024-04-06'
        formula: |-
          tax_on_income_charged_at_basic_rate + tax_on_income_charged_at_higher_rate + tax_on_income_charged_at_additional_rate
