format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/statute/ukpga/2026/11/9
  summary: |-
    For the tax years 2026-27, 2027-28, 2028-29, 2029-30 and 2030-31, the amount specified in section 12(3) of ITA 2007 (the starting rate limit for savings) is "£5,000". Accordingly, section 21 of that Act (indexation) does not apply in relation to the starting rate limit for savings for any of those tax years.
rules:
  - name: starting_rate_limit_for_savings
    kind: parameter
    dtype: Money
    unit: GBP
    source: section 9, Finance Act 2026
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/statute/ukpga/2026/11/9
              excerpt: "For the tax years 2026-27, 2027-28, 2028-29, 2029-30 and 2030-31, the amount specified in section 12(3) of ITA 2007 (the starting rate limit for savings) is “£5,000”."
    versions:
      - effective_from: '2026-04-06'
        formula: |-
          5000
