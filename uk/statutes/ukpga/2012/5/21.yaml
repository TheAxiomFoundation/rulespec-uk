format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/statute/ukpga/2012/5/21
  summary: |-
    "A claimant falls within this section if the claimant does not fall within section 19 or 20" and has limited capability for work, is the responsible carer for a child aged 2, or is of a prescribed description. The Secretary of State may impose work preparation and work-focused interview requirements, and may not impose any other work-related requirement.
rules:
  - name: claimant_falls_into_work_focused_interview_and_work_preparation_requirements_only_group
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Welfare Reform Act 2012, section 21(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: uk/statute/ukpga/2012/5/21
              excerpt: "does not fall within section 19 or 20 and ... has limited capability for work ... responsible carer for a child who is aged 2 ... prescribed description"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not claimant_falls_within_section_19
          and not claimant_falls_within_section_20
          and (
            claimant_has_limited_capability_for_work
            or claimant_is_responsible_carer_for_child_aged_2
            or claimant_is_of_prescribed_description_for_work_focused_interview_and_preparation_group
          )
  - name: work_preparation_requirement_may_be_imposed_on_work_focused_interview_and_preparation_group_claimant
