format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/statute/ukpga/2012/5/2
  summary: |-
    A claim may be made for universal credit by a single person or members of a couple jointly. Regulations may specify circumstances in which a member of a couple may make a claim as a single person.
rules:
  - name: universal_credit_claim_may_be_made
    kind: derived
