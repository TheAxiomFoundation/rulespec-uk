format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/statute/ukpga/2012/5/7
  summary: |-
    Universal credit is payable in respect of each complete assessment period within a period of entitlement; an assessment period has prescribed duration, and a period of entitlement is a period during which entitlement to universal credit subsists.
rules:
  - name: universal_credit_payable_for_complete_assessment_period
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Welfare Reform Act 2012 s. 7(1), (5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/statute/ukpga/2012/5/7
              excerpt: each complete assessment period within a period of entitlement
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: uk/statute/ukpga/2012/5/7
              excerpt: period during which entitlement to universal credit subsists
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          assessment_period_is_complete
          and entitlement_to_universal_credit_subsists_throughout_assessment_period
