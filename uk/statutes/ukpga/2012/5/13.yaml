format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/statute/ukpga/2012/5/13
  summary: |-
    "This Chapter provides for the Secretary of State to impose work-related requirements with which claimants must comply"; the requirements which may be imposed depend on whether the claimant falls into the no-requirements, interview-only, interview-and-preparation-only, or all-requirements group.
rules:
  - name: work_focused_interview_requirement_may_be_imposed
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Welfare Reform Act 2012, section 13
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/statute/ukpga/2012/5/13
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          claimant_falls_into_work_focused_interview_requirement_only_group
          or claimant_falls_into_work_focused_interview_and_work_preparation_requirements_only_group
          or claimant_falls_into_all_work_related_requirements_group
  - name: work_preparation_requirement_may_be_imposed
