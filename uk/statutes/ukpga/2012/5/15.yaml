format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/statute/ukpga/2012/5/15
  summary: |-
    A “work-focused interview requirement” is a requirement that a claimant participate in one or more work-focused interviews as specified by the Secretary of State; a work-focused interview is an interview for prescribed purposes relating to work or work preparation.
rules:
  - name: work_focused_interview_requirement
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Welfare Reform Act 2012 s. 15(1)-(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: uk/statute/ukpga/2012/5/15
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          secretary_of_state_specifies_claimant_must_participate_in_one_or_more_interviews
          and specified_interviews_are_for_prescribed_purposes_relating_to_work_or_work_preparation
