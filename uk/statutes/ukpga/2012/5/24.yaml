format: rulespec/v1
imports:
- uk:statutes/ukpga/2012/5/13#work_focused_interview_requirement_may_be_imposed
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/statute/ukpga/2012/5/24
  summary: Where the Secretary of State may impose a work-focused interview requirement,
    the Secretary of State must have regard to prescribed matters. Regulations must
    secure that, in prescribed circumstances, where a claimant has recently been a
    victim of domestic violence, requirements cease for 13 weeks and no other requirement
    may be imposed during that period.
