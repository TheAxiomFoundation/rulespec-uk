format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/statute/ukpga/2012/5/12
  summary: |-
    The calculation of an award of universal credit is to include amounts in respect of such particular needs or circumstances of a claimant as may be prescribed. The prescribed needs or circumstances may include limited capability for work and work-related activity, and regular and substantial caring responsibilities for a severely disabled person.
rules:
  - name: claimant_has_section_12_prescribed_particular_need_or_circumstance
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Welfare Reform Act 2012 s. 12(1)-(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/statute/ukpga/2012/5/12
              excerpt: such particular needs or circumstances of a claimant as may be prescribed
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/statute/ukpga/2012/5/12
              excerpt: the fact that a claimant has limited capability for work and work-related activity
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/statute/ukpga/2012/5/12
              excerpt: regular and substantial caring responsibilities for a severely disabled person
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          claimant_has_limited_capability_for_work_and_work_related_activity_prescribed_under_section_12
          or claimant_has_regular_and_substantial_caring_responsibilities_for_severely_disabled_person_prescribed_under_section_12
          or claimant_has_other_particular_need_or_circumstance_prescribed_under_section_12
  - name: section_12_amount_for_prescribed_particular_needs_or_circumstances
    kind: derived
    entity: Person
    dtype: Money
    period: Month
    unit: GBP
    source: Welfare Reform Act 2012 s. 12(1), (3)-(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2012/5/12
              excerpt: calculation of an award of universal credit is to include amounts
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2012/5/12
              excerpt: Regulations are to specify, or provide for the determination or calculation of, any amount
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/statute/ukpga/2012/5/12
              excerpt: to end at a prescribed time
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/statute/ukpga/2012/5/12
              excerpt: not to start until a prescribed time
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/2012/5/12#claimant_has_section_12_prescribed_particular_need_or_circumstance
              output: claimant_has_section_12_prescribed_particular_need_or_circumstance
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if claimant_has_section_12_prescribed_particular_need_or_circumstance
          and not section_12_inclusion_has_ended_at_prescribed_time_by_regulations
          and not section_12_inclusion_has_not_started_until_prescribed_time_by_regulations:
            max(0, amount_specified_determined_or_calculated_by_regulations_under_section_12)
          else: 0
