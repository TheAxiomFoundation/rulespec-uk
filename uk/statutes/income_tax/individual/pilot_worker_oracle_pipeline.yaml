format: rulespec/v1
imports:
  - uk:statutes/ukpga/2007/3/35#personal_allowance_base_amount
  - uk:statutes/ukpga/2007/3/35#adjusted_net_income_reduction_threshold
  - uk:statutes/ukpga/2007/3/10#basic_rate_limit
  - uk:statutes/ukpga/2007/3/10#higher_rate_limit
  - uk:statutes/ukpga/2026/11/2#basic_rate
  - uk:statutes/ukpga/2026/11/2#higher_rate
  - uk:statutes/ukpga/2026/11/2#additional_rate
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/statute/ukpga/2007/3/10
  summary: |-
    Composed single-employee income-tax pipeline for the UKMOD oracle slice
    at the 2026-27 tax year. It exposes a dense-engine-friendly Person-level
    path from annual gross employment income into the Income Tax Act 2007
    section 23 liability so an end-to-end tin_s comparison does not require the
    caller to supply the s10/s23 stage boundaries. It wires: total income
    (Step 1) from a single employment source, net income (Step 2) after
    supplied section 24 reliefs, the section 35 personal allowance with its
    100,000 adjusted-net-income taper, the section 10 basic/higher/additional
    rate bands on the income remaining after allowances, and the section 23
    Step 7 liability. It deliberately excludes savings and dividend income
    (charged under sections 11D/13 at different rates), Scottish and Welsh
    rates, the starting rate for savings, blind person's allowance, marriage
    allowance, gift-aid and pension-relief basic-rate-band extensions, section
    26 reductions, and section 30 additional-tax amounts, all of which are
    zero for the single ordinary employee this slice models. 2025-26 and
    2026-27 share frozen personal allowance (12,570), basic-rate limit
    (37,700) and main rates, so UKMOD UK_2025 and UK_2026 return identical
    values for these cases.
rules:
  - name: uk_pit_pilot_total_income
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.23 Step 1, single ordinary-employment source
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/23
              excerpt: "the amounts of income on which the taxpayer is charged to income tax for the tax year."
    versions:
      - effective_from: '2026-04-06'
        formula: |-
          max(0, uk_pit_pilot_annual_employment_income)

  - name: uk_pit_pilot_net_income
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.23 Step 2, net income after supplied section 24 reliefs
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/23
              excerpt: "Deduct from the components the amount of any relief"
    versions:
      - effective_from: '2026-04-06'
        formula: |-
          max(0, uk_pit_pilot_total_income - uk_pit_pilot_supplied_section_24_reliefs)

  - name: uk_pit_pilot_adjusted_net_income
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: |-
      Income Tax Act 2007 s.58 adjusted net income; for the single ordinary
      employee with no gift-aid or pension-relief deductions this equals net
      income, and it drives the section 35 personal-allowance taper.
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/35
              excerpt: "adjusted net income exceeds £100,000"
    versions:
      - effective_from: '2026-04-06'
        formula: |-
          max(0, uk_pit_pilot_net_income)

  - name: uk_pit_pilot_personal_allowance
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.35(1)-(3), personal allowance with adjusted-net-income taper
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/35
              excerpt: "allowance under subsection (1) is reduced by one-half of the excess"
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/2007/3/35#personal_allowance_base_amount
              output: personal_allowance_base_amount
              hash: sha256:40fa47b7b5bdef3c8bac84cbdb483cd114c81aa40560bfd5bfc3e3d19b4eeaf7
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/2007/3/35#adjusted_net_income_reduction_threshold
              output: adjusted_net_income_reduction_threshold
              hash: sha256:40fa47b7b5bdef3c8bac84cbdb483cd114c81aa40560bfd5bfc3e3d19b4eeaf7
    versions:
      - effective_from: '2026-04-06'
        formula: |-
          ceil(max(0, personal_allowance_base_amount - (max(0, uk_pit_pilot_adjusted_net_income - adjusted_net_income_reduction_threshold) / 2)))

  - name: uk_pit_pilot_income_remaining_after_allowances
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.23 Step 3, income remaining after the personal allowance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/23
              excerpt: "allowances to which the taxpayer is entitled for the tax year under Chapter 2 of Part 3"
    versions:
      - effective_from: '2026-04-06'
        formula: |-
          max(0, uk_pit_pilot_net_income - uk_pit_pilot_personal_allowance)

  - name: uk_pit_pilot_income_charged_at_basic_rate
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.10(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/10
              excerpt: "Income tax on an individual's income up to the basic rate limit is charged at the basic rate"
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/2007/3/10#basic_rate_limit
              output: basic_rate_limit
              hash: sha256:0e672605b24bd2f85c3fdcfd0a1686670be0b6afd6f72e8e9bc02a79f7d93832
    versions:
      - effective_from: '2026-04-06'
        formula: |-
          min(uk_pit_pilot_income_remaining_after_allowances, basic_rate_limit)

  - name: uk_pit_pilot_income_charged_at_higher_rate
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.10(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/10
              excerpt: "Income tax is charged at the higher rate on an individual's income above the basic rate limit and up to the higher rate limit"
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/2007/3/10#basic_rate_limit
              output: basic_rate_limit
              hash: sha256:0e672605b24bd2f85c3fdcfd0a1686670be0b6afd6f72e8e9bc02a79f7d93832
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/2007/3/10#higher_rate_limit
              output: higher_rate_limit
              hash: sha256:0e672605b24bd2f85c3fdcfd0a1686670be0b6afd6f72e8e9bc02a79f7d93832
    versions:
      - effective_from: '2026-04-06'
        formula: |-
          max(0, min(uk_pit_pilot_income_remaining_after_allowances, higher_rate_limit) - basic_rate_limit)

  - name: uk_pit_pilot_income_charged_at_additional_rate
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.10(3A)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/10
              excerpt: "Income tax is charged at the additional rate on an individual's income above the higher rate limit"
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/2007/3/10#higher_rate_limit
              output: higher_rate_limit
              hash: sha256:0e672605b24bd2f85c3fdcfd0a1686670be0b6afd6f72e8e9bc02a79f7d93832
    versions:
      - effective_from: '2026-04-06'
        formula: |-
          max(0, uk_pit_pilot_income_remaining_after_allowances - higher_rate_limit)

  - name: uk_pit_pilot_tax_calculated_at_applicable_rates
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.10(2), (3), (3A) with the Finance Act 2026-27 main rates; section 23 Step 4 amount at applicable rates
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/23
              excerpt: "Calculate tax at each applicable rate on the amounts of the"
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/2026/11/2#basic_rate
              output: basic_rate
              hash: sha256:e065afdb71e21b7d65a1e55335601b3a5c67a7974cdbeed85261a401e9f2142f
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/2026/11/2#higher_rate
              output: higher_rate
              hash: sha256:e065afdb71e21b7d65a1e55335601b3a5c67a7974cdbeed85261a401e9f2142f
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/2026/11/2#additional_rate
              output: additional_rate
              hash: sha256:e065afdb71e21b7d65a1e55335601b3a5c67a7974cdbeed85261a401e9f2142f
    versions:
      - effective_from: '2026-04-06'
        formula: |-
          uk_pit_pilot_income_charged_at_basic_rate * basic_rate + uk_pit_pilot_income_charged_at_higher_rate * higher_rate + uk_pit_pilot_income_charged_at_additional_rate * additional_rate

  - name: uk_pit_pilot_income_tax_liability
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.23 Steps 4 to 7, single-employee liability with no section 26 reductions or section 30 additions
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/23
              excerpt: "the taxpayer's liability to income tax"
    versions:
      - effective_from: '2026-04-06'
        formula: |-
          max(0, uk_pit_pilot_tax_calculated_at_applicable_rates)
