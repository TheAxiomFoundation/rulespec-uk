        formula: |-
          min(uk_svdv_savings_after_starting_rate, uk_svdv_savings_allowance)

  - name: uk_svdv_savings_taxed_at_band_rates
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.11D; savings income taxed at the savings basic/higher/additional rates
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
