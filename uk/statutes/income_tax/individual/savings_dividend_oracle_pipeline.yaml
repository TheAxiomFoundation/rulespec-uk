          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/11D
              excerpt: "Income tax is charged at the savings higher rate on an individual’s income which—"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          max(0, min(uk_svdv_band_position_before_savings + uk_svdv_savings_after_starting_rate, uk_svdv_higher_rate_limit) - max(uk_svdv_band_position_before_savings, uk_svdv_basic_rate_limit))

  - name: uk_svdv_savings_gross_additional_band
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.11D(3); savings within the additional-rate band before the savings nil rate
    metadata:
      proof:
