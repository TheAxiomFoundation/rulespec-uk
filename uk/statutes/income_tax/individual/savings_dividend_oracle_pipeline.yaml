    versions:
      - effective_from: '2026-01-01'
        formula: |-
          uk_svdv_savings_charged_at_savings_basic_rate * uk_svdv_savings_basic_rate + uk_svdv_savings_charged_at_savings_higher_rate * uk_svdv_savings_higher_rate + uk_svdv_savings_charged_at_savings_additional_rate * uk_svdv_savings_additional_rate

  # ---------------------------------------------------------------------------
  # Dividend income tax (stacked at the very top). The dividend allowance is a
  # nil-rate band that occupies band space (s.13A).
  # ---------------------------------------------------------------------------
  - name: uk_svdv_dividend_at_nil_rate
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.13A; dividend income within the dividend allowance (0%)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/13A
