              excerpt: "Income tax is charged at the savings higher rate on an individual’s income which—"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/11D
              excerpt: "have effect after sections 12 and 12A have been applied"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          max(0, uk_svdv_savings_gross_higher_band - max(0, uk_svdv_savings_at_nil_rate - uk_svdv_savings_gross_additional_band))

  - name: uk_svdv_savings_charged_at_savings_basic_rate
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.11D(1); savings basic-rate amount after the savings nil rate
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/11D
              excerpt: "Income tax is charged at the savings basic rate on an individual’s income which—"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/11D
              excerpt: "have effect after sections 12 and 12A have been applied"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          max(0, uk_svdv_savings_gross_basic_band - max(0, uk_svdv_savings_at_nil_rate - uk_svdv_savings_gross_additional_band - uk_svdv_savings_gross_higher_band))

  - name: uk_svdv_tax_on_savings_income
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.11D with the Finance Act 2026-27 savings rates
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
