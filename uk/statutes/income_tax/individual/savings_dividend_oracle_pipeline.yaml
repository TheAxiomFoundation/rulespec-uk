  - name: uk_svdv_dividend_gross_additional_band
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.13(2A); dividends within the additional-rate band before the dividend allowance
    metadata:
      proof:
        atoms:
