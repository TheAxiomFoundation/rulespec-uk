        formula: |-
          max(0, uk_svdv_savings_after_starting_rate - uk_svdv_savings_at_nil_rate)

  # Band position at which savings income starts = the non-savings taxable
  # income plus the 0% starting-rate savings slice, which occupies band space
  # below it. The savings nil rate (personal savings allowance) does NOT advance
  # the band position: it is a 0% band charged on the savings that would
  # otherwise sit at the highest rate, so the taxable savings occupies the same
  # band space it would without the allowance and the allowance is credited
  # against the top savings slices (see s.12A(3)-(4) read with the section 16
  # highest-part ordering and HMRC's beneficial allocation of the nil-rate band).
  - name: uk_svdv_band_position_before_savings
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.16; savings taxed above the 0% starting-rate slice
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/16
              excerpt: "the savings income is treated as the highest part of the person's total income"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          uk_svdv_non_savings_income_after_allowance + uk_svdv_savings_at_starting_rate

  # Gross band split of all savings above the starting-rate band (before the
  # savings nil rate is credited), occupying bands from the position above.
  - name: uk_svdv_savings_gross_basic_band
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.11D(1); savings within the basic-rate band before the savings nil rate
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/11D
              excerpt: "Income tax is charged at the savings basic rate on an individual’s income which—"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          max(0, min(uk_svdv_band_position_before_savings + uk_svdv_savings_after_starting_rate, uk_svdv_basic_rate_limit) - uk_svdv_band_position_before_savings)

  - name: uk_svdv_savings_gross_higher_band
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.11D(2); savings within the higher-rate band before the savings nil rate
    metadata:
