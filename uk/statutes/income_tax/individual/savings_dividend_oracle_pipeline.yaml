        formula: |-
          min(uk_svdv_dividend_income_after_allowance, uk_svdv_dividend_allowance)

  # Band position at which dividend income starts = all non-dividend taxable
  # income (non-savings plus all savings, including the 0% savings slices, which
  # occupy band space). The dividend allowance, like the savings nil rate, does
  # NOT advance the band position: it is a 0% band charged on the dividends that
  # would otherwise sit at the highest rate, so the taxable dividends occupy the
  # same band space and the allowance is credited against the top slices.
  - name: uk_svdv_band_position_before_dividends
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.16; dividends taxed above all non-dividend income
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/16
              excerpt: "the dividend income is treated as the highest part of the person's total income"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          uk_svdv_band_position_before_savings + uk_svdv_savings_after_starting_rate

  - name: uk_svdv_dividend_gross_ordinary_band
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.13(1); dividends within the basic-rate band before the dividend allowance
    metadata:
