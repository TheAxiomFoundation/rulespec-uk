        formula: |-
          max(0, (uk_svdv_band_position_before_savings + uk_svdv_savings_after_starting_rate) - max(uk_svdv_band_position_before_savings, uk_svdv_higher_rate_limit))

  # The savings nil rate (personal savings allowance) is credited against the
  # highest-rate savings slices first: additional, then higher, then basic.
  - name: uk_svdv_savings_charged_at_savings_additional_rate
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.11D(3); savings additional-rate amount after the savings nil rate
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/11D
              excerpt: "Income tax is charged at the savings additional rate on an individual’s income which—"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/11D
              excerpt: "have effect after sections 12 and 12A have been applied"
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          max(0, uk_svdv_savings_gross_additional_band - uk_svdv_savings_at_nil_rate)

  - name: uk_svdv_savings_charged_at_savings_higher_rate
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.11D(2); savings higher-rate amount after the savings nil rate
    metadata:
