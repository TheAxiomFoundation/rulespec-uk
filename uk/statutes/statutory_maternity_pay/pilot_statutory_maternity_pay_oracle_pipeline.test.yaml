# Expected values computed by the axiom-rules-engine from the corpus-grounded
# Statutory Maternity Pay structure (SSCBA 1992 Part XII: s.164 lower-earnings-
# limit qualifying condition, s.165 maternity pay period, s.166 earnings-related
# rate of 90% of normal weekly earnings). The delegated cash amounts — the
# prescribed weekly standard rate (UKMOD $SMPwsr £196.16), the lower earnings
# limit (£130), and the 39-week paid period — are supplied as inputs, since they
# are set by regulation and are not numeric values in the primary Act; the 90%
# earnings-related rate is grounded in the s.166 text.
#
# The weekly-amount arithmetic is 0.9 * normal weekly earnings, paid across 39
# weeks. These cases use round weekly-earnings figures so the expected amounts
# terminate: £200/week gives 0.9 * 200 * 39 = £7,020; £400/week gives £14,040;
# £500/week gives £17,550; £100/week is below the £130 lower earnings limit, so
# there is no entitlement. The end-to-end UKMOD UK_2026 bmact_s parity check —
# where the supplied weekly earnings equal UKMOD's yem/30.5*7 monthly-to-weekly
# proxy and the pilot reconstructs the live oracle exactly (annual gross £25,000
# -> £16,782.79, £8,000 -> £5,370.49) — lives in the axiom-oracles
# uk-statutory-pay suite. Coverage: every derived rule is asserted in at least
# one case; every supplied input is assigned in every case.
