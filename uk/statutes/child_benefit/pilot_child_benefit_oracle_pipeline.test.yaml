# Expected values computed by the axiom-rules-engine from the corpus-grounded
# 2026-27 Child Benefit weekly rates (SI 2006/965 reg.2: enhanced £27.05 for the
# only or eldest child, other £17.90 for each subsequent child) annualised over
# 52 benefit weeks. Cross-checked against UKMOD UK_2026 pre-charge Child Benefit
# (bch_s + bchrd_s) in the axiom-oracles uk-child-benefit suite: UKMOD returns
# £1,410.46 (one child), £2,343.82 (two), £3,277.18 (three), which annualise the
# same weekly rates over UKMOD's 52.14-week convention; the ~0.27% convention
# residual is dispositioned as an explained residual in that suite. Coverage:
# every derived rule is asserted in at least one case.
#
# The High Income Child Benefit Charge cases (ITEPA 2003 ss.681B-681C) cross the
# taper at a supplied adjusted net income of £20,000 (below the £60,000
# threshold, no charge), £70,000 (mid-taper, 50 appropriate-percentage points,
# 0.5 charged fraction), £80,000 (the full-clawback point, 100 points, fraction
# 1), and £90,000 (past it, 150 uncapped points but the fraction still caps at
# 1), matching the axiom-oracles uk-child-benefit income sweep. The charge amount
# is floor(charged_fraction * gross) and net Child Benefit is gross - charge,
# both grounded in s.681C(2)-(3).
