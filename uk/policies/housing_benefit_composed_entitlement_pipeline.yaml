  # ==========================================================================
  # Regulation 22 applicable amount -- personal allowance by family type
  # ==========================================================================
  # Applicable amount (regulation 22 / Schedule 3 paragraph 1): the weekly
  # personal allowance for the claimant, selected by family type (single, lone
  # parent, couple) and age band, using the pension-age personal allowances
  # where any member has attained state pension age, plus any premiums. A lone
  # parent takes the single-person personal allowance amounts (Schedule 3
  # paragraph 1(1) and (2) share the single-claimant figures). Inputs:
  # hb_pilot_is_couple, hb_pilot_any_member_pension_age, hb_pilot_eldest_adult_age.
  - name: hb_pilot_weekly_personal_allowance
    kind: derived
    entity: Family
    dtype: Money
    period: Week
    unit: GBP
    source: Housing Benefit Regulations 2006, regulation 22 and Schedule 3 paragraph 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2006/213/22
              excerpt: "an amount in respect of himself or, if he is a member of a couple, an amount in respect of both of them, determined in accordance with paragraph 1(1), (2) or (3)"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/regulation/uksi/2006/214/22
              excerpt: "an amount in respect of his personal allowance, determined in accordance with paragraph 1 of Schedule 3"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          if hb_pilot_any_member_pension_age:
            if hb_pilot_is_couple: hb_pilot_personal_allowance_couple_pension_age_amount else: hb_pilot_personal_allowance_single_pension_age_amount
          else:
            if hb_pilot_is_couple:
              if hb_pilot_eldest_adult_age >= hb_pilot_personal_allowance_younger_age_threshold: hb_pilot_personal_allowance_couple_one_18_or_over_amount else: hb_pilot_personal_allowance_couple_both_under_18_amount
            else:
              if hb_pilot_eldest_adult_age >= hb_pilot_personal_allowance_older_age_threshold: hb_pilot_personal_allowance_single_25_or_over_amount else: hb_pilot_personal_allowance_single_under_25_amount

  # Annual applicable amount: the weekly personal allowance annualised over the
  # 52 benefit weeks plus the supplied premium amount (Parts 3 and 4 of
  # Schedule 3, which PolicyEngine adds as benefits_premiums). This is the
  # PolicyEngine housing_benefit_applicable_amount. Input: hb_pilot_premium_amount.
  - name: hb_pilot_applicable_amount
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    unit: GBP
    source: Housing Benefit Regulations 2006, regulation 22 and Schedule 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2006/213/22
              excerpt: "a claimant's weekly applicable amount shall be the aggregate of such of the following amounts as may apply in his case"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2006/213/22
              excerpt: "the amount of any premiums which may be applicable to him, determined in accordance with Parts 3 and 4 of Schedule 3 (premiums)"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          hb_pilot_weekly_personal_allowance * hb_pilot_benefit_weeks_per_year + max(0, hb_pilot_premium_amount)

  # ==========================================================================
  # Regulation 74 / regulation 55 non-dependant deductions
  # ==========================================================================
  # Weekly non-dependant deduction for a single non-dependant by gross weekly
  # income band (regulation 74(1) and (2)): the base amount below the first
  # threshold, rising through the regulation 74(2) bands to the top amount at
  # or above the highest threshold. Input: hb_pilot_non_dependant_gross_weekly_income.
  - name: hb_pilot_non_dependant_deduction_per_non_dependant
    kind: derived
    entity: Family
    dtype: Money
    period: Week
    unit: GBP
    source: Housing Benefit Regulations 2006, regulation 74(1) and (2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2006/213/74
              excerpt: "the deduction to be made under this regulation shall be"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          if hb_pilot_non_dependant_gross_weekly_income >= hb_pilot_non_dependant_deduction_threshold_top: hb_pilot_non_dependant_deduction_top_amount
          else: if hb_pilot_non_dependant_gross_weekly_income >= hb_pilot_non_dependant_deduction_threshold_5: hb_pilot_non_dependant_deduction_band_5_amount
          else: if hb_pilot_non_dependant_gross_weekly_income >= hb_pilot_non_dependant_deduction_threshold_4: hb_pilot_non_dependant_deduction_band_4_amount
          else: if hb_pilot_non_dependant_gross_weekly_income >= hb_pilot_non_dependant_deduction_threshold_3: hb_pilot_non_dependant_deduction_band_3_amount
          else: if hb_pilot_non_dependant_gross_weekly_income >= hb_pilot_non_dependant_deduction_threshold_2: hb_pilot_non_dependant_deduction_band_2_amount
          else: hb_pilot_non_dependant_deduction_base_amount

  # Annual non-dependant deductions: the per-non-dependant weekly deduction for
  # each non-dependant, annualised. This models the common case where each
  # non-dependant is in the same gross-income band; the caller supplies the
  # band-representative gross weekly income and the number of non-dependants.
  # This is the PolicyEngine housing_benefit_non_dep_deductions. Inputs:
  # hb_pilot_number_of_non_dependants, hb_pilot_non_dependant_gross_weekly_income.
  - name: hb_pilot_non_dependant_deductions
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    unit: GBP
    source: Housing Benefit Regulations 2006, regulation 70 and regulation 74
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2006/213/70
              excerpt: "less any deductions in respect of non-dependants which fall to be made under regulation 74 (non-dependant deductions)"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          max(0, hb_pilot_number_of_non_dependants) * hb_pilot_non_dependant_deduction_per_non_dependant * hb_pilot_benefit_weeks_per_year

  # ==========================================================================
  # Regulation 70 / regulation 50 maximum benefit and regulation 71 taper
  # ==========================================================================
  # Income taper (regulation 71 / regulation 51): the amount deducted from the
  # maximum housing benefit is 65 per cent of the excess of the applicable
  # income over the applicable amount. Inputs: hb_pilot_applicable_income.
  - name: hb_pilot_income_reduction
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    unit: GBP
    source: Housing Benefit Regulations 2006, regulation 71
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2006/213/71
              excerpt: "percentage of excess of income over applicable amount which is deducted from maximum housing benefit) shall be 65 per cent"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          hb_pilot_taper_rate * max(0, max(0, hb_pilot_applicable_income) - hb_pilot_applicable_amount)

  # Eligible rent less the tapered income (regulation 70 / regulation 50: 100
  # per cent of eligible rent, less the taper), floored at zero and capped at
  # the supplied maximum rent (LHA) where the LHA path applies (regulation 13D:
  # the local housing allowance the rent officer determines for the broad
  # rental market area). Inputs: hb_pilot_eligible_rent,
  # hb_pilot_lha_path_applies, hb_pilot_maximum_rent.
  - name: hb_pilot_rent_after_taper
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    unit: GBP
    source: Housing Benefit Regulations 2006, regulation 70 and regulation 71
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2006/213/70
              excerpt: "shall be 100 per cent. of his eligible rent"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          if hb_pilot_lha_path_applies:
            min(max(0, hb_pilot_maximum_benefit_rent_percentage * max(0, hb_pilot_eligible_rent) - hb_pilot_income_reduction), max(0, hb_pilot_maximum_rent))
          else:
            max(0, hb_pilot_maximum_benefit_rent_percentage * max(0, hb_pilot_eligible_rent) - hb_pilot_income_reduction)

  # ==========================================================================
  # Housing Benefit entitlement (pre-take-up, pre-benefit-cap)
  # ==========================================================================
  # The appropriate maximum housing benefit after the taper, less the
