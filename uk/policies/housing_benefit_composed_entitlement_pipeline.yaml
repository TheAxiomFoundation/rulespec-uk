format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - uk/regulation/uksi/2006/213/22
      - uk/regulation/uksi/2006/213/70
      - uk/regulation/uksi/2006/213/71
      - uk/regulation/uksi/2006/213/74
      - uk/regulation/uksi/2006/213/schedule/3
      - uk/regulation/uksi/2006/214/22
      - uk/regulation/uksi/2006/214/50
      - uk/regulation/uksi/2006/214/51
      - uk/regulation/uksi/2006/214/55
      - uk/regulation/uksi/2006/214/schedule/3
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - uk/regulation/uksi/2006/213/71
        - uk/regulation/uksi/2006/213/74
        - uk/regulation/uksi/2006/213/schedule/3
        - uk/regulation/uksi/2006/214/schedule/3
      rationale: |-
        Every numeric parameter is grounded in an official source captured at
        the 2026-04-06 in-force expression. The working-age personal
        allowances (single aged under 25 GBP 75.65 / aged 25 or over GBP 95.55,
        couple both aged under 18 GBP 114.35 / at least one aged 18 or over GBP
        150.15) are in the Housing Benefit Regulations 2006 Schedule 3
        paragraph 1, and the pension-age personal allowances (single who has
        attained pensionable age before 1 April 2021 GBP 256.00, couple GBP
        383.35) are in the SI 2006/214 Schedule 3 paragraph 1; the 65 per cent
        taper is in regulation 71 (working-age) / regulation 51 (pension-age);
        the appropriate maximum housing benefit is 100 per cent of eligible
        rent less non-dependant deductions under regulation 70 / regulation 50;
        and the non-dependant deduction amounts (GBP 20.40 base rising to GBP
        131.45 by gross-income band, thresholds GBP 192 / 279 / 365 / 485 /
        605) are in regulation 74 / regulation 55, all as uprated by the Social
        Security Benefits Up-rating Order 2026 (SI 2026/148). The pipeline
        models the Family-level maximum entitlement so an end-to-end
        PolicyEngine housing_benefit_entitlement comparison is queryable from
        raw household facts without the caller supplying the regulation 70/71
        maximum-benefit and taper mechanics or the Schedule 3 personal-
        allowance branch.
  summary: |-
    Composed Family-level Housing Benefit entitlement pipeline for the 2026-27
    Housing Benefit Regulations 2006 parameters. It exposes a
    dense-engine-friendly path from raw household facts (couple/lone-parent/
    single status, eldest adult age, whether any member has attained state
    pension age, number of income-banded non-dependants, eligible rent,
    applicable income, whether a maximum rent (LHA) cap applies) into the
    regulation 70 (working-age) / regulation 50 (pension-age) appropriate
    maximum housing benefit after the regulation 71 / regulation 51 65 per cent
    taper, so an end-to-end PolicyEngine housing_benefit_entitlement comparison
    does not require the caller to supply the maximum-benefit and taper
    mechanics.

    It wires the regulation 22 applicable amount from the Schedule 3 paragraph
    1 personal allowance (selected by family type and age band, with the
    pension-age personal allowances where any member has attained state pension
    age) plus a supplied premium amount (Parts 3 and 4 of Schedule 3, which
    PolicyEngine adds as benefits_premiums); the regulation 74 / regulation 55
    non-dependant deductions as an income-banded amount per non-dependant; and
    then the regulation 70 / regulation 50 maximum benefit: 100 per cent of the
    eligible rent, reduced by 65 per cent of the excess of applicable income
    over the applicable amount (regulation 71 / regulation 51), capped at the
    supplied maximum rent (LHA) where the LHA path applies, and floored at
    zero, less the non-dependant deductions.

    Deliberately excluded (all outside the composed household grid this slice
    models, or set locally, or separately encoded): the maximum rent (LHA)
    rate itself, which is the local housing allowance the rent officer
    determines under regulation 13D by virtue of the Rent Officers Order for
    the broad rental market area (a locally-set input, like council-tax
    liability in Council Tax Reduction, supplied as hb_pilot_maximum_rent);
    the applicable income build (regulation 40 and Schedules 4 and 5, which
    PolicyEngine aggregates from many benefit and income variables and whose
    earnings disregards differ between the statute and PolicyEngine), supplied
    as hb_pilot_applicable_income; the family premium and the disability,
    enhanced-disability, severe-disability and carer premiums of Parts 3 and 4
    of Schedule 3, supplied as hb_pilot_premium_amount; the capital tariff
    income (regulation 52 / regulation 29, separately encoded and folded into
    the supplied applicable income); the capital upper-limit eligibility gate
    (regulation 43); and the child and young-person amounts of Schedule 3
    paragraph 2, which are nil for 2026-27 in PolicyEngine because Child Tax
    Credit and its Housing Benefit successor amounts are not awarded to
    working-age Housing Benefit families under Universal Credit migration.
