  # This is the PolicyEngine housing_benefit_entitlement, before the
  # would-claim take-up gate and the benefit-cap reduction.
  - name: hb_pilot_entitlement
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    unit: GBP
    source: Housing Benefit Regulations 2006, regulation 70 and regulation 71
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2006/213/70
              excerpt: "less any deductions in respect of non-dependants which fall to be made under regulation 74"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          max(0, hb_pilot_rent_after_taper - hb_pilot_non_dependant_deductions)
