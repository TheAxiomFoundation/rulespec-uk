# Case 2: couple (one aged 25+), 2 children, 900 rent (no non-dependants),
# claimant has LCWRA, 2000 monthly earnings, no capital, no unearned income.
#   standard_allowance = 666.97 (reg 36, joint either 25+)
#   child_element      = 351.88 + 303.94 = 655.82
#   lcwra_element      = 217.26
#   housing            = 900.00
#   maximum_amount     = 666.97 + 655.82 + 217.26 + 900.00 = 2440.05
#   work allowance applies (children + LCWRA); award has housing -> lower WA 427.00
#   earned above WA    = 2000 - 427 = 1573.00
#   earned deduction   = 0.55 * 1573.00 = 865.15
#   total_deduction    = 865.15
#   award before cap   = 2440.05 - 865.15 = 1574.90
#   benefit cap (couple, outside London) = 22020 / 12 = 1835.00; award < cap -> no reduction
#   award              = 1574.90
- name: couple_two_children_lcwra_earnings_lower_work_allowance
  period: 2026-04
  input:
    uk:policies/universal_credit_composed_award_pipeline#input.uc_pilot_is_couple: true
    uk:policies/universal_credit_composed_award_pipeline#input.uc_pilot_either_aged_25_or_over: true
    uk:policies/universal_credit_composed_award_pipeline#input.uc_pilot_number_of_responsible_children: 2
    uk:policies/universal_credit_composed_award_pipeline#input.uc_pilot_number_of_disabled_children_lower_rate: 0
