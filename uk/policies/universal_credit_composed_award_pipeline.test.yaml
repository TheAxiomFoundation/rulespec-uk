    uk:policies/universal_credit_composed_award_pipeline#input.uc_pilot_number_of_children_in_childcare: 0
    uk:policies/universal_credit_composed_award_pipeline#input.uc_pilot_childcare_charges_monthly: 0
    uk:policies/universal_credit_composed_award_pipeline#input.uc_pilot_rent_monthly: 900
    uk:policies/universal_credit_composed_award_pipeline#input.uc_pilot_number_of_non_dependants: 0
    uk:policies/universal_credit_composed_award_pipeline#input.uc_pilot_capital: 0
    uk:policies/universal_credit_composed_award_pipeline#input.uc_pilot_earned_income_monthly: 2000
    uk:policies/universal_credit_composed_award_pipeline#input.uc_pilot_unearned_income_monthly: 0
    uk:policies/universal_credit_composed_award_pipeline#input.uc_pilot_resident_in_greater_london: false
    uk:policies/universal_credit_composed_award_pipeline#input.uc_pilot_exempt_from_benefit_cap: true
  output:
    uk:policies/universal_credit_composed_award_pipeline#uc_pilot_standard_allowance: 666.97
    uk:policies/universal_credit_composed_award_pipeline#uc_pilot_child_element_total: 655.82
    uk:policies/universal_credit_composed_award_pipeline#uc_pilot_lcwra_element: 217.26
    uk:policies/universal_credit_composed_award_pipeline#uc_pilot_housing_costs_element: 900.00
    uk:policies/universal_credit_composed_award_pipeline#uc_pilot_maximum_amount: 2440.05
    uk:policies/universal_credit_composed_award_pipeline#uc_pilot_work_allowance_applies: holds
    uk:policies/universal_credit_composed_award_pipeline#uc_pilot_applicable_work_allowance: 427.00
    uk:policies/universal_credit_composed_award_pipeline#uc_pilot_earned_income_above_work_allowance: 1573.00
    uk:policies/universal_credit_composed_award_pipeline#uc_pilot_earned_income_deduction: 865.15
    uk:policies/universal_credit_composed_award_pipeline#uc_pilot_total_deduction: 865.15
    uk:policies/universal_credit_composed_award_pipeline#uc_pilot_award_before_cap: 1574.90
