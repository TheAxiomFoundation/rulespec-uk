    uk:policies/housing_benefit_composed_entitlement_pipeline#hb_pilot_income_reduction: 9770.41
    uk:policies/housing_benefit_composed_entitlement_pipeline#hb_pilot_rent_after_taper: 0
    uk:policies/housing_benefit_composed_entitlement_pipeline#hb_pilot_entitlement: 0

# Case 7: non-dependant deduction at the top band bites. Couple one 18+, 1
