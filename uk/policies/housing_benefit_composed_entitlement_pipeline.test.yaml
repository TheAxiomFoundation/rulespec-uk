    uk:policies/housing_benefit_composed_entitlement_pipeline#input.hb_pilot_premium_amount: 0
    uk:policies/housing_benefit_composed_entitlement_pipeline#input.hb_pilot_number_of_non_dependants: 0
    uk:policies/housing_benefit_composed_entitlement_pipeline#input.hb_pilot_non_dependant_gross_weekly_income: 0
    uk:policies/housing_benefit_composed_entitlement_pipeline#input.hb_pilot_applicable_income: 5000
    uk:policies/housing_benefit_composed_entitlement_pipeline#input.hb_pilot_eligible_rent: 7000
    uk:policies/housing_benefit_composed_entitlement_pipeline#input.hb_pilot_lha_path_applies: false
    uk:policies/housing_benefit_composed_entitlement_pipeline#input.hb_pilot_maximum_rent: 0
  output:
    uk:policies/housing_benefit_composed_entitlement_pipeline#hb_pilot_weekly_personal_allowance: 256.00
    uk:policies/housing_benefit_composed_entitlement_pipeline#hb_pilot_applicable_amount: 13312.00
    uk:policies/housing_benefit_composed_entitlement_pipeline#hb_pilot_income_reduction: 0
    uk:policies/housing_benefit_composed_entitlement_pipeline#hb_pilot_rent_after_taper: 7000.00
    uk:policies/housing_benefit_composed_entitlement_pipeline#hb_pilot_entitlement: 7000.00

# Case 6: high applicable income wipes out the award. Single 40, rent 5200,
