    uk:policies/housing_benefit_composed_entitlement_pipeline#hb_pilot_non_dependant_deduction_per_non_dependant: 131.45
    uk:policies/housing_benefit_composed_entitlement_pipeline#hb_pilot_non_dependant_deductions: 6835.40
    uk:policies/housing_benefit_composed_entitlement_pipeline#hb_pilot_income_reduction: 0
    uk:policies/housing_benefit_composed_entitlement_pipeline#hb_pilot_rent_after_taper: 12000.00
