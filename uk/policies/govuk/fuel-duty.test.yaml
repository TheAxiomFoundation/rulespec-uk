- name: rural_relief_area_reduces_rate
  period:
    period_kind: tax_year
    start: '2026-04-06'
    end: '2027-04-05'
  input:
    uk:policies/govuk/fuel-duty#input.petrol_litres: 1000
    uk:policies/govuk/fuel-duty#input.diesel_litres: 0
    uk:policies/govuk/fuel-duty#input.temporary_fuel_duty_reduction_per_litre: 0.045
    uk:policies/govuk/fuel-duty#input.in_rural_fuel_duty_relief_area: true
    uk:policies/govuk/fuel-duty#input.rural_fuel_duty_relief_per_litre: 0.05
  output:
    uk:policies/govuk/fuel-duty#fuel_duty_rural_relief_amount: 0.05
    # 0.5795 - 0.045 - 0.05 = 0.4845; 0.4845 * 1000 = 484.5
    uk:policies/govuk/fuel-duty#fuel_duty_annual_amount: 484.5

