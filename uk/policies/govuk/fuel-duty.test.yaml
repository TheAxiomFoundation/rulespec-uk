# Fixture-split (encode#1060): rules encode HODA 1979 s.6; these expected amounts
# are orchestrator-computed shown arithmetic. effective_rate = standing 0.5795
# - temporary_reduction - rural_relief(if area); annual = effective_rate * litres.
- name: petrol_only_effective_rate_after_temporary_cut
  period:
    period_kind: tax_year
    start: '2026-04-06'
    end: '2027-04-05'
  input:
    uk:policies/govuk/fuel-duty#input.petrol_litres: 1000
    uk:policies/govuk/fuel-duty#input.diesel_litres: 0
    uk:policies/govuk/fuel-duty#input.temporary_fuel_duty_reduction_per_litre: 0.045
    uk:policies/govuk/fuel-duty#input.in_rural_fuel_duty_relief_area: false
    uk:policies/govuk/fuel-duty#input.rural_fuel_duty_relief_per_litre: 0.05
  output:
    uk:policies/govuk/fuel-duty#fuel_duty_rural_relief_amount: 0
    uk:policies/govuk/fuel-duty#fuel_duty_total_litres: 1000
    # 0.5795 - 0.045 - 0 = 0.5345; 0.5345 * 1000 = 534.5
    uk:policies/govuk/fuel-duty#fuel_duty_annual_amount: 534.5

