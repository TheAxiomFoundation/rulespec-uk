    corpus_citation_path: uk/regulation/ssi/2020/352/10
  summary: |-
    The value of child winter heating assistance is £265.50 (SSI 2020/352
    regulation 10(1)), paid as money in a single payment. This is the substantive
    payable value; the regulation 10(1A) / regulation 4(7) commencement-value
    transitional exception is out of scope (its value is not stated in the
    regulation).
