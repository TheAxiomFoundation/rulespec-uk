format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/wsi/2018/128/schedule/2026
  summary: |-
    Land Transaction Tax on residential property purchases in Wales. Section 24
    of the Land Transaction Tax and Anti-avoidance of Devolved Taxes (Wales)
    Act 2017 (anaw 2017/1) requires the Welsh Ministers to set the tax bands
    and percentage tax rates by regulations. The Land Transaction Tax (Tax
    Bands and Tax Rates) (Wales) Regulations 2018 (WSI 2018/128), as amended,
    set the residential rate schedule as progressive marginal bands: 0% up to
    £225,000, 6% on the slice from £225,000 to £400,000, 7.5% from £400,000 to
    £750,000, 10% from £750,000 to £1,500,000, and 12% above £1,500,000. Tax on
    a purchase is the sum of each band rate applied to the part of the price
    that falls within that band. A purchase of an additional dwelling (a higher
    rates residential property transaction) is charged under a separate higher
    rates schedule with no zero-rate band: 5% up to £180,000, 8.5% from
    £180,000 to £250,000, 10% from £250,000 to £400,000, 12.5% from £400,000 to
    £750,000, 15% from £750,000 to £1,500,000, and 17% above £1,500,000.
    First-time-buyer relief does not exist in Wales and is out of scope. The
    total liability is the main-home charge plus the higher-rates charge.
