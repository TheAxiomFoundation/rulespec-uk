  - name: ltt_main_residence_charge
    kind: derived
    entity: Household
    dtype: Money
    period: Year
    unit: GBP
    source: WSI 2018/128, residential schedule applied as progressive marginal bands to the main-home purchase price
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/wsi/2018/128/schedule/2026
              excerpt: "Relevant consideration | Percentage"
    versions:
      - effective_from: '2022-10-10'
        formula: |-
          ltt_residential_six_percent_rate * max(0, min(main_residential_property_purchased, ltt_residential_six_percent_upper_limit) - ltt_residential_nil_rate_upper_limit) + ltt_residential_seven_point_five_percent_rate * max(0, min(main_residential_property_purchased, ltt_residential_seven_point_five_percent_upper_limit) - ltt_residential_six_percent_upper_limit) + ltt_residential_ten_percent_rate * max(0, min(main_residential_property_purchased, ltt_residential_ten_percent_upper_limit) - ltt_residential_seven_point_five_percent_upper_limit) + ltt_residential_twelve_percent_rate * max(0, main_residential_property_purchased - ltt_residential_ten_percent_upper_limit)

  - name: ltt_higher_rates_charge
    kind: derived
    entity: Household
    dtype: Money
    period: Year
    unit: GBP
    source: WSI 2018/128 higher rates residential schedule applied as progressive marginal bands to the additional-dwelling purchase price (anaw 2017/1 s.24 higher rates residential property transactions)
    metadata:
