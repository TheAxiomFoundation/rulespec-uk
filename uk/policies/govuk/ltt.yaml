              excerpt: "Relevant consideration | Percentage"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/anaw/2017/1/24
              excerpt: "higher rates residential property transactions"
    versions:
      - effective_from: '2024-12-11'
        formula: |-
          ltt_higher_five_percent_rate * min(additional_residential_property_purchased, ltt_higher_five_percent_upper_limit) + ltt_higher_eight_point_five_percent_rate * max(0, min(additional_residential_property_purchased, ltt_higher_eight_point_five_percent_upper_limit) - ltt_higher_five_percent_upper_limit) + ltt_higher_ten_percent_rate * max(0, min(additional_residential_property_purchased, ltt_higher_ten_percent_upper_limit) - ltt_higher_eight_point_five_percent_upper_limit) + ltt_higher_twelve_point_five_percent_rate * max(0, min(additional_residential_property_purchased, ltt_higher_twelve_point_five_percent_upper_limit) - ltt_higher_ten_percent_upper_limit) + ltt_higher_fifteen_percent_rate * max(0, min(additional_residential_property_purchased, ltt_higher_fifteen_percent_upper_limit) - ltt_higher_twelve_point_five_percent_upper_limit) + ltt_higher_seventeen_percent_rate * max(0, additional_residential_property_purchased - ltt_higher_fifteen_percent_upper_limit)

