# Companion unit tests for the business-rates incidence wrapper.
# business_rates = shareholding * business_rates_total_revenue (both supplied
# inputs). business_rates_total_revenue here is the PolicyEngine-UK held-forward
# revenue sum at 2026 (England 27,222,000,000 + Scotland 2,123,000,000 + Wales
# 1,053,499,000 + Northern Ireland 1,334,000,000 = 31,732,499,000); expected
# outputs are recomputed as the exact product. Shareholding values are kept in
# fixed-point notation because the companion-test harness serialises floats with
# str(), which would render smaller magnitudes (1e-05) in scientific notation
# that the rules engine rejects. The oracle suite exercises the finer grid
# (down to 1e-6) through the runner, which emits fixed-point decimals.
- name: zero_shareholding_yields_no_incidence
  period:
    period_kind: tax_year
    start: '2026-04-06'
    end: '2027-04-05'
  input:
    uk:policies/govuk/business-rates#input.shareholding: 0.0
    uk:policies/govuk/business-rates#input.business_rates_total_revenue: 31732499000
  output:
    uk:policies/govuk/business-rates#business_rates: 0

- name: small_shareholding_scales_incidence
  period:
    period_kind: tax_year
    start: '2026-04-06'
    end: '2027-04-05'
  input:
    uk:policies/govuk/business-rates#input.shareholding: 0.0001
    uk:policies/govuk/business-rates#input.business_rates_total_revenue: 31732499000
  output:
    uk:policies/govuk/business-rates#business_rates: 3173249.9

- name: mid_shareholding_scales_incidence
  period:
    period_kind: tax_year
    start: '2026-04-06'
    end: '2027-04-05'
  input:
    uk:policies/govuk/business-rates#input.shareholding: 0.0005
    uk:policies/govuk/business-rates#input.business_rates_total_revenue: 31732499000
  output:
    uk:policies/govuk/business-rates#business_rates: 15866249.5

- name: incidence_is_linear_in_shareholding
  period:
    period_kind: tax_year
    start: '2026-04-06'
    end: '2027-04-05'
  input:
    uk:policies/govuk/business-rates#input.shareholding: 0.001
    uk:policies/govuk/business-rates#input.business_rates_total_revenue: 31732499000
  output:
    uk:policies/govuk/business-rates#business_rates: 31732499
