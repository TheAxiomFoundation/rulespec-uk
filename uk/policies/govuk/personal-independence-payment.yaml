format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - uk/statute/ukpga/2012/5/77
      - uk/statute/ukpga/2012/5/78
      - uk/statute/ukpga/2012/5/79
      - uk/regulation/uksi/2013/377/24
      - uk/regulation/uksi/2013/376/schedule/4/paragraph/7
  summary: |-
    Personal Independence Payment compare wrapper. Selects the Personal
    Independence Payment Regulations 2013 regulation 24 weekly rates for the
    daily living and mobility components given the awarded rate band (standard or
    enhanced), mirroring the Welfare Reform Act 2012 sections 78 and 79 rate
    selection, and sums them into the section 77 weekly and annual totals. This
    parallels the child Disability Living Allowance wrapper: the award band is a
    frozen input a PolicyEngine-UK oracle projects from its daily-living and
    mobility category inputs, so the comparison is rate application given
    category, not eligibility. It adds no new eligibility rule.
imports:
  - uk:regulations/uksi/2013/377/24#pip_daily_living_standard_weekly_rate
  - uk:regulations/uksi/2013/377/24#pip_daily_living_enhanced_weekly_rate
  - uk:regulations/uksi/2013/377/24#pip_mobility_standard_weekly_rate
  - uk:regulations/uksi/2013/377/24#pip_mobility_enhanced_weekly_rate
rules:
  - name: personal_independence_payment_weeks_in_year
    kind: parameter
    dtype: Count
    source: Universal Credit Regulations 2013, Schedule 4 paragraph 7 (weekly amounts converted over 52 weeks)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/schedule/4/paragraph/7
              excerpt: "calculated as a monthly amount"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          52

  - name: pip_daily_living_weekly_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Week
    unit: GBP
    source: Welfare Reform Act 2012 s.78(1) to (3); PIP Regulations 2013 reg. 24
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2012/5/78
              excerpt: "the standard rate means such weekly rate as may be prescribed; the enhanced rate means such weekly rate as may be prescribed"
          - path: versions[0].formula
            kind: import
            import:
              target: uk:regulations/uksi/2013/377/24#pip_daily_living_standard_weekly_rate
              output: pip_daily_living_standard_weekly_rate
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: uk:regulations/uksi/2013/377/24#pip_daily_living_enhanced_weekly_rate
              output: pip_daily_living_enhanced_weekly_rate
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if daily_living_is_enhanced_rate: pip_daily_living_enhanced_weekly_rate else: if daily_living_is_standard_rate: pip_daily_living_standard_weekly_rate else: 0

  - name: pip_mobility_weekly_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Week
    unit: GBP
    source: Welfare Reform Act 2012 s.79(1) to (3); PIP Regulations 2013 reg. 24
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2012/5/79
              excerpt: "the standard rate means such weekly rate as may be prescribed; the enhanced rate means such weekly rate as may be prescribed"
          - path: versions[0].formula
            kind: import
            import:
              target: uk:regulations/uksi/2013/377/24#pip_mobility_standard_weekly_rate
              output: pip_mobility_standard_weekly_rate
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: uk:regulations/uksi/2013/377/24#pip_mobility_enhanced_weekly_rate
              output: pip_mobility_enhanced_weekly_rate
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if mobility_is_enhanced_rate: pip_mobility_enhanced_weekly_rate else: if mobility_is_standard_rate: pip_mobility_standard_weekly_rate else: 0

  - name: personal_independence_payment_weekly_total
    kind: derived
    entity: Person
    dtype: Money
    period: Week
    unit: GBP
    source: Welfare Reform Act 2012 s.77(1), (2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2012/5/77
              excerpt: "the daily living component (see section 78); the mobility component (see section 79); or both those components"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          pip_daily_living_weekly_amount + pip_mobility_weekly_amount

  - name: receives_enhanced_daily_living_component
    kind: derived
    entity: Person
    dtype: Judgment
    period: Week
    source: Welfare Reform Act 2012 s.78(2) (enhanced daily living rate)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/statute/ukpga/2012/5/78
              excerpt: "the person's ability to carry out daily living activities is severely limited by the person's physical or mental condition"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          daily_living_is_enhanced_rate

  - name: personal_independence_payment_annual_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Welfare Reform Act 2012 s.77 (weekly total annualised)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/schedule/4/paragraph/7
              excerpt: "calculated as a monthly amount"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          personal_independence_payment_weekly_total * personal_independence_payment_weeks_in_year
