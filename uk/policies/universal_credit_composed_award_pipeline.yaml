format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/statute/ukpga/2012/5/8
  summary: |-
    Composed Family-level Universal Credit award pipeline for the 2026-27
    assessment-period parameters. It exposes a dense-engine-friendly path from
    raw monthly household facts (ages, couple status, number of responsible
    children, disabled-child status, limited capability for work and
    work-related activity, carer status, rent, non-dependants, childcare
    charges, earned and unearned income, capital) into the Welfare Reform Act
    2012 section 8 award so an end-to-end UKMOD bsauc_s comparison does not
    require the caller to supply the section 8 maximum-amount and deduction
    stage boundaries or the regulation 22 / 72 taper and tariff mechanics.

    It wires the section 8(2) maximum amount from the regulation 36
    standard-allowance, child, LCWRA and carer elements plus the regulation 34
    childcare-costs element and the Schedule 4 housing-costs element (net of
    regulation-13/14 non-dependant contributions); then the section 8(3)
    deductions as tariff income from capital above 6,000 (regulation 72),
    all unearned income, and 55% of earned income above the applicable
    (regulation 22) work allowance; then the regulation 80A/81 benefit-cap
    reduction; and finally the section 8(1) award, floored at zero.

    The minimum-income-floor deeming (regulation 62) is now applied on the
    pipeline: regulation 90 (the individual/couple thresholds) and the National
    Minimum Wage Regulations 2015 regulation 4 rate it points to are in the
    corpus (ingested for corpus#224), so for a claimant flagged as in gainful
    self-employment (uc_pilot_is_gainfully_self_employed) the pipeline computes
    the floor from the regulation 4 national living wage rate x the regulation
    88 expected hours (35) x 52 / 12, nets the supplied regulation 62(5)
    notional tax/NI deduction, and treats earned income below the floor as
    equal to it. A claimant who is not gainfully self-employed uses the
    supplied combined monthly earned income unchanged, so consumers that model
    employment income or floor earnings upstream keep the pre-existing
    behaviour.

    Deliberately excluded (all outside the composed household grid this slice
    models, and all separately encoded): the transitional-protection element,
    surplus-earnings and self-employment loss carry-forward mechanics, the
    Schedule 5 owner-occupier and Schedule 4 shared-ownership housing paths,
    the regulation-25 under-occupancy and bedroom-cap detail beyond the
    supplied cap rent, the start-up-period exemption and the reduced expected
    hours for carers/disability (regulation 88), and the reg 90 apprenticeship
    and regulation-3(3) single-claim couple thresholds. The two-child limit
    (former regulation 24A) is not applied: it was revoked from 6 April 2026
    for assessment periods commencing on or after that date by the Universal
    Credit (Removal of Two Child Limit) Act 2026 (c.13) s.1(3)(a), so every
    responsible child draws a child element in 2026-27.
