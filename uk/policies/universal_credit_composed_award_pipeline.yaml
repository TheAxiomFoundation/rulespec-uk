  # ==========================================================================
  # Section 8(2) maximum amount -- composed from the elements
  # ==========================================================================
  # Standard allowance (regulation 36 table, single amounts apply where a
  # member of a couple claims as a single person). Inputs: uc_pilot_is_couple,
  # uc_pilot_either_aged_25_or_over.
  - name: uc_pilot_standard_allowance
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: GBP
    source: Universal Credit Regulations 2013, regulation 36 table, Standard allowance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/36
              excerpt: "member of a couple, but claims as a single person, the amounts are those shown in the table for a single claimant."
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          if uc_pilot_is_couple:
            if uc_pilot_either_aged_25_or_over: uc_pilot_standard_allowance_joint_either_25_or_over_amount else: uc_pilot_standard_allowance_joint_both_under_25_amount
          else:
            if uc_pilot_either_aged_25_or_over: uc_pilot_standard_allowance_single_25_or_over_amount else: uc_pilot_standard_allowance_single_under_25_amount

  # Child element (regulation 24(1) and 36 table). The first responsible child
  # draws the first-child rate; each subsequent responsible child draws the
  # second-and-subsequent rate. The two-child limit (former regulation 24A) is
  # revoked from 6 April 2026 (Removal of Two Child Limit Act 2026 c.13
  # s.1(3)(a)), so no cap is applied to the number of children. Inputs:
  # uc_pilot_number_of_responsible_children.
  - name: uc_pilot_child_element_total
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: GBP
    source: Universal Credit Regulations 2013, regulation 24(1) and 36 table, Child element
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/36
              excerpt: "first child or qualifying young person | £351.88"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/36
              excerpt: "second and each subsequenteach child or qualifying young person | £303.94"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          if uc_pilot_number_of_responsible_children >= 1:
            uc_pilot_first_child_element_amount + max(0, uc_pilot_number_of_responsible_children - 1) * uc_pilot_second_and_subsequent_child_element_amount
          else:
            0

  # Additional amount for disabled children (regulation 24(2) and 36 table).
  # Inputs: uc_pilot_number_of_disabled_children_lower_rate,
  # uc_pilot_number_of_disabled_children_higher_rate.
  - name: uc_pilot_disabled_child_addition_total
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: GBP
    source: Universal Credit Regulations 2013, regulation 24(2) and 36 table, Additional amount for disabled child
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/36
              excerpt: "lower rate | £164.79"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/36
              excerpt: "higher rate | £514.71"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          max(0, uc_pilot_number_of_disabled_children_lower_rate) * uc_pilot_disabled_child_lower_rate_amount
          + max(0, uc_pilot_number_of_disabled_children_higher_rate) * uc_pilot_disabled_child_higher_rate_amount

  # LCWRA element (regulation 27 and 36 table). A single LCWRA element is
  # included where the claimant (or, for joint claimants, either) has limited
  # capability for work and work-related activity. Input:
  # uc_pilot_has_lcwra.
  - name: uc_pilot_lcwra_element
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: GBP
    source: Universal Credit Regulations 2013, regulation 27 and 36 table, LCWRA element
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/36
              excerpt: "claimant with limited capability for work and work-related activity, other than a pre-2026 claimant, a severe conditions criteria claimant or a claimant who is terminally ill | £217.26"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          if uc_pilot_has_lcwra: uc_pilot_lcwra_ordinary_claimant_amount else: 0

  # Carer element (regulation 29 and 36 table). One carer element per qualifying
  # carer; for joint claimants caring for different severely disabled persons
  # both may qualify. Input: uc_pilot_number_of_carer_elements (0, 1 or 2).
  - name: uc_pilot_carer_element_total
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: GBP
    source: Universal Credit Regulations 2013, regulation 29 and 36 table, Carer element
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/36
              excerpt: "Carer element | £209.34"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          max(0, uc_pilot_number_of_carer_elements) * uc_pilot_carer_element_amount

  # Childcare costs element (regulation 34: lesser of 85% of charges and the
  # regulation 36 maximum for the number of children in childcare). Inputs:
  # uc_pilot_childcare_charges_monthly, uc_pilot_number_of_children_in_childcare.
  - name: uc_pilot_childcare_maximum
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: GBP
    source: Universal Credit Regulations 2013, regulation 36 table, Childcare costs element
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/36
              excerpt: "maximum amount for one child | £1,071.09"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/36
              excerpt: "maximum amount for two or more children | £1,836.16"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          if uc_pilot_number_of_children_in_childcare == 1: uc_pilot_childcare_one_child_maximum_amount else: if uc_pilot_number_of_children_in_childcare >= 2: uc_pilot_childcare_two_or_more_children_maximum_amount else: 0

  - name: uc_pilot_childcare_element
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: GBP
    source: Universal Credit Regulations 2013, regulation 34(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/34
              excerpt: "The amount of the childcare costs element for an assessment period is the lesser of—"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/34
              excerpt: "85% of the charges paid for relevant childcare that are attributable to that assessment period"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/34
              excerpt: "the maximum amount specified in the table in regulation 36"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          min(uc_pilot_childcare_reimbursement_rate * max(0, uc_pilot_childcare_charges_monthly), uc_pilot_childcare_maximum)

  # Housing costs element (section 11 / Schedule 4 paragraph 33: the lower of
  # core rent and cap rent, less the non-dependant housing cost contributions
  # under paragraph 13/14). This models the private/social rented path; the
  # caller supplies the monthly rent taken into account (already the lower of
  # core and cap rent) and the number of non-dependants. Inputs:
  # uc_pilot_rent_monthly, uc_pilot_number_of_non_dependants.
  - name: uc_pilot_non_dependant_housing_cost_contributions
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: GBP
    source: Universal Credit Regulations 2013, Schedule 4 paragraphs 13 and 14
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/schedule/4/paragraph/14
              excerpt: "The amount of each housing cost contribution to be deducted under paragraph 13 is £96.55."
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          max(0, uc_pilot_number_of_non_dependants) * uc_pilot_non_dependant_housing_cost_contribution_amount

  - name: uc_pilot_housing_costs_element
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: GBP
    source: Universal Credit Regulations 2013, Schedule 4 paragraph 33 (S - HCC)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/schedule/4/paragraph/14
              excerpt: |-
                the amount determined under this Schedule is to be reduced to nil; but
                no further reduction in respect of housing cost contributions is to be made from the renter's award.
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          max(0, max(0, uc_pilot_rent_monthly) - uc_pilot_non_dependant_housing_cost_contributions)

  # Section 8(2) maximum amount -- sum of all included elements.
  - name: uc_pilot_maximum_amount
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: GBP
    source: Welfare Reform Act 2012 s.8(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2012/5/8
              excerpt: "The maximum amount is the total of—"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          uc_pilot_standard_allowance
          + uc_pilot_child_element_total
          + uc_pilot_disabled_child_addition_total
          + uc_pilot_lcwra_element
          + uc_pilot_carer_element_total
          + uc_pilot_childcare_element
          + uc_pilot_housing_costs_element

  # ==========================================================================
  # Section 8(3) deductions -- income and capital
  # ==========================================================================
  # Capital tariff income (regulation 72): 4.35 per 250, or part thereof,
  # above 6,000. Capital at or above the 16,000 upper limit ends entitlement
  # (regulation 18): the pipeline returns a nil award in that case via the
  # eligibility gate below. Input: uc_pilot_capital.
  - name: uc_pilot_capital_tariff_income
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: GBP
    source: Universal Credit Regulations 2013, regulation 72(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/72
              excerpt: "£4.35 for each £250 in excess of £6,000 and £4.35 for any excess which is not a complete £250"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          if uc_pilot_capital > uc_pilot_capital_tariff_lower_threshold:
            uc_pilot_capital_tariff_amount_per_band * ceil((uc_pilot_capital - uc_pilot_capital_tariff_lower_threshold) / uc_pilot_capital_tariff_band_size)
          else:
            0

  # Applicable work allowance (regulation 22(2)): the higher work allowance
  # where the award contains no housing costs element, otherwise the lower
  # work allowance; a work allowance applies only where the claimant is
  # responsible for a child or has limited capability for work. Input:
  # uc_pilot_work_allowance_applies is derived from responsibility/LCWRA.
  - name: uc_pilot_work_allowance_applies
    kind: derived
    entity: Family
    dtype: Judgment
    period: Month
    source: Universal Credit Regulations 2013, regulation 22(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/22
              excerpt: "in a case where no work allowance is specified in the table below (that is where a single claimant does not have, or neither of joint claimants has, responsibility for a child or qualifying young person or limited capability for work)"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          uc_pilot_number_of_responsible_children >= 1 or uc_pilot_has_lcwra

  - name: uc_pilot_applicable_work_allowance
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: GBP
    source: Universal Credit Regulations 2013, regulation 22(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/22
              excerpt: "if the award contains no amount for the housing costs element, the applicable amount of the higher work allowance specified in the table below"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          if uc_pilot_work_allowance_applies:
            if uc_pilot_housing_costs_element > 0: uc_pilot_lower_work_allowance_amount else: uc_pilot_higher_work_allowance_amount
          else:
            0

  # --------------------------------------------------------------------------
  # Regulation 62 / 90 minimum income floor for gainful self-employment
  # --------------------------------------------------------------------------
  # The individual threshold that defines the floor (regulation 90(2)) is the
  # applicable National Minimum Wage / National Living Wage hourly rate for the
  # expected number of hours per week, converted to a monthly amount by
  # multiplying by 52 and dividing by 12. The pilot models a working-age
  # claimant subject to all work-related requirements (section 22), so the
  # hours figure is the regulation 88 default expected hours (35) and the rate
  # is the regulation 4 national living wage rate (21 or over). These three
  # figures are grounded in the corpus (reg 4 = 12.71, reg 88 = 35, reg 90 =
  # the 52/12 conversion) so the floor is computed here rather than supplied.
  - name: uc_pilot_minimum_income_floor_national_living_wage_hourly_rate
    kind: parameter
    dtype: Money
    unit: GBP
    source: National Minimum Wage Regulations 2015, regulation 4
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2015/621/4
              excerpt: "the national living wage rate"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          12.71

  - name: uc_pilot_minimum_income_floor_expected_hours_per_week
    kind: parameter
    dtype: Count
    source: Universal Credit Regulations 2013, regulation 88(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: default
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/88
              excerpt: "is 35 unless some lesser number of hours applies"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          35

  - name: uc_pilot_minimum_income_floor_weeks_per_year
    kind: parameter
    dtype: Count
    source: Universal Credit Regulations 2013, regulation 90(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: unit
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/90
              excerpt: "multiplying by 52 and dividing by 12"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          52

  - name: uc_pilot_minimum_income_floor_months_per_year
    kind: parameter
    dtype: Count
    source: Universal Credit Regulations 2013, regulation 90(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: unit
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/90
              excerpt: "multiplying by 52 and dividing by 12"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          12

  # Individual threshold, gross of the notional tax/NI deduction (regulation
  # 90(2): hourly rate x expected hours x 52 / 12).
  - name: uc_pilot_individual_minimum_income_floor_gross
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: GBP
    source: Universal Credit Regulations 2013, regulation 90(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/90
              excerpt: "the hourly rate applicable under regulation 4 or regulation 4A(1)(a) to (c) of the National Minimum Wage Regulations"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/90
              excerpt: "the expected number of hours per week"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/90
              excerpt: "converted to a monthly amount by multiplying by 52 and dividing by 12"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          uc_pilot_minimum_income_floor_national_living_wage_hourly_rate * uc_pilot_minimum_income_floor_expected_hours_per_week * uc_pilot_minimum_income_floor_weeks_per_year / uc_pilot_minimum_income_floor_months_per_year

  # Applicable threshold: for a couple the floor is the sum of the individual
  # thresholds (regulation 90(3)(a)); for a single claimant it is the single
  # individual threshold. Net of the regulation 62(5) notional tax/NI
  # deduction, which the Secretary of State determines and the caller supplies
  # (uc_pilot_minimum_income_floor_notional_deduction_monthly, default 0),
  # matching the regulations/uksi/2013/376/62 net-conversion input. Floored at
  # zero. Inputs: uc_pilot_is_couple,
  # uc_pilot_minimum_income_floor_notional_deduction_monthly.
  - name: uc_pilot_minimum_income_floor_monthly
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: GBP
    source: Universal Credit Regulations 2013, regulation 62(2) and 90(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/90
              excerpt: "in the case of joint claimants, the sum of their individual thresholds"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/62
              excerpt: "treated as having earned income equal to that threshold"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          max(0, (if uc_pilot_is_couple: 2 * uc_pilot_individual_minimum_income_floor_gross else: uc_pilot_individual_minimum_income_floor_gross) - max(0, uc_pilot_minimum_income_floor_notional_deduction_monthly))

  # Floored earned income for the deduction. For a claimant in gainful
  # self-employment (regulation 62), earned income below the minimum income
  # floor is treated as equal to the floor; the floor is now computed here
  # from regulation 90 rather than supplied. For a claimant who is not
  # gainfully self-employed, the pipeline uses the supplied combined monthly
  # earned income unchanged, so consumers that already floor earnings upstream
  # or model employment income keep the pre-existing behaviour. Inputs:
  # uc_pilot_is_gainfully_self_employed, uc_pilot_earned_income_monthly.
  - name: uc_pilot_floored_earned_income_monthly
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: GBP
    source: Universal Credit Regulations 2013, regulation 62(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/62
              excerpt: "the claimant is to be treated as having earned income equal to that threshold"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          if uc_pilot_is_gainfully_self_employed and max(0, uc_pilot_earned_income_monthly) < uc_pilot_minimum_income_floor_monthly: uc_pilot_minimum_income_floor_monthly else: max(0, uc_pilot_earned_income_monthly)

  # Earned income above the work allowance (regulation 22(1)(b)), tapered
  # below. Consumes the floored earned income so the regulation 62 minimum
  # income floor is applied for gainful self-employment; for every other case
  # the floored amount equals the supplied combined monthly earned income.
  - name: uc_pilot_earned_income_above_work_allowance
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: GBP
    source: Universal Credit Regulations 2013, regulation 22(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/22
              excerpt: "55% of the amount by which that earned income exceeds the work allowance"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          max(0, uc_pilot_floored_earned_income_monthly - uc_pilot_applicable_work_allowance)

  - name: uc_pilot_earned_income_deduction
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: GBP
    source: Universal Credit Regulations 2013, regulation 22(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/22
              excerpt: "55% of that earned income"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          uc_pilot_earned_income_taper_rate * uc_pilot_earned_income_above_work_allowance

  # Section 8(3) total deduction: all unearned income (including capital
  # tariff income, which regulation 66 treats as unearned income) plus the
  # tapered earned income. Input: uc_pilot_unearned_income_monthly.
  - name: uc_pilot_total_deduction
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: GBP
    source: Welfare Reform Act 2012 s.8(3); Universal Credit Regulations 2013, regulation 22(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/22
              excerpt: "The amounts to be deducted from the maximum amount in accordance with section 8(3) of the Act to determine the amount of an award of universal credit are—"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          max(0, uc_pilot_unearned_income_monthly) + uc_pilot_capital_tariff_income + uc_pilot_earned_income_deduction

  # ==========================================================================
  # Section 8(1) award before the benefit cap
  # ==========================================================================
  # Capital eligibility gate (regulation 18): capital at or above the upper
  # limit ends entitlement. Input: uc_pilot_capital.
  - name: uc_pilot_capital_over_upper_limit
    kind: derived
    entity: Family
    dtype: Judgment
    period: Month
    source: Universal Credit Regulations 2013, regulation 18
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/18
              excerpt: "the prescribed amount for a single claimant is £16,000"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          uc_pilot_capital >= uc_pilot_capital_upper_limit

  - name: uc_pilot_award_before_cap
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: GBP
    source: Welfare Reform Act 2012 s.8(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2012/5/8
              excerpt: "The amount of an award of universal credit is to be the balance of—"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          if uc_pilot_capital_over_upper_limit: 0 else: max(0, uc_pilot_maximum_amount - uc_pilot_total_deduction)

  # ==========================================================================
  # Regulation 80A/81 benefit cap
  # ==========================================================================
  # Applicable annual limit by case (regulation 80A(2)): single claimants with
  # no responsible child use the lower single limits; couples and claimants
  # with a responsible child use the higher limits; each is uprated by
  # Greater-London residence. Inputs: uc_pilot_is_couple,
  # uc_pilot_number_of_responsible_children, uc_pilot_resident_in_greater_london.
  - name: uc_pilot_benefit_cap_annual_limit
    kind: derived
    entity: Family
    dtype: Money
    unit: GBP
    source: Universal Credit Regulations 2013, regulation 80A(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/80A
              excerpt: "The applicable annual limit is—"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          if uc_pilot_is_couple or uc_pilot_number_of_responsible_children >= 1:
            if uc_pilot_resident_in_greater_london: uc_pilot_benefit_cap_annual_limit_couple_or_single_with_child_in_london else: uc_pilot_benefit_cap_annual_limit_couple_or_single_with_child_outside_london
          else:
            if uc_pilot_resident_in_greater_london: uc_pilot_benefit_cap_annual_limit_single_no_child_in_london else: uc_pilot_benefit_cap_annual_limit_single_no_child_outside_london

  - name: uc_pilot_benefit_cap_monthly_limit
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: GBP
    source: Universal Credit Regulations 2013, regulation 80A(1)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/80A
              excerpt: "The relevant amount is determined by dividing the applicable annual limit by 12."
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          uc_pilot_benefit_cap_annual_limit / uc_pilot_benefit_cap_annual_divisor

  # Benefit cap reduction (regulation 81 and 82). The cap does not apply where
  # the claimant is within the earnings exception; where it applies, the award
  # is reduced by the excess of total welfare benefits over the relevant
  # amount, less any childcare costs element (regulation 81(1)(b)/(2)). This
  # pipeline compares the pre-cap award (its own welfare-benefit total for the
  # single-benefit UC household) against the monthly cap. Inputs:
  # uc_pilot_exempt_from_benefit_cap.
  - name: uc_pilot_benefit_cap_excess
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: GBP
    source: Universal Credit Regulations 2013, regulation 81(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/81
              excerpt: "The excess is the total amount of welfare benefits that the single person or the couple are entitled to in the reference period, minus the relevant amount determined under regulation 80A"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          max(0, uc_pilot_award_before_cap - uc_pilot_benefit_cap_monthly_limit)

  - name: uc_pilot_benefit_cap_reduction
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: GBP
    source: Universal Credit Regulations 2013, regulation 81(1) and 81(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/81
              excerpt: "the amount of the award for that period is to be reduced by—"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/81
              excerpt: "any amount included in the award for the childcare costs element"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          if uc_pilot_exempt_from_benefit_cap:
            0
          else:
            if uc_pilot_childcare_element > uc_pilot_benefit_cap_excess: 0 else: uc_pilot_benefit_cap_excess - uc_pilot_childcare_element

  # ==========================================================================
  # Final award
  # ==========================================================================
  - name: uc_pilot_award_amount
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: GBP
    source: Welfare Reform Act 2012 s.8(1); Universal Credit Regulations 2013, regulation 81
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2012/5/8
              excerpt: "The amount of an award of universal credit"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          max(0, uc_pilot_award_before_cap - uc_pilot_benefit_cap_reduction)
