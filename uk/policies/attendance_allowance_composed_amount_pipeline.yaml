format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - uk/regulation/uksi/2026/148/schedule/1
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - uk/regulation/uksi/2026/148/schedule/1
      rationale: |-
        Every monetary parameter is grounded in an official source. The weekly
        Attendance Allowance amounts (GBP 114.60 higher rate, GBP 76.70 lower
        rate) are the Social Security Benefits Up-rating Order 2026 (SI 2026/148)
        Schedule 1 Part III figures effective from 6 April 2026 (the same figures
        encoded in uk/regulations/uksi/2026/148/schedule/1.yaml).
  summary: |-
    Composed Person-level Attendance Allowance amount pipeline. Attendance
    Allowance (SSCBA 1992 ss.64-67) is a non-means-tested disability benefit paid
    at one of two weekly rates depending on the care category the claimant is
    awarded: the higher rate for day-and-night attendance needs and the lower
    rate for day-or-night needs. This pipeline exposes the rate-given-category
    path from caller-supplied award judgments into the weekly amount.

    Scope. Award eligibility (the care category) is a supplied judgment, not
    computed here: the caller supplies whether the claimant is awarded the higher
    rate and whether the claimant is awarded the lower rate. This is the
    rate-only surface PolicyEngine-UK's attendance_allowance exposes (its rate
    table applied over a frozen aa_category input), so the pipeline models the
    SI 2026/148 Schedule 1 Part III weekly rates, not the SSCBA 1992 s.64-66
    needs assessment. The annual amount PolicyEngine reports is the weekly amount
    over its WEEKS_IN_YEAR (52) convention, a period conversion applied by the
    comparison, not encoded here.
rules:
  # ==========================================================================
  # Weekly rates (Schedule 1 Part III, rows 1(a) and 1(b))
  # ==========================================================================
  - name: aa_pilot_higher_weekly_rate
    kind: parameter
    dtype: Money
    period: Week
    unit: GBP
    source: Social Security Benefits Up-rating Order 2026, Schedule 1 Part III, row 1(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2026/148/schedule/1
              excerpt: "Attendance allowance: (a) higher rate, £114.60"
    versions:
      - effective_from: '2026-04-06'
        formula: |-
          114.60

  - name: aa_pilot_lower_weekly_rate
    kind: parameter
    dtype: Money
    period: Week
    unit: GBP
    source: Social Security Benefits Up-rating Order 2026, Schedule 1 Part III, row 1(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2026/148/schedule/1
              excerpt: "(b) lower rate, £76.70"
    versions:
      - effective_from: '2026-04-06'
        formula: |-
          76.70

  # ==========================================================================
  # Rate given the awarded care category (the rate-only surface)
  # ==========================================================================
  - name: aa_pilot_weekly_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Week
    unit: GBP
    source: Social Security Benefits Up-rating Order 2026, Schedule 1 Part III, row 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2026/148/schedule/1
              excerpt: "Attendance allowance: (a) higher rate, £114.60"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2026/148/schedule/1
              excerpt: "(b) lower rate, £76.70"
    versions:
      - effective_from: '2026-04-06'
        formula: |-
          if aa_pilot_awarded_higher_rate: aa_pilot_higher_weekly_rate else: if aa_pilot_awarded_lower_rate: aa_pilot_lower_weekly_rate else: 0
