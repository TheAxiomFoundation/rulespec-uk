format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/statute/ukpga/1992/4/1
  summary: |-
    Section 1 of the Social Security Contributions and Benefits Act 1992 provides for National Insurance contributions in the listed contribution classes. This PolicyEngine-alignment surface aggregates annual primary Class 1, Class 2, Class 3, and Class 4 contribution amounts into the person-level National Insurance amount used by PolicyEngine UK.
rules:
  - name: national_insurance_contribution
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Social Security Contributions and Benefits Act 1992 s.1(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/1992/4/1
              excerpt: "Contributions under this Part of this Act shall be of the following ... classes"
    versions:
      - effective_from: '2026-04-06'
        formula: |-
          primary_class_1_contribution_for_year + class_2_contribution_for_year + class_3_contribution_for_year + class_4_contribution_for_year
