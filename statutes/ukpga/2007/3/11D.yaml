format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/statute/ukpga/2007/3/11D
  summary: |-
    Savings income that remains after the starting rate for savings and savings nil rate is charged at the savings basic, higher, or additional rate according to the rate band at which that income would otherwise be charged. Section 16 determines the ordinary-rate band placement, and Scottish taxpayers are tested as if they were not Scottish taxpayers for this savings-rate allocation.
rules:
  - name: savings_income_charged_at_savings_basic_rate
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: Income Tax Act 2007 s.11D(1), (4), (5), (6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/11D
              excerpt: "Income tax is charged at the savings basic rate on an individual’s income"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/11D
              excerpt: "have effect after sections 12 and 12A have been applied"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/11D
              excerpt: "Section 16 has effect for determining the extent to which an individual’s savings income"
    versions:
      - effective_from: '2024-04-06'
        formula: |-
          max(0, min(max(0, income_already_charged_before_section_11d_savings_income + savings_income_remaining_after_sections_12_and_12a), max(0, basic_rate_limit)) - min(max(0, income_already_charged_before_section_11d_savings_income), max(0, basic_rate_limit)))

  - name: savings_income_charged_at_savings_higher_rate
    kind: derived
    entity: Person
