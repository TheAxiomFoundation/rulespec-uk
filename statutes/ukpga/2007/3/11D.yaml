            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/11D
              excerpt: "would otherwise be charged at the higher rate or the default higher rate"
    versions:
      - effective_from: '2024-04-06'
        formula: |-
          max(0, min(max(0, income_already_charged_before_section_11d_savings_income + savings_income_remaining_after_sections_12_and_12a - basic_rate_limit), max(0, higher_rate_limit - basic_rate_limit)) - min(max(0, income_already_charged_before_section_11d_savings_income - basic_rate_limit), max(0, higher_rate_limit - basic_rate_limit)))

