            kind: predicate
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/16
              excerpt: If a person has dividend income
    versions:
      - effective_from: '2024-04-06'
        formula: |-
          dividend_income_for_section_16_ordering > 0
  - name: savings_income_treated_as_highest_part_of_total_income
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: ITA 2007 s.16 — "If a person has savings income but no dividend income, the savings income is treated as the highest part of the person's total income."
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: uk/statute/ukpga/2007/3/16
              excerpt: If a person has savings income but no dividend income, the savings income is treated as the highest part of the person's total income.
    versions:
      - effective_from: '2024-04-06'
        formula: |-
          person_has_savings_income and not person_has_dividend_income_for_section_16
  - name: dividend_income_treated_as_highest_part_of_total_income
    kind: derived
    entity: Person
