  - name: savings_and_dividend_income_together_treated_as_highest_part_of_total_income
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: ITA 2007 s.16 — "the savings income and dividend income are together treated as the highest part of the person's total income"
