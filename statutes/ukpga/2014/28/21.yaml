  source_verification:
    corpus_citation_path: uk/statute/ukpga/2014/28/21
  summary: |-
    Section 21 of the Childcare Payments Act 2014 defines the top-up element of an amount as the relevant percentage of that amount. The relevant percentage equals R divided by 100 plus R, multiplied by 100, where R is the section 1(4) top-up percentage.
