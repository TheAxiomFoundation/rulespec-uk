format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/statute/ukpga/2002/16/3
  summary: |-
    Savings credit requires the first condition in subsection (1) and the second condition in subsection (2). Amount A is the smaller of the maximum savings credit and the prescribed percentage of qualifying income above the savings credit threshold. Amount B is the prescribed percentage of income above the appropriate minimum guarantee, or nil if there is no excess. The savings credit amount is the amount by which amount A exceeds amount B.
rules:
  - name: maximum_savings_credit
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: State Pension Credit Act 2002 s 3(7), (8)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2002/16/3
              excerpt: "the maximum savings credit"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2002/16/3
              excerpt: "the standard minimum guarantee"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2002/16/3
              excerpt: "the savings credit threshold"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: uk/statute/ukpga/2002/16/3
              excerpt: "the maximum savings credit shall be taken to be nil"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if maximum_savings_credit_taken_as_nil_by_regulations: 0 else: prescribed_percentage_for_maximum_savings_credit * max(0, standard_minimum_guarantee - savings_credit_threshold)

  - name: amount_a_for_savings_credit
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: State Pension Credit Act 2002 s 3(4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2002/16/3
              excerpt: "amount A"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2002/16/3
              excerpt: "the smaller of"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2002/16/3
              excerpt: "qualifying income exceeds the savings credit threshold"
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/2002/16/3#maximum_savings_credit
              output: maximum_savings_credit
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          min(maximum_savings_credit, prescribed_percentage_for_amount_a * max(0, claimant_qualifying_income - savings_credit_threshold))

  - name: amount_b_for_savings_credit
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: State Pension Credit Act 2002 s 3(4), (5)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2002/16/3
              excerpt: "amount B"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2002/16/3
              excerpt: "the claimant's income exceeds the appropriate minimum guarantee"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: uk/statute/ukpga/2002/16/3
              excerpt: "a reference to a prescribed higher amount"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          prescribed_percentage_for_amount_b * max(0, claimant_income - appropriate_minimum_guarantee)

  - name: savings_credit_second_condition_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Year
    source: State Pension Credit Act 2002 s 3(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/statute/ukpga/2002/16/3
              excerpt: "The second of the conditions"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/statute/ukpga/2002/16/3
              excerpt: "qualifying income exceeds the savings credit threshold"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/statute/ukpga/2002/16/3
              excerpt: "amount A exceeds amount B"
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/2002/16/3#amount_a_for_savings_credit
              output: amount_a_for_savings_credit
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/2002/16/3#amount_b_for_savings_credit
              output: amount_b_for_savings_credit
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          claimant_qualifying_income > savings_credit_threshold and amount_a_for_savings_credit > amount_b_for_savings_credit

  - name: savings_credit
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: State Pension Credit Act 2002 s 3(1)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/statute/ukpga/2002/16/3
              excerpt: "The first of the conditions"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/statute/ukpga/2002/16/3
              excerpt: "The second of the conditions"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2002/16/3
              excerpt: "the amount of the savings credit shall be the amount by which amount A exceeds amount B"
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/2002/16/3#amount_a_for_savings_credit
              output: amount_a_for_savings_credit
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/2002/16/3#amount_b_for_savings_credit
              output: amount_b_for_savings_credit
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/2002/16/3#savings_credit_second_condition_satisfied
              output: savings_credit_second_condition_satisfied
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if claimant_satisfies_savings_credit_first_condition and savings_credit_second_condition_satisfied: amount_a_for_savings_credit - amount_b_for_savings_credit else: 0
