format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/statute/ukpga/2012/5/19
  summary: |-
    "The Secretary of State may not impose any work-related requirement on a claimant falling within this section." A claimant falls within the section if the claimant has limited capability for work and work-related activity, has regular and substantial caring responsibilities for a severely disabled person, is the responsible carer for a child under the age of 1, or is of a prescribed description. Where a claimant falls within the section, any previously applying work-related requirement ceases to have effect.
rules:
