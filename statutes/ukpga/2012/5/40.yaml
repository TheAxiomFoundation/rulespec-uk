      reason: The source gives this term the meaning given by section 7(2), but no copied RuleSpec context provides that upstream definition.
    - output: uk:statutes/ukpga/2012/5/40#couple
      reason: The source gives this term the meaning given by section 39, but no copied RuleSpec context provides that upstream definition.
    - output: uk:statutes/ukpga/2012/5/40#limited_capability_for_work
      reason: The source directs construction in accordance with section 37(1), but no copied RuleSpec context provides that upstream definition.
