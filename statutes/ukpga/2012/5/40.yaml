format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/statute/ukpga/2012/5/40
  summary: |-
    In this Part, "child" means a person under the age of 16; "work-related activity", in relation to a person, means activity which makes it more likely that the person will obtain or remain in work or be able to do so. Other listed terms are defined by cross-reference, prescribed meaning, or documentary labels.
