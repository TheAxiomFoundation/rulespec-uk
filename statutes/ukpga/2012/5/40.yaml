      reason: The source directs construction in accordance with section 37(2), but no copied RuleSpec context provides that upstream definition.
    - output: uk:statutes/ukpga/2012/5/40#responsible_carer
      reason: The source gives this term the meaning given in section 19(6), but no copied RuleSpec context provides that upstream definition.
    - output: uk:statutes/ukpga/2012/5/40#single_person
      reason: The source directs construction in accordance with section 1(2)(a), but no copied RuleSpec context provides that upstream definition.
