        formula: |-
          299

  - name: means_tested_additional_payment_total
    kind: derived
    dtype: Money
    period: Year
    unit: GBP
    source: Social Security (Additional Payments) Act 2023 s.1(1), (2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: uk:statutes/ukpga/2023/7/1#first_means_tested_additional_payment_amount
              output: first_means_tested_additional_payment_amount
              hash: sha256:local
          - path: versions[0].formula
