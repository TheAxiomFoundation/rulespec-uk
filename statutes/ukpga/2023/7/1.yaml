format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/statute/ukpga/2023/7/1
  summary: |-
    Section 1 of the Social Security (Additional Payments) Act 2023 requires means-tested additional payments of GBP 301 for the first qualifying day, GBP 300 for the second qualifying day, and GBP 299 for the third qualifying day.
rules:
  - name: first_means_tested_additional_payment_amount
    kind: parameter
    dtype: Money
    period: Year
    unit: GBP
    source: Social Security (Additional Payments) Act 2023 s.1(1), (2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/statute/ukpga/2023/7/1
              excerpt: "a single payment of £301"
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          301

  - name: second_means_tested_additional_payment_amount
    kind: parameter
    dtype: Money
    period: Year
    unit: GBP
    source: Social Security (Additional Payments) Act 2023 s.1(1), (2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/statute/ukpga/2023/7/1
              excerpt: "a single payment of £300"
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          300

  - name: third_means_tested_additional_payment_amount
    kind: parameter
    dtype: Money
    period: Year
    unit: GBP
    source: Social Security (Additional Payments) Act 2023 s.1(1), (2)
    metadata:
