format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - uk/guidance/dwp/historical-benefits-closure/block-1
      - uk/guidance/dwp/historical-benefits-closure/block-3
      - uk/guidance/hmrc-dwp/tax-credits-have-ended/block-1
      - uk/guidance/hmrc-dwp/tax-credits-have-ended/block-2
  summary: |-
    Current-law legacy benefit closures make ongoing Income Support, income-based Jobseeker's Allowance, Working Tax Credit, Child Tax Credit, and aggregate Tax Credits final awards nil for the 2026 tax year. DWP states that Income Support and income-related Jobseeker's Allowance claimants moved to Universal Credit and that those two benefits will close. GOV.UK states that Child Tax Credit and Working Tax Credit cannot be newly claimed, and annual reviews finalise tax credit awards paid up to 5 April 2025. PolicyEngine's aggregate Jobseeker's Allowance and Employment and Support Allowance variables add the modeled income-related amount to fixed reported contribution-based receipt.
rules:
  - name: income_support
    kind: derived
    entity: BenUnit
    dtype: Money
    period: Year
    unit: GBP
    source: DWP legacy-benefit closure guidance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/guidance/dwp/historical-benefits-closure/block-1
              excerpt: "Income Support and income-related Jobseeker"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/guidance/dwp/historical-benefits-closure/block-1
              excerpt: "those two benefits will close"
    versions:
      - effective_from: '2026-04-01'
        formula: |-
          0

