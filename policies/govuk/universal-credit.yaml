format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/statute/ukpga/2012/5/8
  summary: |-
    This PolicyEngine-alignment surface returns the annual Universal Credit amount used by PolicyEngine UK and HBAI: annual Universal Credit before the benefit cap, less the annual benefit-cap reduction, floored at nil.
rules:
  - name: universal_credit_annual_amount
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    unit: GBP
    source: PolicyEngine UK universal_credit final receipt wrapper over Welfare Reform Act 2012 s.8 award amount
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2012/5/8
              excerpt: "the amount of an award"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          max(0, universal_credit_pre_benefit_cap_for_year - benefit_cap_reduction_for_year)
