format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - uk/regulation/uksi/2026/148/schedule/1
      - uk/regulation/uksi/2013/376/schedule/4/paragraph/7
  summary: |-
    This PolicyEngine-alignment surface returns the annual Attendance Allowance amount used by PolicyEngine UK and HBAI: the selected higher or lower weekly Attendance Allowance rate, annualized over 52 weeks.
imports:
  - uk:regulations/uksi/2026/148/schedule/1#attendance_allowance_higher_weekly_rate
  - uk:regulations/uksi/2026/148/schedule/1#attendance_allowance_lower_weekly_rate
rules:
  - name: attendance_allowance_weeks_in_year
    kind: parameter
    entity: Person
    dtype: Count
    period: Year
    source: Social Security (Claims and Payments) Regulations 1987 weekly-benefit annualization rule
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/schedule/4/paragraph/7
              excerpt: "weekly payments are multiplied by 52"
    versions:
      - effective_from: '2026-04-06'
        formula: |-
          52

  - name: attendance_allowance_weekly_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Week
    unit: GBP
    source: PolicyEngine UK Attendance Allowance category-input wrapper over Social Security Benefits Up-rating Order 2026 Schedule 1 rates
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: uk:regulations/uksi/2026/148/schedule/1#attendance_allowance_higher_weekly_rate
              output: attendance_allowance_higher_weekly_rate
              hash: sha256:01b4050f255edf055e9c04e2b267c7a899f3f862b6e80e3e5bf54e18e29ddb88
          - path: versions[0].formula
            kind: import
            import:
              target: uk:regulations/uksi/2026/148/schedule/1#attendance_allowance_lower_weekly_rate
              output: attendance_allowance_lower_weekly_rate
              hash: sha256:01b4050f255edf055e9c04e2b267c7a899f3f862b6e80e3e5bf54e18e29ddb88
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2026/148/schedule/1
              excerpt: "Attendance allowance: (a) higher rate, GBP 114.60"
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2026/148/schedule/1
              excerpt: "(b) lower rate, GBP 76.70"
    versions:
      - effective_from: '2026-04-06'
        formula: |-
          if person_has_higher_rate_attendance_allowance_category: attendance_allowance_higher_weekly_rate else: if person_has_lower_rate_attendance_allowance_category: attendance_allowance_lower_weekly_rate else: 0

  - name: attendance_allowance_annual_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: PolicyEngine UK Attendance Allowance final annual wrapper over Attendance Allowance weekly rates
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: uk:policies/govuk/attendance-allowance#attendance_allowance_weekly_amount
              output: attendance_allowance_weekly_amount
              hash: sha256:local
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/schedule/4/paragraph/7
              excerpt: "weekly payments are multiplied by 52"
    versions:
      - effective_from: '2026-04-06'
        formula: |-
          attendance_allowance_weekly_amount * attendance_allowance_weeks_in_year
