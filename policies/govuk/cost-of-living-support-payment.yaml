  - name: means_tested_cost_of_living_payment_for_household
    kind: derived
    entity: Household
    dtype: Money
    period: Year
    unit: GBP
    source: PolicyEngine UK Cost of Living support wrapper, means-tested qualifying-benefit gate
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/guidance/dwp/cost-of-living-payments-2022-to-2024/block-5
              excerpt: "if you got any of the following benefits or tax credits"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          if household_receives_qualifying_means_tested_benefit_for_cost_of_living_payment: current_means_tested_cost_of_living_payment_amount else: 0

  - name: pensioner_cost_of_living_payment_for_household
