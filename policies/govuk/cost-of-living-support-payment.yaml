format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - uk/guidance/hmt-dwp/cost-of-living-support-package-2022/block-1
      - uk/guidance/dwp/cost-of-living-payments-2022-to-2024/block-2
      - uk/guidance/dwp/cost-of-living-payments-2022-to-2024/block-5
      - uk/guidance/dwp/cost-of-living-payments-2022-to-2024/block-6
      - uk/guidance/dwp/cost-of-living-payments-2022-to-2024/block-12
      - uk/guidance/dwp/cost-of-living-payments-2022-to-2024/block-15
  summary: |-
    This PolicyEngine-alignment surface returns the current annual household Cost of Living support payment used by PolicyEngine UK and HBAI. The 2022 and 2023 temporary amounts are retained as source-backed historical constants; the final current PolicyEngine amount is zero because DWP is not planning further Cost of Living Payments.
rules:
  - name: means_tested_cost_of_living_payment_2022_amount
    kind: parameter
    dtype: Money
    period: Year
    unit: GBP
    source: GOV.UK 2022 Cost of Living Support package announcement
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/guidance/hmt-dwp/cost-of-living-support-package-2022/block-1
              excerpt: "A direct one-off cost of living payment of £650"
    versions:
      - effective_from: '2022-01-01'
        formula: |-
          650

  - name: first_means_tested_cost_of_living_payment_2023_amount
    kind: parameter
    dtype: Money
    period: Year
    unit: GBP
    source: GOV.UK Cost of Living Payments guidance for the first 2023 to 2024 low-income benefit instalment
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/guidance/dwp/cost-of-living-payments-2022-to-2024/block-6
              excerpt: "£301"
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          301

  - name: second_means_tested_cost_of_living_payment_2023_amount
    kind: parameter
    dtype: Money
    period: Year
    unit: GBP
    source: GOV.UK Cost of Living Payments guidance for the second 2023 to 2024 low-income benefit instalment
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/guidance/dwp/cost-of-living-payments-2022-to-2024/block-6
              excerpt: "£300"
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          300

  - name: third_means_tested_cost_of_living_payment_2023_amount
    kind: parameter
    dtype: Money
    period: Year
    unit: GBP
    source: GOV.UK Cost of Living Payments guidance for the third 2023 to 2024 low-income benefit instalment
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/guidance/dwp/cost-of-living-payments-2022-to-2024/block-6
              excerpt: "£299"
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          299

  - name: means_tested_cost_of_living_payment_2023_amount
    kind: derived
    dtype: Money
    period: Year
    unit: GBP
    source: GOV.UK Cost of Living Payments guidance for the 2023 to 2024 low-income benefit instalment total
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: import
            import:
              target: uk:policies/govuk/cost-of-living-support-payment#first_means_tested_cost_of_living_payment_2023_amount
              output: first_means_tested_cost_of_living_payment_2023_amount
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: uk:policies/govuk/cost-of-living-support-payment#second_means_tested_cost_of_living_payment_2023_amount
              output: second_means_tested_cost_of_living_payment_2023_amount
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: uk:policies/govuk/cost-of-living-support-payment#third_means_tested_cost_of_living_payment_2023_amount
              output: third_means_tested_cost_of_living_payment_2023_amount
              hash: sha256:local
    versions:
      - effective_from: '2023-01-01'
        formula: |-
          first_means_tested_cost_of_living_payment_2023_amount + second_means_tested_cost_of_living_payment_2023_amount + third_means_tested_cost_of_living_payment_2023_amount

