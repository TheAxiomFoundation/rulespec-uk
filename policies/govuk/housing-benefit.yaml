format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2013/376/80A
  summary: |-
    This PolicyEngine-alignment surface returns the annual Housing Benefit amount used by PolicyEngine UK and HBAI: annual Housing Benefit before the benefit cap, less the annual benefit-cap reduction, floored at nil when the benefit unit would claim Housing Benefit, and nil otherwise.
rules:
  - name: housing_benefit_annual_amount
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    unit: GBP
    source: PolicyEngine UK housing_benefit final receipt wrapper over benefit-cap relevant amount rules
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/80A
              excerpt: "claimant receives housing benefit"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/80A
              excerpt: "The relevant amount is determined by dividing the applicable annual limit by 12."
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if would_claim_housing_benefit: max(0, housing_benefit_pre_benefit_cap_for_year - benefit_cap_reduction_for_year) else: 0
