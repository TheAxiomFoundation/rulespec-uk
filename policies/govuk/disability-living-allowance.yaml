  - name: disability_living_allowance_annual_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    unit: GBP
    source: PolicyEngine UK dla final annual receipt wrapper over DLA self-care and mobility component rates
    metadata:
      proof:
