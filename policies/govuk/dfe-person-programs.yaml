format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - uk/guidance/policyengine-uk/dfe-program-parameters/v2.88.56
  summary: |-
    This PolicyEngine-alignment surface returns the person-level England DfE cash outputs exposed by PolicyEngine UK 2.88.56: universal and targeted childcare entitlements, Student Finance England student-support grants, Care to Learn, maintenance loans, and 16 to 19 Bursary Fund support. Eligibility, expenses, living arrangement, and use of free childcare hours are projected as leaf inputs from PolicyEngine's EFRS simulation.
