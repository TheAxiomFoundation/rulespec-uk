format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_paths:
      - uk/statute/ukpga/2003/14/55
      - uk/statute/ukpga/2003/14/schedule/4ZA
      - uk/statute/ukpga/2003/14/schedule/5
      - uk/statute/ukpga/2003/14/schedule/6ZA
      - uk/guidance/policyengine-uk/sdlt-additional-residential-rate/v2.88.56
  summary: |-
    This PolicyEngine-alignment surface returns the annual household Stamp Duty Land Tax amount for England and Northern Ireland. It applies current residential purchase bands, first-time buyer relief, PolicyEngine-UK 2.88.56 additional-dwelling higher rates, non-residential purchase bands, and residential/non-residential lease rent bands, then gates the result to households liable for SDLT.
rules:
