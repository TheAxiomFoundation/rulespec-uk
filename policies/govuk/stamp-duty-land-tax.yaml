  - name: sdlt_on_main_residential_purchase_as_first_home
    kind: derived
    entity: Household
    dtype: Money
    period: Year
    unit: GBP
    source: Finance Act 2003 s.55 and Schedule 6ZA first-time buyer relief
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2003/14/schedule/6ZA
              excerpt: "not more than £500,000"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2003/14/55
              excerpt: "Apply the rates specified in the second column"
    versions:
      - effective_from: '2021-03-31'
        formula: |-
          max(0, main_residential_property_purchased_for_year - sdlt_first_time_buyer_relief_threshold) * sdlt_residential_band_3_rate

  - name: sdlt_on_main_residential_purchase_as_subsequent_home
    kind: derived
    entity: Household
    dtype: Money
    period: Year
    unit: GBP
    source: Finance Act 2003 s.55 Table A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2003/14/55
              excerpt: "Apply the rates specified in the second column"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2003/14/55
              excerpt: "Table A, if the relevant land consists entirely of residential property"
    versions:
      - effective_from: '2021-03-31'
        formula: |-
          max(0, min(main_residential_property_purchased_for_year, sdlt_residential_band_2_threshold) - sdlt_residential_band_1_threshold) * sdlt_residential_band_2_rate + max(0, min(main_residential_property_purchased_for_year, sdlt_residential_band_3_threshold) - sdlt_residential_band_2_threshold) * sdlt_residential_band_3_rate + max(0, min(main_residential_property_purchased_for_year, sdlt_residential_band_4_threshold) - sdlt_residential_band_3_threshold) * sdlt_residential_band_4_rate + max(0, main_residential_property_purchased_for_year - sdlt_residential_band_4_threshold) * sdlt_residential_band_5_rate

  - name: sdlt_on_main_residential_purchase
    kind: derived
    entity: Household
    dtype: Money
    period: Year
    unit: GBP
    source: Finance Act 2003 s.55 and Schedule 6ZA
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/statute/ukpga/2003/14/schedule/6ZA
              excerpt: "each of the purchasers, is a first-time buyer"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2003/14/schedule/6ZA
              excerpt: "not more than £500,000"
    versions:
      - effective_from: '2021-03-31'
        formula: |-
          if main_residential_property_purchased_is_first_home and main_residential_property_purchased_for_year < sdlt_first_time_buyer_relief_maximum_price: sdlt_on_main_residential_purchase_as_first_home else: sdlt_on_main_residential_purchase_as_subsequent_home

  - name: taxable_additional_residential_property_purchase_amount
    kind: derived
    entity: Household
    dtype: Money
    period: Year
    unit: GBP
    source: Finance Act 2003 Schedule 4ZA condition A
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/statute/ukpga/2003/14/schedule/4ZA
              excerpt: "Condition A is that the chargeable consideration for the transaction is £40,000 or more"
    versions:
      - effective_from: '2016-09-15'
        formula: |-
          if additional_residential_property_purchased_for_year < sdlt_additional_property_minimum_price: 0 else: additional_residential_property_purchased_for_year

  - name: sdlt_on_additional_residential_property_purchase
    kind: derived
    entity: Household
    dtype: Money
    period: Year
    unit: GBP
    source: Finance Act 2003 Schedule 4ZA higher rates for additional dwellings
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2003/14/schedule/4ZA
              excerpt: "for Table A substitute"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/statute/ukpga/2003/14/schedule/4ZA
              excerpt: "Condition A is that the chargeable consideration for the transaction is £40,000 or more"
    versions:
      - effective_from: '2016-09-15'
        formula: |-
          max(0, min(taxable_additional_residential_property_purchase_amount, sdlt_residential_band_1_threshold)) * sdlt_additional_property_band_1_rate + max(0, min(taxable_additional_residential_property_purchase_amount, sdlt_residential_band_2_threshold) - sdlt_residential_band_1_threshold) * sdlt_additional_property_band_2_rate + max(0, min(taxable_additional_residential_property_purchase_amount, sdlt_residential_band_3_threshold) - sdlt_residential_band_2_threshold) * sdlt_additional_property_band_3_rate + max(0, min(taxable_additional_residential_property_purchase_amount, sdlt_residential_band_4_threshold) - sdlt_residential_band_3_threshold) * sdlt_additional_property_band_4_rate + max(0, taxable_additional_residential_property_purchase_amount - sdlt_residential_band_4_threshold) * sdlt_additional_property_band_5_rate

  - name: sdlt_on_residential_property_transactions
    kind: derived
    entity: Household
    dtype: Money
    period: Year
    unit: GBP
    source: Finance Act 2003 s.55 and Schedule 4ZA
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2003/14/55
              excerpt: "Add together the amounts calculated at Step 1"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2003/14/schedule/4ZA
              excerpt: "higher rates transaction"
    versions:
      - effective_from: '2016-09-15'
        formula: |-
          sdlt_on_main_residential_purchase + sdlt_on_additional_residential_property_purchase

  - name: sdlt_on_non_residential_property_transactions
    kind: derived
    entity: Household
    dtype: Money
    period: Year
    unit: GBP
    source: Finance Act 2003 s.55 Table B
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2003/14/55
              excerpt: "Table B, if the relevant land consists of or includes land that is not residential property"
    versions:
      - effective_from: '2016-09-15'
        formula: |-
          max(0, min(non_residential_property_purchased_for_year, sdlt_non_residential_band_2_threshold) - sdlt_non_residential_band_1_threshold) * sdlt_non_residential_band_2_rate + max(0, non_residential_property_purchased_for_year - sdlt_non_residential_band_2_threshold) * sdlt_non_residential_band_3_rate

  - name: sdlt_on_transactions
    kind: derived
    entity: Household
    dtype: Money
    period: Year
    unit: GBP
    source: Finance Act 2003 s.55
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2003/14/55
              excerpt: "Add together the amounts calculated at Step 1"
    versions:
      - effective_from: '2003-07-10'
        formula: |-
          sdlt_on_residential_property_transactions + sdlt_on_non_residential_property_transactions

  - name: sdlt_on_residential_property_rent
    kind: derived
    entity: Household
    dtype: Money
    period: Year
    unit: GBP
    source: Finance Act 2003 Schedule 5 residential rent bands
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/statute/ukpga/2003/14/schedule/5
              excerpt: "the relevant percentage of so much of the relevant rental value as falls within each rate band"
    versions:
      - effective_from: '2021-03-31'
        formula: |-
          max(0, cumulative_residential_rent_for_year + residential_rent_for_year - sdlt_residential_rent_threshold) * sdlt_residential_rent_rate - max(0, cumulative_residential_rent_for_year - sdlt_residential_rent_threshold) * sdlt_residential_rent_rate

  - name: sdlt_on_non_residential_property_rent
    kind: derived
