    kind: parameter
    entity: Household
    dtype: Money
    period: Year
    unit: GBP
    source: Finance Act 2003 Schedule 6ZA
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/statute/ukpga/2003/14/schedule/6ZA
              excerpt: "for Table A there were substituted"
    versions:
      - effective_from: '2021-03-31'
        formula: |-
          300000

