format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk-southampton/manual/council-tax-reduction-scheme-2026-2027/page-26
  summary: |-
    “amount B is 2 6/7 per cent of the difference between his income for the relevant week and his applicable amount”
    and class B requires the applicant to satisfy conditions (c) through (g).
    Page 26 also begins class C and class D, but class C depends on paragraph 19
    and resident-level aggregation, while the class D text is incomplete on this page.
  deferred_outputs:
    - output: uk-southampton:policies/southampton/council-tax-reduction/paragraph/15#class_c_alternative_maximum_council_tax_reduction_eligibility
      reason: >-
        The class C result depends on the operative periods-of-absence rules
        in paragraph 19 and on an alternative maximum reduction derived from
        the incomes of one or more qualifying residents; those computations
        are not supplied in the source unit or copied RuleSpec context.
    - output: uk-southampton:policies/southampton/council-tax-reduction/paragraph/16#class_d_eligibility
      reason: >-
        The source unit ends after paragraph 16(a), before all conditions
        defining class D are supplied.

rules:
  - name: class_b_excess_income_rate_whole_percentage_component
    kind: parameter
    dtype: Rate
    source: paragraph 14(f)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: uk-southampton/manual/council-tax-reduction-scheme-2026-2027/page-26
              excerpt: "amount B is 2 6/7 per cent of the difference"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.02

  - name: class_b_excess_income_rate_fractional_percentage_numerator
    kind: parameter
    dtype: Rate
    source: paragraph 14(f)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: uk-southampton/manual/council-tax-reduction-scheme-2026-2027/page-26
              excerpt: "amount B is 2 6/7 per cent of the difference"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0.06

  - name: class_b_excess_income_rate_fraction_denominator
    kind: parameter
    dtype: Decimal
    source: paragraph 14(f)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: uk-southampton/manual/council-tax-reduction-scheme-2026-2027/page-26
              excerpt: "amount B is 2 6/7 per cent of the difference"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          7

  - name: class_b_excess_income_reduction_rate
    kind: parameter
    dtype: Rate
    source: paragraph 14(f)(ii)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk-southampton/manual/council-tax-reduction-scheme-2026-2027/page-26
              excerpt: "amount B is 2 6/7 per cent of the difference between his income for the relevant week and his applicable amount"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          class_b_excess_income_rate_whole_percentage_component
          + class_b_excess_income_rate_fractional_percentage_numerator
          / class_b_excess_income_rate_fraction_denominator

  - name: class_b_conditions_c_through_g_satisfied
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: paragraph 14(c)-(g)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk-southampton/manual/council-tax-reduction-scheme-2026-2027/page-26
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk-southampton/manual/council-tax-reduction-scheme-2026-2027/page-26
              excerpt: "amount B is 2 6/7 per cent of the difference between his income for the relevant week and his applicable amount"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          maximum_council_tax_reduction_amount_can_be_calculated
          and person_does_not_fall_within_class_not_entitled_to_reduction
          and income_for_relevant_week > applicable_amount
          and maximum_council_tax_reduction_for_day > class_b_excess_income_reduction_rate * (income_for_relevant_week - applicable_amount)
          and person_has_made_application
