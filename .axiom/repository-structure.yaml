allowed_root_files:
  - .gitignore
  - CLAUDE.md
  - LICENSE
  - LICENSE-CODE
  - NOTICE
  - README.md
  - known-validation-gaps.yaml
  - oracle-coverage-pending.yaml
  - variables.toml
path_rules:
  - patterns:
      - ".axiom/**"
    allow_extensions:
      - ".json"
      - ".toml"
      - ".yaml"
  - patterns:
      - "bulk/**"
    allow_extensions:
      - ".md"
      - ".py"
      - ".yaml"
  - patterns:
      - ".github/**"
    allow_extensions:
      - ".yml"
      - ".yaml"
    allow_filenames:
      - "CODEOWNERS"
  - patterns:
      - "data/**"
    allow_extensions:
      - ".json"
      - ".jsonl"
      - ".xml"
  - patterns:
      - "docs/**"
    allow_extensions:
      - ".md"
  - patterns:
      - "tests/**"
    allow_extensions:
      - ".py"
  - patterns:
      - "uk/**"
    allow_extensions:
      - ".yaml"
  - patterns:
      - "uk-*/**"
    allow_extensions:
      - ".json"
      - ".jsonl"
      - ".md"
      - ".pdf"
      - ".toml"
      - ".yaml"
  - patterns:
      - "validation_baselines/**"
    allow_extensions:
      - ".json"
