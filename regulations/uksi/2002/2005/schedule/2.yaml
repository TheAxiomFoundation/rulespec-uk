format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2002/2005/schedule/2
  summary: |-
    Schedule 2 gives the maximum annual rates for relevant elements of working tax credit: GBP 2,435 for the basic element, GBP 3,935 for the disability element, GBP 1,015 for the 30 hour element, GBP 2,500 for the second adult element, GBP 2,500 for the lone parent element, and GBP 1,705 for the severe disability element.
  deferred_outputs:
    - output: uk:regulations/uksi/2002/2005/schedule/2#wtc_worker_element_amount
      reason: Official Schedule 2 states GBP 1,015 for the 30 hour element, but the current PE-UK oracle returns an uprated GBP 1,010.22 for 2024 because the WTC worker element parameter lacks the direct Schedule 2 amount.
      source_values:
        - uk:regulations/uksi/2002/2005/schedule/2#schedule_2_row_3_maximum_annual_rate
rules:
  - name: wtc_basic_element_amount
    kind: parameter
    dtype: Money
    period: Year
    unit: GBP
    source: Schedule 2 row 1
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2002/2005/schedule/2
              excerpt: "1. Basic element | £2,435"
    versions:
      - effective_from: '2024-04-06'
        formula: |-
          2435

