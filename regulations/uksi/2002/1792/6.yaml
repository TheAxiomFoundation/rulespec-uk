        formula: |-
          if paragraph_3_case_applies: 0 else: if treated_as_severely_disabled_person_under_schedule_i_part_i_paragraph_1: if severe_disability_couple_rate_conditions_satisfied: severe_disability_additional_amount_couple else: severe_disability_additional_amount_single else: 0

  - name: carer_additional_amount_per_partner
    kind: parameter
    dtype: Money
    period: Week
    unit: GBP
    source: regulation 6(8)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2002/1792/6
              excerpt: "£48.15 per week"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          48.15

  - name: carer_additional_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Week
    unit: GBP
    source: regulation 6(6)(a) and 6(8)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/regulation/uksi/2002/1792/6
              excerpt: "if paragraph 4 of Part II of Schedule I is satisfied"
          - path: versions[0].formula
            kind: import
            import:
              target: uk:regulations/uksi/2002/1792/6#carer_additional_amount_per_partner
              output: carer_additional_amount_per_partner
              hash: sha256:local
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if paragraph_3_case_applies: 0 else: if paragraph_4_of_part_ii_of_schedule_i_satisfied_for_this_partner: carer_additional_amount_per_partner else: 0

  - name: remand_prisoner_maximum_detention_weeks
    kind: parameter
    dtype: Count
    period: Week
    source: regulation 6(10)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: parameter
            source:
              corpus_citation_path: uk/regulation/uksi/2002/1792/6
              excerpt: "for a period not exceeding 52 weeks"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          52

  - name: remand_prisoner
    kind: derived
    entity: Person
    dtype: Judgment
    period: Week
    source: regulation 6(10)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: uk/regulation/uksi/2002/1792/6
    versions:
      - effective_from: '0001-01-01'
        formula: |-
