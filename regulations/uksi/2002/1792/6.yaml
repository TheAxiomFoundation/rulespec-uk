        formula: |-
          86.05

  - name: severe_disability_additional_amount_couple
    kind: parameter
    dtype: Money
    period: Week
    unit: GBP
    source: regulation 6(5)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2002/1792/6
              excerpt: "£172.10 per week if paragraph 1(1)(b) of Part I of Schedule I is satisfied"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          172.10

  - name: severe_disability_additional_amount
    kind: derived
