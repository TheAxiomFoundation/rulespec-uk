format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2002/1792/6
  summary: |-
    The standard minimum guarantee is £363.25 per week for a claimant with a partner and £238.00 per week for a claimant with no partner, except as otherwise provided. Paragraph (3) applies to prisoners and fully maintained members of religious orders; in those cases section 2(3)(a) refers to a nil amount and, except for remand prisoners, nil is prescribed for section 2(3)(b). Outside paragraph (3) cases, severe-disability additions are £86.05 or £172.10 per week, carer additions are £48.15 per week, and specified child/tax-credit additional-amount rules apply. “Remand prisoner” covers detention for a period not exceeding 52 weeks in the stated remand, bail-hostel, or pending-sentence circumstances; another paragraph applies after more than 52 weeks pending trial or sentence following conviction.
  deferred_outputs:
    - output: uk:regulations/uksi/2002/1792/6#standard_minimum_guarantee_for_section_2_3_a
      reason: The source substitutes a nil amount for the reference to the standard minimum guarantee in section 2(3)(a), but no executable RuleSpec source for section 2(3)(a) is available.
      source_values:
        - uk:regulations/uksi/2002/1792/6#nil_amount
    - output: uk:regulations/uksi/2002/1792/6#prescribed_additional_amount_for_section_2_3_b
      reason: The source prescribes nil as the additional amount for section 2(3)(b), except for remand prisoners, but no executable RuleSpec source for section 2(3)(b) is available.
      source_values:
        - uk:regulations/uksi/2002/1792/6#nil_amount
rules:
  - name: standard_minimum_guarantee_with_partner
    kind: parameter
    dtype: Money
    period: Week
    unit: GBP
    source: regulation 6(1), claimant who has a partner
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2002/1792/6
              excerpt: "£363.25 per week in the case of a claimant who has a partner"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          363.25

  - name: standard_minimum_guarantee_no_partner
    kind: parameter
    dtype: Money
    period: Week
    unit: GBP
    source: regulation 6(1), claimant who has no partner
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2002/1792/6
              excerpt: "£238.00 per week in the case of a claimant who has no partner"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          238.00

  - name: nil_amount
    kind: parameter
    dtype: Money
    period: Week
    unit: GBP
    source: regulation 6(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2002/1792/6
              excerpt: "a reference to a nil amount"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          0

  - name: paragraph_3_case_applies
    kind: derived
    entity: Person
    dtype: Judgment
    period: Week
    source: regulation 6(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/regulation/uksi/2002/1792/6
              excerpt: "prisoners; and members of religious orders who are fully maintained by their order"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          claimant_is_prisoner
          or member_of_religious_order_fully_maintained_by_order

  - name: standard_minimum_guarantee
    kind: derived
    entity: Person
    dtype: Money
    period: Week
    unit: GBP
    source: regulation 6(1) and 6(3)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2002/1792/6
          - path: versions[0].formula
            kind: import
            import:
              target: uk:regulations/uksi/2002/1792/6#standard_minimum_guarantee_with_partner
              output: standard_minimum_guarantee_with_partner
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: uk:regulations/uksi/2002/1792/6#standard_minimum_guarantee_no_partner
              output: standard_minimum_guarantee_no_partner
              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: uk:regulations/uksi/2002/1792/6#nil_amount
              output: nil_amount
              hash: sha256:local
    versions:
