              hash: sha256:local
          - path: versions[0].formula
            kind: import
            import:
              target: uk:regulations/uksi/2002/1792/6#severe_disability_additional_amount_couple
              output: severe_disability_additional_amount_couple
              hash: sha256:local
    versions:
