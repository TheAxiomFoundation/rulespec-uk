format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2024/247/3
  summary: |-
    Regulation 3 of the Tax Credits, Child Benefit and Guardian's Allowance Up-rating Regulations 2024 amends Child Tax Credit Regulation 7 by substituting GBP 3,455 for the individual child and qualifying young person element, GBP 4,170 for the disabled-child rate, and GBP 5,850 for the severely-disabled-child rate.
rules:
  - name: ctc_individual_element_substituted_amount
    kind: parameter
    dtype: Money
    period: Year
    unit: GBP
    source: Regulation 3(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2024/247/3
              excerpt: "for “£3,235” substitute “£3,455”"
    versions:
      - effective_from: '2024-04-06'
        formula: |-
          3455

  - name: ctc_disabled_child_element_substituted_amount
    kind: parameter
    dtype: Money
    period: Year
    unit: GBP
