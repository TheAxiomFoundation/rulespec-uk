format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2013/376/4
  summary: |-
    A person is responsible for a child or qualifying young person who normally lives with them, but not for a qualifying young person if the two are living as a couple. Where the child or qualifying young person normally lives with two or more persons who are not a couple, only the person with main responsibility is treated as responsible. Subject to regulation 4A, no person is responsible while the child or qualifying young person is looked after by a local authority or is a prisoner. Temporary absence ends responsibility if it is expected to exceed or exceeds 6 months, or if absence from Great Britain is expected to exceed or exceeds one month unless disregarded under regulation 11(2) or (3).
rules:
  - name: child_or_qualifying_young_person_treated_not_responsibility_of_any_person
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: Universal Credit Regulations 2013, regulation 4(6)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/4
              excerpt: "Subject to regulation 4A... not being the responsibility of any person... looked after by a local authority; or a prisoner"
    versions:
      - effective_from: '2013-04-29'
        formula: |-
          (
            child_or_qualifying_young_person_is_looked_after_by_local_authority
            or child_or_qualifying_young_person_is_prisoner
          )
          and not regulation_4a_displaces_no_responsibility_treatment

  - name: person_ceases_to_be_responsible_for_child_or_qualifying_young_person_due_to_temporary_absence
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: Universal Credit Regulations 2013, regulation 4(7)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/4
              excerpt: "temporarily absent... absence is expected to exceed, or does exceed, 6 months; or... from Great Britain... one month unless..."
    versions:
      - effective_from: '2013-04-29'
        formula: |-
          child_or_qualifying_young_person_temporarily_absent_from_persons_household
          and (
            temporary_absence_expected_to_exceed_or_exceeds_6_months
            or (
              temporary_absence_is_from_great_britain
              and temporary_absence_expected_to_exceed_or_exceeds_one_month
              and not absence_longer_than_one_month_would_be_disregarded_under_regulation_11_2_or_3
            )
          )

  - name: person_responsible_for_child_or_qualifying_young_person
    kind: derived
    entity: Person
    dtype: Judgment
    period: Day
    source: Universal Credit Regulations 2013, regulation 4(1)-(7)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/4
              excerpt: "A person is responsible... normally lives with them... But... not... living as a couple... only one... main responsibility"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/4
              excerpt: "treated as not being the responsibility of any person... looked after... prisoner"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/4
              excerpt: "temporarily absent... ceases to be responsible"
    versions:
      - effective_from: '2013-04-29'
        formula: |-
          child_or_qualifying_young_person_normally_lives_with_person
          and not qualifying_young_person_living_as_couple_with_person
          and (
            not child_or_qualifying_young_person_normally_lives_with_two_or_more_persons_who_are_not_a_couple
            or person_has_main_responsibility_for_child_or_qualifying_young_person
          )
          and not child_or_qualifying_young_person_treated_not_responsibility_of_any_person
          and not person_ceases_to_be_responsible_for_child_or_qualifying_young_person_due_to_temporary_absence
