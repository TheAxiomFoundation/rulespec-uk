  summary: |-
    This Part contains provisions about the amounts ("the elements") under sections 9 to 12 of the Act that make up the maximum amount of an award of universal credit. The elements under section 12 in respect of particular needs or circumstances are the LCWRA element, the carer element, and the childcare costs element.
