format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2013/376/36
  summary: |-
    "The amounts of the standard allowance, the child element, the LCWRA element and the carer element ... and the maximum amounts of the childcare costs element are given in the following table." The table gives fixed amounts for each assessment period and states that housing costs are dealt with in regulation 26.
rules:
  - name: standard_allowance_single_under_25
    kind: parameter
    dtype: Money
    period: Month
    unit: GBP
    source: regulation 36 table, Standard allowance
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/36
              excerpt: "single claimant aged under 25 | £338.58"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          338.58

