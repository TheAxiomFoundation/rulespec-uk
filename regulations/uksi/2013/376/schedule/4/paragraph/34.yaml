format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2013/376/schedule/4/paragraph/34
  summary: |-
    "Except where paragraph 35 applies, amount S referred to in paragraph 33 is to be found as follows"; determine relevant payments under paragraph 6, monthly amounts under paragraph 7, add them, deduct any under-occupation deduction under paragraph 36, and the result is amount S.
imports:
  - uk:regulations/uksi/2013/376/schedule/4/paragraph/6#relevant_payment_description_counts_for_part_4_or_5_calculation
  - uk:regulations/uksi/2013/376/schedule/4/paragraph/6#relevant_payment_amount_taken_into_account_for_part_4_or_5_calculation
rules:
  - name: amount_s_relevant_payments
    kind: data_relation
    data_relation:
      predicate: amount_s_relevant_payments
      arity: 2
      arguments:
        - Family
        - Payment
    source: Schedule 4 paragraph 34, steps 1 to 3

  - name: paragraph_34_amount_s_calculation_applies
    kind: derived
    entity: Family
    dtype: Judgment
    period: Month
    source: Schedule 4 paragraph 34, opening words
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/schedule/4/paragraph/34
              excerpt: "Except where paragraph 35 applies"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          not paragraph_35_applies

  - name: relevant_payment_amount_in_respect_of_month_for_amount_s
    kind: derived
    entity: Payment
    dtype: Money
    period: Month
    unit: GBP
    source: Schedule 4 paragraph 34, steps 1 and 2
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/schedule/4/paragraph/34
              excerpt: "Determine which relevant payments are to be taken into account under paragraph 6 and determine the amount of each of them"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/schedule/4/paragraph/34
              excerpt: "in accordance with paragraph 7, determine the amount of the payment in respect of a month"
          - path: versions[0].formula
            kind: import
            import:
              target: uk:regulations/uksi/2013/376/schedule/4/paragraph/6#relevant_payment_amount_taken_into_account_for_part_4_or_5_calculation
              output: relevant_payment_amount_taken_into_account_for_part_4_or_5_calculation
              hash: sha256:93cfbc5c068f9aa33308c2b22e647bfd7144b75c41d3a895bacf33fa155c492d
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if relevant_payment_amount_taken_into_account_for_part_4_or_5_calculation > 0: relevant_payment_amount_in_respect_of_a_month_under_paragraph_7_for_amount_s else: 0

  - name: amount_s_before_under_occupation_deduction
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: GBP
    source: Schedule 4 paragraph 34, steps 2 and 3
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/schedule/4/paragraph/34
              excerpt: "If there is more than one relevant payment, add together the amounts determined in step 2"
          - path: versions[0].formula
            kind: import
            import:
              target: uk:regulations/uksi/2013/376/schedule/4/paragraph/6#relevant_payment_description_counts_for_part_4_or_5_calculation
              output: relevant_payment_description_counts_for_part_4_or_5_calculation
              hash: sha256:93cfbc5c068f9aa33308c2b22e647bfd7144b75c41d3a895bacf33fa155c492d
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if paragraph_34_amount_s_calculation_applies: sum_where(amount_s_relevant_payments, relevant_payment_amount_in_respect_of_month_for_amount_s, relevant_payment_description_counts_for_part_4_or_5_calculation) else: 0

  - name: amount_s
    kind: derived
    entity: Family
    dtype: Money
    period: Month
    unit: GBP
    source: Schedule 4 paragraph 34, steps 4 and 5
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/schedule/4/paragraph/34
              excerpt: "determine the amount of the deduction under paragraph 36(2) and deduct it"
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/schedule/4/paragraph/34
              excerpt: "The result is amount S"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          if paragraph_34_amount_s_calculation_applies: max(0, amount_s_before_under_occupation_deduction - (if under_occupation_deduction_is_to_be_made_under_paragraph_36_1: under_occupation_deduction_amount_under_paragraph_36_2 else: 0)) else: 0
