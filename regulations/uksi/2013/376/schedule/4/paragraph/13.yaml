format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: uk/regulation/uksi/2013/376/schedule/4/paragraph/13
  summary: |-
    "a deduction is to be made in respect of each non-dependant who is a member of the renter's extended benefit unit"; paragraph (1) is subject to paragraphs 15 and 16; "Any amount to be deducted under sub-paragraph (1)" is referred to as a "housing cost contribution".
rules:
  - name: housing_cost_contribution_required_for_non_dependant
    kind: derived
    entity: Person
    dtype: Judgment
    period: Month
    source: Schedule 4 paragraph 13(1)-(3)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/schedule/4/paragraph/13
              excerpt: "In calculating the amount of the housing costs element under Part 4 or 5"
          - path: versions[0].formula
            kind: predicate
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/schedule/4/paragraph/13
              excerpt: "each non-dependant who is a member of the renter's extended benefit unit"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/schedule/4/paragraph/13
              excerpt: "Paragraph (1) is subject to paragraphs 15 and 16"
          - path: versions[0].formula
            kind: definition
            source:
              corpus_citation_path: uk/regulation/uksi/2013/376/schedule/4/paragraph/13
              excerpt: "referred to in this Schedule as a \"housing cost contribution\""
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          calculation_is_under_part_4_or_5_of_schedule
          and person_is_non_dependant
          and person_is_member_of_renters_extended_benefit_unit
          and not paragraph_15_displaces_housing_cost_contribution_deduction
          and not paragraph_16_displaces_housing_cost_contribution_deduction
